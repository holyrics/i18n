#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Vista del palco</b> è un'impostazione che modifica la visualizzazione delle diapositive su un monitor specifico.<br>Se hai un'uscita di video per una proiezione di vista pubblica e hai un'altra riproduzione di video per qualcuno che è nel<b>palco</b>, puoi impostare il monitor di <b>ritorno</b> in modo diverso, rispetto a quello mostrato al pubblico.<br>La trasmissione all'applicazione è anche configurabile.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>La casella di controllo:</b> imposta una modifica al testo del slide. Es. Visualizza la prima riga del slide successivo alla fine del slide corrente.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Maiúsculo:</b> Presenta tutto il testo in maiúsculo.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Rimuovi l'interruzione della riga:</b>Visualizza il testo in modo continuo, interrompendo la linea automaticamente sul bordo del slide e occupando il maggior spazio possibile.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Tema Personalizzato:</b> Cambia il tema per visualizzazione del slide.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Abilitare per la Bibbia:</b> attiva anche le impostazioni per i versetti della Bibbia (eccetto per l'impostazione della casella di controllo).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Note: i temi di video non funzionano sui monitor di ritorno, solo sul monitor pubblico.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=È possibile aggiungere un'edizione personalizzata a un paragrafo specifico della lettera. Ad esempio, aumenta <b>proporzionalmente</b> la dimensione del carattere del coro.<br>E anche inserire un'identificazione testuale (coro, verso, ecc ...) che apparirà solo nel piè di pagina del slide.

#View example
m0009=Vedi esempio

#This feature also works in the Quick Display window
m0010=Questa funzione può anche funzionare nella finestra di visualizzazione veloce

#Available Settings
m0011=Configurazione disponibile

#All text in uppercase
m0012=Tutto il testo in maiusculo

#putting the character '%' after the number is useless
m0013=Mettere il carattere '%' dopo il numero non è necessario

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=testo tra parentesi = (coro), (verso), (ripetere), (fine), 

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=valore rgb, esadecimale o il nome del colore tra parentesi= [128,192,64] o [80c040] o [ff0] o [blu]...

#Valid names
m0016=Nomi validi

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Per aggiungere una formattazione personalizzata, aggiungi una riga all'inizio del paragrafo che inizi con due hashtag"## e i codici che desideri in seguito (l'ordine dei codici non ha importanza).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Nell'esempio, quando si visualizza la lettera per la proiezione, il secondo paragrafo apparirà in grassetto, con le dimensioni del carattere del 15% più grandi e in colore blu. Gli altri paragrafi appariranno solitamente con le impostazioni del tema.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Nota: se il tema utilizzato è già impostato in grassetto, ad esempio, questa formattazione personalizzata non farà alcuna differenza.

#Some formatting examples
m0020=Alcuni esempi di formatazzione 

#Bold and italic
m0021=Grassetto e corsivo

#25% bigger
m0022=25% maggiore

#italic and 5% lower
m0023=grassetto e 5% menore

#Uppercase and yellow
m0024=Maiusculo e giallo

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=È possibile definire su quali linee verrà applicata la formattazione personalizzata.<br>  Aggiungi due trattini <b>--</b> all'inizio della riga in cui non desideri applicare la formattazione personalizzata.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Nell'esempio, la riga <b>"Mas ainda é pouco eu sei"</b> utilizzerà la formattazione originale del tema e le altre linee utilizzeranno la formattazione personalizzata (in grassetto e in giallo).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=È possibile utilizzare il codice <code>##p</code> per utilizzare la formattazione <b>standard</b>.<br>Tutti i paragrafi definiti con <code>##p</code> utilizzeranno la formattazione definita nel campo sottostante.

#Default Custom Formatting
m0028=Formattazione personalizzata standard

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Ogni lista rappresenta una cartella interna di Holyrics: Audio, Video e Immagine. Per aggiungere file: Fare clic sull'icona {0} nella scheda corrispondente per aprire la cartella in Windows e incollare i file nella cartella. L'elenco nel programma viene aggiornato automaticamente con i file nella cartella (a meno che non sia attiva una presentazione).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Osservazione:</b> EVITARE di rinominare i file nella cartella, perché se si crea un collegamento a un file in una playlista, preferiti, ecc. e quindi rinominarlo nella cartella, il collegamento nel programma non funzionerà più, sarà necessario creare un nuovo collegamento.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=In ciascuna delle cartelle (Audio, Video e Immagine), è possibile creare altre cartelle per essere un elenco di file nel programma. Ad esempio: puoi creare una cartella denominata <b>Presentazione</b> nella cartella <b>Immagini</b> e aggiungervi le immagini. La cartella sarà una voce di elenco nel programma Holyrics e facendo clic su di essa si apriranno tutte le immagini per la presentazione.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=È possibile aggiungere un collegamento a queste cartelle sul desktop facendo clic <a href='http://addShortcutDesktop'>QUI</a>.

#Holyrics Library
m0033=Biblioteca Holyrics

#Displays the song lyric in uppercase.
m0034=Mostra il testo della música in maiusculo.

#Enable/disable the underline in the song title at first slide.
m0035=Abilitare / disabilitare sottolineato nella prima diapositiva titolo Music.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Con l'opizione <b>abilitata</b>, il programma romperà automaticamente le lunghe linee, evitando di ridurre la dimensione originale della font. Con l'opzione <b>disabilitata</b>, se ci sono linee lunghe che vanno oltre il lato del slide, il programma ridurrà la dimensione della font fino a quando l'intera linea non si troverà all'interno del slide.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Abilita / disabilita la <a href='http://customFormatting'> formattazione paragrafo personalizzata</a>.

#Enable/disable <b>Custom Background</b>.
m0038=Abilita / disabilita il <b>piano di fondo personalizzato</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Il pannello <b>LIVE</b> mostra ciò che è attualmente visualizzato nella proiezione principale.<br>(Lo sfondo e i video riprodotti da VLC Media Player non compaiono sul pannello.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Se si utilizza un monitor di ritorno esclusivo per quelli sul "palcoscenico", è possibile utilizzare il pannello di comunicazione per visualizzare i messaggi solo su questo monitor.<br>Nelle impostazioni del display è possibile impostare un monitor su <b>vista del palco</b> (eccetto il monitor del pubblico principale) e i messaggi nel pannello di comunicazione verranno visualizzati solo sui monitor impostati su <b>vista del palco</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Metti l'audio in riproduzione e fai clic sulla diapositiva che vuoi riprodurre mentre la canzone è in riproduzione.<br>Puoi mettere in pausa e ritornare una parte della canzone per riprendere dal punto in cui era stata interrotta.<br>Puoi anche eliminare un elemento dall'elenco catturato facendo clic con il pulsante destro del mouse su di esso.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Il slide che verrà visualizzata prima del primo slide selezionato è quella definita nella finestra di modifica.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Non aspettarti iniziare il frammento del brano per fare clic sul slide specifico, prova a fare clic sul slide alcuni millisecondi prima, evitando ritardi nella transizione tra slides.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Con la <b>Apresentazione Automática</b> è possibile programmare la durata di ciascun slide integrato in un audio MP3 (una riproduzione, per esempio).<br>Una volta creato, puoi scegliere qualsiasi tema che desideri e avviare la presentazione.<br>L'audio verrà riprodotto dal lettore multimediale e il slide verranno automaticamente visualizzate durante la riproduzione del brano.<br>Invia commenti<br>Cronologia<br>Salvate<br>Community

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Definisce slide iniciale</b> con l'opzione <i>iniziare con</i> e la <i>durazione</i> (in secondi) del slide iniciale.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Organize i slide</b> clicando con il pulsante destro per aggiungere nuovi slide e trascinare le diapositive per ordinarle.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Imposta la durata di ciascun slide</b> (in secondi) nel campo <i>Durata</i>. inoltre è possibile modificare l'ora esatta in cui il slide si avvia facendo clic sul testo che visualizza i minuti, i secondi e i millisecondi.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> Riproduce la canzone del slide corrispondente alla fine della canzone.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> Tocca solo la parte corrispondente della diapositiva.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Puoi utilizzare <i>Metodo di acquisizione</i> per semplificare la creazione dell'ordine del slide la durata di ciascuna.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Ao salvar a <i>Apresentação Automática</i>, o arquivo gerado <b>[nome do arquivo].ap</b> já irá incluir o áudio MP3 selecionado. Você não precisa se preocupar em copiar o áudio junto com o arquivo <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=È possibile modificare il testo di alcune slide mentre sono visualizzate.<br>  - Fai clic con il pulsante destro del mouse sul slide da modificare (elenco del slide nel piè di pagina della finestra principale);<br>  - oppure premendo <b>MAIUSC + F2</b> per modificare il slide attualmente visualizzata.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=La chat è un mezzo di comunicazione tra Holyrics sul PC e l'app mobile Holyrics.<br>Qualsiasi telefono cellulare connesso alla rete può accedere alla chat tramite l'applicazione e inviare messaggi al PC.<br>

#The selected presentation will run automatically.
m0054=La presentazione selezionata verrà eseguita automaticamente

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Fare clic sul messaggio per selezionarlo.<br>Trascina un messaggio per riordinarlo nell'elenco.<br>Immettere il tasto evidenziato all'inizio del messaggio per selezionare il messaggio corrispondente. <b>(prima immagine)</b><br>Fare clic con il tasto destro del mouse sul messaggio per ulteriori opzioni. <b>(seconda immagine)</b>

#You can change the background or Theme for each paragraph
m0056=È possibile modificare lo sfondo o il tema di ciascun paragrafo

#by clicking the slide {0} icon
m0057=facendo clic sull'icona {0} sul slide

#dragging an item from themes list to the slide
m0058=trascinando un elemento dall'elenco dei temi al slide

#or by right-clicking on the slide for more options
m0059=oppure facendo clic con il tasto destro sul slide per ulteriori opzioni

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Attenzione!</b> quando si imposta l'immagine o il video come sfondo, tutte le impostazioni come il colore del carattere, l'allineamento, ecc. sarà selezionato per la canzone. Pertanto, fai attenzione quando cambi il <b>tema predefinito</b> del brano perché le immagini e i video precedentemente configurati potrebbero non corrispondere al nuovo tema selezionato.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=è una funzione che consente di utilizzare il programma come se fosse in modalità estesa anche se nessun altro monitor è collegato.<br>È possibile visualizzare una piccola finestra sul proprio monitor, simulando ciò che verrebbe visualizzato nella proiezione effettiva.<br>

#Use examples
m0062=Esempi di l'uso 

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Si sta utilizzando il programma a casa, non si dispone di un monitor ausiliario collegato e si desidera avviare le presentazioni ma non a schermo intero

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Vuoi imparare come usare il programma in modalità estesa ma non hai un monitor ausiliario

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Si utilizza il computer solo per trasmettere il slide sulla rete wifi, rendendo inutilizzabile la visualizzazione a schermo intero sul proprio schermo

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=La funcionalità <b>descrizione del slide</b> serve da facilitatore per identificare il slide nel piè di pagina della presentazione.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=La descrizione di un paragrafo/slide è definita nella finestra di modifica delle lettere, dalla funzione <b>Formattazione personalizzata</b>.

#Can be used for
m0068=Può essere utilizzata per

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=definire scorciatoie nella funzione <b>vai a</b>, ad esempio: <b><i>X</i></b> vai al slide <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=Imposta un tema predefinito, ad es. Tutte le diapositive <b><i>X</i></b> avrano il Tema <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=formattazione personalizzata, ad esempio tutte le diapositive <b><i>X</i></b> con la font itálica</b>

#<b>Go to</b> function shortcuts
m0072=Scorciatoie del sistema delle funzioni <b>vai a</b>

