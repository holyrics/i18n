#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=La scala in modalità <b>funzione</b> ha un'organizzazione diversa dalla modalità standard vecchia.<br>In questo nuovo tipo di organizzazione crei (nelle impostazioni del programma) tutte le funzioni che esistono nel ministero e poi definisci un membro per ogni funzione.<br><br>Nella modalità vecchia hai un <b>membro</b> per ogni riga e definisci se è in programma o meno, spuntando una casella.<br><br>Nella modalità nuova (funzione) hai una <b>funzione</b> per ogni riga e definisci quale <b>membro</b> è in programma per questa funzione.

