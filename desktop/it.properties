#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=È possibile creare elementi da aggiungere alla barra dei preferiti o alla lista di riproduzione che eseguono richieste HTTP o inviano codici MIDI ad altri dispositivi.\nQuesto permette di eseguire azioni in altri programmi e dispositivi, come OBS Studio, programmi di illuminazione, telecamere PTZ, ecc.\nAd esempio, è possibile creare un elemento che, quando eseguito, cambia una scena nel programma di trasmissione, o un elemento che seleziona un preset di una telecamera PTZ nella rete, ecc.\nQueste azioni possono essere eseguite cliccando sull'elemento o anche eseguite automaticamente attraverso la funzionalità <b>Triggers</b> del programma.\nAd esempio, è possibile creare un trigger affinché ogni volta che Holyrics presenta l'immagine X nella proiezione, cambia automaticamente alla scena Y nel programma di trasmissione.\nO ogni volta che presenta un versetto della Bibbia, cambia automaticamente alla scena Z nel programma di trasmissione.\nCi sono molte possibilità di automazione che facilitano e risparmiano il lavoro del team multimediale.

