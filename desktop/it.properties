#Development mode
m0894=Modalità di sviluppo

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=In modalità di sviluppo, il codice JavaScript è sincronizzato con un file nella sottocartella del programma e ogni modifica effettuata qui nel programma sarà salvata nel file, così come ogni modifica effettuata esternamente nel file sarà riflessa nel codice JavaScript salvato ed eseguito qui nel programma.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Questo consente che il codice JavaScript venga modificato da un editor esterno (l'IDE di tua scelta) e le modifiche siano automaticamente riflesse qui nel programma.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Attenzione: fai attenzione quando utilizzi questa modalità, poiché significa che il codice JavaScript che sarà eseguito in modo automatico su Holyrics si basa su un file esterno leggibile che può essere modificato da qualsiasi altro processo/programma in esecuzione sul computer.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Il nome della cartella può essere modificato, è solo obbligatorio contenere l'id dell'elemento in qualsiasi parte del nome.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=In modalità di sviluppo del Community, una sottocartella del programma viene utilizzata per memorizzare il codice JavaScript aggiuntivo che sarà caricato insieme al codice JSCommunity e ogni modifica effettuata esternamente nel file sarà riflessa nel codice "jsc" caricato ed eseguito qui nel programma.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Questo consente di creare codici che saranno utilizzati automaticamente nella struttura compatibile con "jsc", senza dover rifattorizzare il codice per inviarlo a GitHub con nuove implementazioni e modifiche.

