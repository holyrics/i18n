#Starts presentation of the item that are in the current <b>media</b> tab of <b>playlist</b> at the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0111=Avvia la presentazione dell'articolo che si trova nella scheda <b>media</b> corrente di <b>playlist</b> nella finestra principale (area destra).<br>Il valore "intensità" definisce quale elemento nell'elenco (1, 2, 3 ...)

#Starts presentation of the song lyrics that are in the current <b>playlist</b> in the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0112=Avvia la presentazione dei testi dei brani presenti nella <b>playlist</b> corrente nella finestra principale (area destra).<br>Il valore "intensità" definisce quale elemento nell'elenco (1, 2, 3 ...)<br>

#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=Quando si esegue il codice dell'azione <b> vai a slide ... </b> il programma visualizzerà la diapositiva in base al numero passato dal valore "intensità" del codice.<br>Cioè, se il valore "intensità" è 3, la presentazione corrente mostrerà la terza diapositiva in esecuzione.<br>Può essere la terza diapositiva di una canzone lirica, la terza immagine di una lista di immagini, ecc ...<br>Questa azione non avvia una presentazione, modifica solo la diapositiva di una presentazione avviata <b> </b>..

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=Se la presentazione è una canzone lirica, la numerazione inizia a contare dal primo paragrafo dei testi. La diapositiva con il <b> titolo e artista </b> è la diapositiva numero zero.

