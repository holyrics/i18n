#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Stage weergave</b> is een instelling die het weergeven van slides naar een specifieke monitor wijzigt. <br> Als u een video-uitvoer hebt voor een publieke weergave-projectie, en u een andere video-uitvoer hebt voor iemand die op het <b> Podium</b> is, dan kunt u de <b>retour</b>Monitor anders instellen dan die aan het publiek wordt getoond. <br> De verzending naar de app is ook aan te passen.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>selectievakje:</b> Breng een wijziging in de slide tekst aan. E.g: de eerste regel van de volgende dia aan het einde van de huidige dia weergeven.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Hoofdletters:</b> Geeft de volledige tekst in hoofdletters weer.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Verwijder de zinsonderbreking:</b> Geeft de tekst continu weer, de lijn breekt automatisch op de limiet van de slide en het neemt zoveel mogelijk ruimte in.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Aangepaste thema:</b> Wijzigt het display thema van de slides.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Inschakelen voor Bijbel:</b> Hiermee kunt u de instellingen voor bijbelverzen (behalve de selectievakjesinstelling) in staat.

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Opmerking: video-thema's werken niet op stage schermen, alleen op de standaardmonitor.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=U kunt een aangepaste editie toevoegen aan een specifieke paragraaf van de tekst. Vergroot bijvoorbeeld <b>proportioneel</b> het lettergrootte. <br>En ook een identificatie-tekst (Chorus, vers, enz ...) die alleen in de slide-voettekst verschijnt.

#View example
m0009=Bekijk voorbeeld

#This feature also works in the Quick Display window
m0010=Deze functie werkt ook in het snel weergavevenster

#Available Settings
m0011=Beschikbare instellingen

#All text in uppercase
m0012=Alle tekst in hoofdletters

#putting the character '%' after the number is useless
m0013=het teken "%" plaatsen na het nummer is zinloos

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=tekst binnen haakjes = (chorus), (vers), (herhaal), (laatste), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=RGB of hexadecimale waarde of kleurnaam in blokhaken = [128.192.64] of [80C040] of [FF0] of [Blauw] ...

#Valid names
m0016=Geldige namen

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Om een ​​aangepaste opmaak toe te voegen, voegt u een regel toe aan het begin van de paragraaf die begint met twee "hashtags" ## en de codes die u wilt toevoegen daarna(de volgorde van de codes doet er niet toe).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=In het voorbeeld, bij het weergeven van de tekst voor presentatie, verschijnt de tweede alinea vetgedrukt, met de lettergrootte 15% vergroot en in blauwe kleur. De andere paragrafen verschijnen zoals gewoonlijk met thema-instellingen.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Opmerking: als het gebruikte thema al is ingesteld op vetgedrukt bijvoorbeeld, zal deze aangepaste opmaak geen verschil maken.

#Some formatting examples
m0020=Sommige formatteervoorbeelden

#Bold and italic
m0021=Vet en cursief

#25% bigger
m0022=25% groter

#italic and 5% lower
m0023=cursief en 5% lager

#Uppercase and yellow
m0024=Hoofdletters en geel

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=U kunt aangeven welke zinnen aangepaste opmaak toegepast zullen hebben <br> Voeg twee streepjes toe <b>-</b> aan het begin van de regel waar u geen aangepaste opmaak wilt hebben.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=In het voorbeeld, de <b>", maar het is nog steeds weinig dat ik ken '</b> lijn gebruikt de originele opmaak van het thema en de andere regels gebruiken aangepaste opmaak (vet en geel).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=U kunt de <code> ## P </ code> code gebruiken om <b>Standaard</b> Formatteren te gebruiken. <br> Alle alinea's die zijn aangegeven met <code> ## P </ code> zullen het formaat gebruiken zoals in het vlak hieronder aanegeven

#Default Custom Formatting
m0028=Standaard aangepaste opmaak

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Elke lijst staat voor een interne map in Holyrics: audio, video en afbeelding. Om bestanden toe te voegen: klik op het pictogram {0} van het respectieve tablad om de map in Windows te openen en de bestanden in de map te plakken. De lijst in het programma wordt automatisch bijgewerkt met de bestanden in de map (tenzij er een presentatie aan staat).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Opmerking:</b> Vermijd het hernoemen van de bestanden in de map, omdat als u een snelkoppeling maakt naar een bestand in een afspeellijst, favorieten, enz. en vervolgens de naam in de map hernoemt, de snelkoppeling in het programma werkt dan niet langer, dan moet er een nieuwe snelkoppeling gemaakt worden.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=In elke map (audio, video en afbeelding) kunt u nieuwe mappen toevoegen als een lijst met bestanden in het programma. Bijvoorbeeld: u kunt bijvoorbeeld een map maken met de naam <b>Presentatie</b> in de map <b>Afbeeldingen</b> en hiermee afbeeldingen toevoegen. De map wordt vermeld, heeft een item in de Holyrics-interface en door erop te klikken openen alle afbeeldingen voor de diavoorstelling.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=U kunt een snelkoppeling toevoegen aan deze mappen op uw bureaublad door te klikken op <a href='http://addShortcutDesktop'>HIER</a>.

#Holyrics Library
m0033=Holyrics-bibliotheek

#Displays the song lyric in uppercase.
m0034=Geeft de songtekst in hoofdletters weer.

#Enable/disable the underline in the song title at first slide.
m0035=Schakel de onderstreping in of uit in de songtitel in de eerste dia.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Wanneer <b>ingeschakeld</b>, zal het programma automatisch lange regels afbreken, dit vermijdt dat de oorspronkelijke grootte van het lettertype verkleint moet worden. Wanneer <b>uitgeschakeld</b>, als u lange zinnen hebt die zich buiten de zijkant van de dia uitbreiden, zal het programma de lettergrootte verminderen totdat de hele regel in de slide past.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Inschakelen / Uitschakelen van de paragraaf <a href='http://customformatie'> Custom Forming </a>.

#Enable/disable <b>Custom Background</b>.
m0038=Inschakelen / Uitschakelen van de <b>Aangepaste achtergrond</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Het paneel <b>Live</b> toont wat momenteel wordt gepresenteerd op het standaard scherm. <br>(Achtergrond en video afgespeeld door VLC Media Player verschijnen niet op het paneel.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Als u een unieke retourmonitor gebruikt voor degenen op het "podium", kunt u het communicatiepaneel gebruiken om alleen berichten op deze monitor weer te geven. <br> in de weergave-instellingen U kunt een monitor instellen als <b>Stage-weergave </b> (behalve de belangrijkste publieksmonitor), en de berichten in het communicatiepaneel worden alleen weergegeven op monitoren die zijn ingesteld als <b>Stage-weergave</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Zet de audio aan en klik op de slide die u wilt laten zien terwijl het nummer wordt afgespeeld. <br> U kunt een deel van het nummer pauzeren en terugspoelen om te hervatten van waar u bent gestopt. <br> U kunt ook een item van de lijst verwijderen door er met de rechtermuisknop op te klikken.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=De slide die wordt weergegeven vóór de eerste dia die u aanklikt, is degene die aangegeven is in het bewerkingsvenster.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Verwacht niet om het songgedeelte te starten om op de specifieke dia te klikken, probeer een paar duizenden van een seconde op de dia te klikken van te voren, waardoor vertragingen in de overgang tussen de dia's vermijden.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Met de <b>automatische presentatie</b> kunt u de duur van elke slide programmeren die is geïntegreerd in een MP3-audio (bijvoorbeeld een instrumentale versie, bijvoorbeeld). <br> Eenmaal gemaakt, kunt u een thema kiezen die u wilt en de Presentatie starten. <br> De audio wordt afgespeeld door de mediaspeler en de slides worden automatisch weergegeven terwijl het nummer wordt afgespeeld.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Stel de initiële slide</b> in met de <i>Start met</i> optie en de <i>-duur</i> (in seconden) van de initiële slide.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Stel de slides in</b>gebruik de rechtermuisknop om nieuwe slides toe te voegen en de slides te slepen om ze te sorteren.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Stel de duur van elke slide in</b> (in seconden) in het veld <i>-duur</i>. U kunt ook de exacte tijd wijzigen dat de dia start door op de tekst te klikken die de minuten, seconden en milliseconden weergeeft.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> Speel het nummer van de overeenkomstige slide tot het einde van het nummer.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>| ► |</b> speelt alleen het gedeelte van de overeenkomende slide af.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=U kunt de <i>Capture-methode</i> gebruiken om het gemakkelijker te maken om de volgorde van de slides en de duur van elk te bepalen.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Bij het opslaan van de <i>Automatische presentatie</i>, zal het aangemaakte <b>[Bestandsnaam] .AP</b> -bestand al de geselecteerde MP3-audio bevatten. U hoeft zich geen zorgen te maken over het kopiëren van de audio samen met het bestand <b>(*. AP)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=U kunt de tekst van bepaalde slides bewerken terwijl ze worden weergegeven. <br> - met de rechtermuisknop klikken op de slide die u wilt bewerken (slides lijst in de voettekst van het hoofdvenster); <br> - of door op <b>te drukken SHIFT + F2</b> Om de momenteel weergegeven slide te bewerken.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Chat is een gemiddelde communicatie tussen Holyrics-software en de mobiele app van de Holyrics. <br> Elke smartphone die op het netwerk is aangesloten, heeft toegang tot de chat via de app en verzend berichten naar pc.

#The selected presentation will run automatically.
m0054=De geselecteerde presentatie wordt automatisch uitgevoerd.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Klik op het bericht om te selecteren. <br> Sleep een bericht om in de lijst opnieuw te ordenen. <br> Voer de gemarkeerde toets aan aan het begin van het bericht om het overeenkomstige bericht te selecteren. <b>(Eerste afbeelding)</b> Met de rechtermuisknop op het bericht voor meer opties. <b>(tweede afbeelding)</b>

#You can change the background or Theme for each paragraph
m0056=U kunt de achtergrond of thema voor elke alinea wijzigen

#by clicking the slide {0} icon
m0057=door op het pictogram Dia {0} te klikken

#dragging an item from themes list to the slide
m0058=Een item slepen van thema's lijst naar de dia

#or by right-clicking on the slide for more options
m0059=of door met de rechtermuisknop op de dia te klikken voor meer opties

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>WAARSCHUWING!</b> Bij het instellen van afbeelding of video als achtergrond, worden alle instellingen zoals lettertypekleur, uitlijning, enz. Behouden van het geselecteerde songthema. Dus wees voorzichtig bij het wijzigen van het <b>standaardthema</b> van de song, omdat eerder geconfigureerde afbeeldingen en video's mogelijk niet overeenkomen met het nieuwe thema dat u hebt geselecteerd.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=Het is een functie waarmee u de software kunt gebruiken alsof u in een uitgebreide modus was, ook al heb je nog geen andere monitor bijgevoegd. <br> U kunt een klein venster op uw eigen monitor weergeven, simuleren wat in de daadwerkelijke projectie wordt weergegeven .

#Use examples
m0062=Gebruik voorbeelden

