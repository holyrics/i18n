#Development mode
m0894=Ontwikkelingsmodus

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=In de ontwikkelingsmodus wordt de JavaScript-code gesynchroniseerd met een bestand in de submap van het programma en elke wijziging die hier in het programma wordt aangebracht, wordt opgeslagen in het bestand, net zoals elke wijziging die extern in het bestand wordt aangebracht, zal worden weerspiegeld in de opgeslagen en hier in het programma uitgevoerde JavaScript-code.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Dit maakt het mogelijk dat de JavaScript-code kan worden bewerkt door een externe editor (de IDE van uw keuze) en de wijzigingen automatisch hier in het programma worden weerspiegeld.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Let op: wees voorzichtig bij het gebruik van deze modus, want dit betekent dat de JavaScript-code die automatisch in Holyrics wordt uitgevoerd, is gebaseerd op een extern leesbaar bestand dat door elk ander proces/programma dat op de computer draait, kan worden bewerkt.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=De naam van de map kan worden gewijzigd, maar het is verplicht dat het id van het item op enige plaats in de naam voorkomt.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=In de ontwikkelingsmodus van de Community wordt een submap van het programma gebruikt om de extra JavaScript-code op te slaan die samen met de JSCommunity-code zal worden geladen, en elke wijziging die extern in het bestand wordt aangebracht, zal worden weerspiegeld in de "jsc"-code die hier in het programma wordt geladen en uitgevoerd.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Dit maakt het mogelijk om codes te creëren die automatisch zullen worden gebruikt in de structuur die compatibel is met "jsc", zonder de code te refactoren om deze naar GitHub te sturen met nieuwe implementaties en wijzigingen.

