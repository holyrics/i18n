#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Het is mogelijk om items te maken om toe te voegen aan de favorietenbalk of de afspeellijst die HTTP-verzoeken uitvoeren of MIDI-codes naar andere apparaten verzenden.\nDit maakt het mogelijk om acties uit te voeren in andere programma's en apparaten, zoals OBS Studio, verlichtingssoftware, PTZ-camera's, enz.\nBijvoorbeeld, het is mogelijk om een item te maken dat, wanneer uitgevoerd, een scène in je uitzendingprogramma verandert, of een item dat een preset van een PTZ-camera in het netwerk selecteert, enz.\nDeze acties kunnen worden uitgevoerd door op het item te klikken of automatisch worden uitgevoerd via de <b>Triggers</b> functionaliteit van het programma.\nBijvoorbeeld, het is mogelijk om een trigger te maken zodat telkens wanneer Holyrics afbeelding X in de projectie toont, automatisch verandert naar scène Y in je uitzendingprogramma.\nOf telkens wanneer een vers uit de Bijbel wordt gepresenteerd, automatisch verandert naar scène Z in je uitzendingprogramma.\nEr zijn veel automatiseringsmogelijkheden die het werk van het multimedia-team vergemakkelijken en besparen.

