#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=Când executați codul acțiunii <b>mergeți la diapozitiv...</b>, programul va afișa diapozitivul bazat pe numărul trecut prin valoarea "intensitate" a codului.<br>Adică, dacă valoarea "intensitate" este 3, prezentarea curentă va afișa al treilea diapozitiv în execuție.<br>Puteți fi al treilea diapozitiv dintr-un text de melodie, a treia imagine dintr-o listă de imagini, etc...<br>Această acțiune nu inițiază o prezentare, ci doar schimbă diapozitivul unei prezentări <b>deja inițiate</b>.

