m0083=Ultimul slide afișat

#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=este o funcționalitate pentru a utiliza coduri care vor fi înlocuite cu valori variabile definite în sistem, cum ar fi: data și ora.<br>Pentru a utiliza, pur și simplu tastați codul împreună cu textul. Funcționează în versuri, alerte, panou de comunicare, ...

#of <b>all</b> songs<br>on the playlist.
m0085=de <b>toate</b> melodiile<br>din lista de redare.

#of <b>played</b> songs<br>on the playlist.
m0086=al melodiilor <b>redate</b><br>în lista de redare.

#of <b>not played</b> songs<br>on the playlist.
m0087=al melodiilor <b>neredate</b><br>în lista de redare.

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=Membru responsabil<br>pentru serviciu divin/eveniment și lista<br>de membri programați.

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>Titlu și artist</b> al următoarei melodii<br>care NU este marcată ca <b>redată</b><br>în lista de redare.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>Titlu</b> al următoarei melodii care<br>NU este marcată ca <b>redată</b><br>în lista de redare.

#Stage Display (as configured)
m0091=Monitor de retur (conform configurației)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=Puteți include linii ca <b>comentariu</b> în versurile melodiei sau prezentarea rapidă.<br>Comentariile vor fi afișate doar pe monitoarele de retur, conform setărilor din <b>Setările de Afișare</b>.

#To define a line as a comment, start a line with "two slash" //
m0093=Pentru a defini o linie ca comentariu, începeți linia cu "două bare" //

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=Setările de culoare și font ale comentariului pot fi modificate în fereastra de editare a <b>Temelor</b>

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=Redarea video pe mai multe ecrane poate suprasolicita procesarea computerului.<br>Fiți atenți și moderați în utilizarea acestei funcționalități pe computere cu performanțe reduse.

#Error loading dictionary
m0096=Eroare la încărcarea dicționarului

#The program will be closed to apply the changes.\nClick OK and open the program again.
m0097=Programul va fi închis pentru a aplica modificările.\nFaceți clic pe OK și deschideți din nou programul.

#ffmpeg file not found.
m0098=Fișier ffmpeg nu a fost găsit.

#Unable to identify video duration.
m0099=Nu s-a putut identifica durata videoclipului.

#Unable to identify video resolution.
m0100=Nu s-a putut identifica rezoluția video.

#Error starting process.
m0101=Eroare la inițierea procesului.

#Check the files and try again.
m0102=Verificați fișierele și încercați din nou.

#Process has been interrupted
m0103=Proces oprit

