#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=Scala în modul <b>funcție</b> are o organizare diferită față de modul standard vechi.<br>În acest nou tip de organizare, creați (în setările programului) toate funcțiile care există în minister și apoi definiți un membru pentru fiecare funcție.<br><br>În modul vechi, aveți un <b>membru</b> pe fiecare linie și definiți dacă este programat sau nu, marcând o căsuță.<br><br>În modul nou (funcție), aveți o <b>funcție</b> pe fiecare linie și definiți care <b>membru</b> este programat pentru această funcție.

