#Development mode
m0894=Mod de dezvoltare

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=În modul de dezvoltare, codul JavaScript este sincronizat cu un fișier din subfolderul programului și orice modificare efectuată aici în program va fi salvată în fișier, la fel ca orice modificare efectuată extern în fișier va fi reflectată în codul JavaScript salvat și executat aici în program.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Acest lucru permite ca codul JavaScript să fie editat de un editor extern (IDE-ul preferat) și modificările să fie reflectate automat aici în program.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Atenție: aveți grijă când utilizați acest mod, deoarece înseamnă că codul JavaScript care va fi executat automat în Holyrics se bazează pe un fișier extern lizibil care poate fi editat de orice alt proces/program în execuție pe computer.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Numele folderului poate fi modificat, dar este obligatoriu să conțină id-ul elementului în orice loc al numelui.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=În modul de dezvoltare al Community, un subfolder al programului este utilizat pentru a stoca codul JavaScript suplimentar care va fi încărcat împreună cu codul JSCommunity și orice modificare efectuată extern în fișier va fi reflectată în codul "jsc" încărcat și executat aici în program.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Acest lucru permite crearea de coduri care vor fi utilizate automat în structura compatibilă cu "jsc", fără a fi nevoie să refactorizăm codul pentru a-l trimite pe GitHub cu noi implementări și modificări.

