#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Este posibil să creați elemente pentru a le adăuga în bara de favorite sau în lista de redare care execută cereri HTTP sau trimit coduri MIDI către alte dispozitive.\nAceasta permite executarea de acțiuni în alte programe și dispozitive, cum ar fi OBS Studio, program de iluminare, camere PTZ etc.\nDe exemplu, este posibil să creați un element care, atunci când este executat, schimbă o scenă în programul dvs. de transmisie sau un element care selectează un preset de cameră PTZ în rețea etc.\nAceste acțiuni pot fi executate făcând clic pe element sau pot fi, de asemenea, executate automat prin funcționalitatea <b>Declanșatoare</b> a programului.\nDe exemplu, este posibil să creați un declanșator astfel încât, de fiecare dată când Holyrics prezintă imaginea X în proiecție, să schimbe automat la scena Y în programul dvs. de transmisie.\nSau de fiecare dată când prezintă un verset din Biblie, să schimbe automat la scena Z în programul dvs. de transmisie.\nSunt multe posibilități de automatizare care facilitează și economisesc munca echipei de multimedia.

