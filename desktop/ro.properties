#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Viziunea Scenei</b> este o setare care schimbă afișarea diapozitivelor pentru un monitor specific.<br>Dacă ai o ieșire video pentru proiecția vizibilă publicului și ai o altă ieșire video pentru cei de pe <b>scenă</b>, poți configura monitorul de <b>retur</b> diferit de ceea ce este afișat publicului.<br>Transmisia pentru aplicație este de asemenea configurabilă.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Caseta de selectare:</b> Fă o modificare în textul diapozitivului. Ex.: Afișează prima linie a următorului diapozitiv la sfârșitul diapozitivului actual.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Majuscule:</b> Afișează tot textul cu majuscule.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Elimină întreruperea de linie:</b> Afișează textul într-un mod continuu, întrerupând linia automat la limita diapozitivului și ocupând cât mai mult spațiu lateral posibil.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Tema Personalizată:</b> Schimbă tema de afișare a diapozitivului.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Activează pentru Biblie:</b> Activează setările și pentru versetele Bibliei (cu excepția setării casetei de selectare).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Obs.: Temele video nu funcționează pe monitoare de retur, doar pe monitorul publicului.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Poți adăuga o editare personalizată pentru un paragraf specific al versului. De exemplu, să crești <b>proporțional</b> dimensiunea fontului refrenului.<br>Și de asemenea să pui un text de identificare (refren, vers, etc...) care va apărea doar în subsolul diapozitivelor.

#View example
m0009=Vezi exemplu

#This feature also works in the Quick Display window
m0010=Această opțiune funcționează și în fereastra de Prezentare Rapidă

#Available Settings
m0011=Setări disponibile

#All text in uppercase
m0012=Tot textul cu majuscule

#putting the character '%' after the number is useless
m0013=a pune caracterul '%' după număr este inutil

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=text în paranteze = (refren), (vers), (repeti), (final), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=valoare rgb, hexazecimală sau numele culorii între paranteze = [128,192,64] sau [80c040] sau [ff0] sau [albastru]...

#Valid names
m0016=Nume valide

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Pentru a adăuga o formatare personalizată, adaugă o linie la începutul paragrafului începând cu două "hashtags" ## și codurile dorite imediat după (ordinea codurilor nu contează).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=De exemplu, când se prezintă versurile pentru proiecție, al doilea paragraf va fi prezentat cu litere îngroșate, cu dimensiunea fontului cu 15% mai mare și în culoarea albastră. Celelalte paragrafe vor fi prezentate normal cu setările temei.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Obs.: Dacă tema utilizată este deja configurată pentru îngroșare, de exemplu, această formatare personalizată nu va face diferență.

#Some formatting examples
m0020=Câteva exemple de formatare

#Bold and italic
m0021=Îngroșat și italic

#25% bigger
m0022=25% mai mare

#italic and 5% lower
m0023=italic și cu 5% mai mic

#Uppercase and yellow
m0024=Majuscule și galben

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Este posibil să definești ce linii vor avea aplicată formatarea personalizată.<br> Adaugă două linii <b>--</b> la începutul liniei la care nu dorești să aplici formatarea personalizată.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=În exemplul urmator, linia <b>"Dar știu că este puțin"</b> va folosi formatarea originală a temei, iar celelalte linii vor folosi formatarea personalizată (îngroșat și galben).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Poți folosi codul <code>##p</code> pentru a utiliza o formatare <b>standard</b>.<br>Toate paragrafele definite cu <code>##p</code> vor folosi formatarea definită în câmpul de mai jos.

#Default Custom Formatting
m0028=Formatare Personalizată Standard

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Fiecare listă reprezintă un dosar intern al programului Holyrics: Audio, Video și Imagine. Pentru a adăuga fișiere: dă clic pe pictograma {0} din fila respectivă pentru a deschide dosarul în Windows și lipește fișierele în dosar. Lista din program se actualizează automat cu fișierele din dosar (cu excepția cazului în care o prezentare este activă).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Notă:</b> EVITAȚI să redenumiți fișierele din folder, deoarece dacă creați un shortcut pentru un fișier dintr-o listă de redare, favorite etc. și apoi îl redenumiți în folder, shortcutul din program nu va mai funcționa, va trebui să creați un nou shortcut.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=În fiecare dintre foldere (Audio, Video și Imagine), puteți crea alte foldere pentru a fi o listă de fișiere în program. De exemplu: Puteți crea un folder numit <b>Prezentare</b> în folderul <b>Imagini</b> și adăuga imagini în el. Folderul va fi un element din lista din programul Holyrics și, făcând clic pe el, toate imaginile vor fi deschise pentru prezentarea de diapozitive.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Puteți adăuga un shortcut pentru aceste foldere pe desktopul dvs. făcând clic <a href='http://addShortcutDesktop'>AICI</a>.

#Holyrics Library
m0033=Biblioteca Holyrics

#Displays the song lyric in uppercase.
m0034=Afișează versurile melodiei cu majuscule.

#Enable/disable the underline in the song title at first slide.
m0035=Activează/dezactivează sublinierea titlului melodiei din primul diapozitiv.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Cu opțiunea <b>activată</b>, programul va împărți automat liniile lungi, evitând micșorarea dimensiunii originale a fontului. Cu opțiunea <b>dezactivată</b>, dacă există o linie lungă care depășește marginea diapozitivului, programul va micșora dimensiunea fontului până când întreaga linie se încadrează în diapozitiv.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Activează/dezactivează paragraful <a href='http://customFormatting'>formatarea personalizată</a>.

#Enable/disable <b>Custom Background</b>.
m0038=Activează/dezactivează <b>fundalul personalizat</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Panoul <b>LIVE</b> arată ce este prezentat în prezent în proiecția principală.<br>(Fundalul și videoclipul redat de VLC Media Player nu apar în panou.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Dacă utilizați un monitor de returnare exclusiv pentru cei de pe 'scenă', puteți folosi panoul de comunicare pentru a prezenta mesaje doar pe acest monitor.<br>În setările de afișare, puteți defini un monitor ca <b>viziune de scenă</b> (cu excepția monitorului principal al publicului), iar mesajele din panoul de comunicare vor fi afișate doar pe monitoarele definite ca <b>viziune de scenă</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Puneți audio să redea și faceți clic pe diapozitivul pe care doriți să fie prezentat în timp ce melodia este redată.<br>Puteți pune pe pauză și reveni la o secțiune a melodiei pentru a relua de unde ați rămas.<br>De asemenea, puteți șterge un element din lista de capturi făcând clic dreapta.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Diapozitivul care va fi prezentat înainte de primul diapozitiv pe care faceți clic este cel definit în fereastra de editare.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Nu așteptați să înceapă secțiunea melodiei pentru a face clic pe diapozitivul specific, încercați să faceți clic pe diapozitiv cu câteva milisecunde înainte, evitând întârzierile în tranziția între diapozitive.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Cu <b>Prezentare Automată</b> puteți programa durata fiecărui diapozitiv integrat într-un audio MP3 (un playback, de exemplu).<br>După ce a fost creat, puteți alege orice temă doriți și începeți prezentarea.<br>Audio va fi redat de Media Player și diapozitivele vor fi afișate automat în timp ce melodia este redată.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Definiți diapozitivul inițial</b> cu opțiunea <i>Începeți cu</i> și <i>durata</i> (în secunde) a diapozitivului inițial.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Organizați diapozitivele</b> făcând clic dreapta pentru a adăuga diapozitive noi și trăgând diapozitivele pentru a le ordona.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Definiți durata fiecărui diapozitiv</b> (în secunde) în câmpul <i>Durată</i>. De asemenea, puteți schimba timpul exact în care diapozitivul începe făcând clic pe textul care arată minutele, secundele și milisecundele.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> redă melodia de la diapozitivul corespunzător până la sfârșitul melodiei.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> redă doar secțiunea diapozitivului corespunzător.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Poți utiliza <i>Metoda de captură</i> pentru a facilita crearea ordinii diapozitivelor și durata fiecăruia.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Când salvezi <i>Prezentarea Automată</i>, fișierul generat <b>[numele fișierului].ap</b> va include deja audio MP3 selectat. Nu trebuie să-ți faci griji cu privire la copierea fisierului audio împreună cu fișierul <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Poți edita textul anumitor diapozitive în timp ce sunt prezentate.<br> - Făcând clic dreapta pe diapozitivul pe care dorești să-l editezi (lista de diapozitive din partea de jos a ferestrei principale);<br> - sau apăsând <b>SHIFT + F12</b> pentru a edita diapozitivul care este afișat în acel moment.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Chatul este un mijloc de comunicare între Holyrics pe PC și aplicația Holyrics pentru mobil.<br>Orice telefon mobil conectat la rețea poate accesa chatul prin aplicație și trimite mesaje către PC.

#The selected presentation will run automatically.
m0054=Prezentarea selectată va fi redată automat.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Fă clic pe mesaj pentru a-l selecta.<br>Trage un mesaj pentru a-l reordona în listă.<br>Apasă tasta evidențiată la începutul mesajului pentru a selecta mesajul corespunzător. <b>(prima imagine)</b><br>Fă clic dreapta pe mesaj pentru mai multe opțiuni. <b>(a doua imagine)</b>

#You can change the background or Theme for each paragraph
m0056=Poți schimba fundalul sau Tema fiecărui paragraf

#by clicking the slide {0} icon
m0057=făcând clic pe pictograma {0} a diapozitivului

#dragging an item from themes list to the slide
m0058=trăgând un element din lista de teme pe diapozitiv

#or by right-clicking on the slide for more options
m0059=sau făcând clic dreapta pe diapozitiv pentru mai multe opțiuni

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Atenție!</b> Când definești o imagine sau un videoclip ca fundal, toate setările precum culoarea fontului, alinierea etc. vor fi ale Temei selectate pentru melodie. Așadar, fii atent când schimbi <b>Tema implicită</b> a melodiei, deoarece imaginile și videoclipurile configurate anterior pot să nu se potrivească cu noua temă selectată.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=este o funcție care îți permite să folosești programul ca și cum ai fi în modul extins, chiar dacă nu ai alte monitoare conectate.<br>Puteți afișa o fereastră mică pe propriul monitor, simulând ceea ce ar fi afișat în proiecția reală.

#Use examples
m0062=Exemple de utilizare

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Folosești programul acasă, nu ai un monitor auxiliar conectat și ai dori să începi prezentări, dar nu în modul pe ecran complet

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Vrei să înveți să folosești programul în modul extins, dar nu ai un monitor auxiliar

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Folosești computerul doar pentru a transmite diapozitivele prin rețeaua wifi, făcând inutilă afișarea pe ecran complet pe propriul ecran

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=Funcționalitatea <b>Descrierea Diapozitivului</b> servește ca facilitator pentru identificarea diapozitivului în partea de jos a prezentării.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Descrierea unui paragraf/diapozitiv este definită în fereastra de editare a versurilor, prin funcția <b>Formatare Personalizată</b>.

#Can be used for
m0068=Poate fi utilizat pentru

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=definirea scurtăturilor în funcția <b>mergi la</b>, ex.: litera <b><i>X</i></b> mergi la diapozitivul <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=definirea unei Teme implicite, ex.: toate slide-urile <b><i>X</i></b> vor avea Tema <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=formatare personalizată, ex.: toate slide-urile <b><i>X</i></b> cu font italic</b>

#<b>Go to</b> function shortcuts
m0072=Scurtături ale sistemului funcției <b>mergi la</b>

#Song presentation
m0073=Prezentarea cântării

#Other presentations
m0074=Alte prezentări

#First paragraph of the song
m0075=Primul paragraf al melodiei

#Second slide of presentation
m0076=Al doilea slide al prezentării

#Last paragraph of the song
m0077=Ultimul paragraf al melodiei

