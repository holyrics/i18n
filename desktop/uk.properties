#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Сценічний перегляд</b> — це налаштування, яке змінює показ слайдів на певному моніторі. <br>Якщо у вас є відеовихід для проєктора, що показує загальнодоступне зображення, і ще один відеовихід для ведучого на <b>сцені</b>, ви можете налаштувати <b>сценічний монітор</b> таким чином, щоб він показував інший контент, ніж той, що бачать глядачі. <br>Передача до мобільного застосунку також налаштовується.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Прапорець:</b> Встановити зміну в тексті слайда. Наприклад: Показати перший рядок наступного слайда в кінці поточного слайда.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Верхній регістр:</b>  Показує весь текст ВЕЛИКИМИ ЛІТЕРАМИ.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Видалити перенос рядка:</b> Показує текст безперервно, автоматично розриваючи рядки на межі слайда та максимально заповнюючи боковий простір.\n

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Персоналізована тема:</b> Змінює тему показу слайдів.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Увімкнути для Біблії:</b> Застосовує налаштування також до біблійних віршів (за винятком налаштування, відміченого прапорцем).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Примітка. Відеотеми не працюють на сценічних моніторах. Лише на моніторі за умовчанням.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Ви можете внести персоналізовані зміни до певного абзацу тексту пісні. Наприклад, <b>пропорційно</b> збільшити розмір шрифту для хору. <br>Також можна додати текст для ідентифікації (наприклад, "приспів", "куплет" тощо), який буде показано лише у нижньому колонтитулі слайда.

#View example
m0009=Переглянути приклад

#This feature also works in the Quick Display window
m0010=Ця функція також працює у вікні Швидкого Показу

#Available Settings
m0011=Доступні налаштування

#All text in uppercase
m0012=Весь текст у верхньому регістрі

#putting the character '%' after the number is useless
m0013=Ставити символ '%' після числа не потрібно

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=Текст в дужках = (приспів), (куплет), (повтор), (кінцівка), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb або шістнадцяткові значення або назва кольору в квадратних дужках = [128,192,64], [80c040] або [ff0] або [blue].

#Valid names
m0016=Допустимі назви

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Щоб додати персоналізоване форматування, додайте рядок на початку абзацу, починаючи з двох «хештегів» ## а потім потрібні коди  (порядок кодів не має значення).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=У прикладі, при показі тексту пісні на проєкторі, другий абзац буде жирним шрифтом, на 15% більшого розміру та синього кольору. Решта абзаців зазвичай матимуть формат відповідно до теми презентації.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Примітка. Якщо в поточній темі вже використовується жирний шрифт, то це персоналізоване налаштування не впливатиме.

#Some formatting examples
m0020=Деякі приклади форматування

#Bold and italic
m0021=Жирний і курсивний

#25% bigger
m0022=Більший на 25%

#italic and 5% lower
m0023=Курсивний та менший на 5%

#Uppercase and yellow
m0024=Верхній регістр та жовтий колір

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Ви можете визначати, до яких рядків застосовуватиметься персоналізоване форматування.<br> Додайте два тире <b>--</b> на початку рядка, щоб визначити рядок для застосування персоналізованого форматування.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=У прикладі в рядку <b>"Mas ainda é pouco eu sei"</b> буде використано оригінальне форматування теми, а в інших рядках буде застосовано персоналізоване форматування (жирний шрифт і жовтий колір).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Ви можете використовувати код <code>##p</code> для використання <b>стандартного</b> форматування.<br>Усі абзаци, визначені за допомогою <code>##p</code>, використовуватимуть форматування, визначене в полі нижче.

#Default Custom Formatting
m0028=Персоналізоване форматування за замовчуванням

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Кожен список являє собою внутрішню папку програми Holyrics: Аудіо (Audio), Відео (Video) та Зображення (Image). Щоб додати файли: Натисніть на іконку {0} відповідної вкладки, щоб відкрити папку у Windows і вставити файли в папку. Список у програмі автоматично оновлюється файлами з папки (якщо тільки не активна якась презентація).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Примітка:</b> Уникайте перейменування файлів у теці, тому що якщо ви створите ярлик до файлу в списку відтворення, обране і т.д., а потім перейменуєте його в теці, ярлик у програмі більше не буде працювати, вам потрібно буде створити новий ярлик.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=У кожній папці (Аудіо, Відео та Зображення) ви можете додавати нові папки, які будуть списком файлів у програмі. \nНаприклад: ви можете створити папку з назвою <b>Презентація</b> у папці <b>Зображення</b> і додати до неї зображення. Папка буде показана як пункт списку в інтерфейсі Holyrics, і натискання на нього відкриє всі зображення для слайд-шоу.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Ви можете додати ярлик до цих папок на робочому столі, натиснувши <a href='http://addShortcutDesktop'>ТУТ</a>.

#Holyrics Library
m0033=Бібліотека Holyrics

#Displays the song lyric in uppercase.
m0034=Показує текст пісні у верхньому регістрі.

#Enable/disable the underline in the song title at first slide.
m0035=Увімкнути/вимкнути підкреслення назви пісні на першому слайді.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Якщо <b>увімкнено</b>, програма автоматично розбиває довгі рядки, уникаючи зменшення оригінального розміру шрифту. \nЯкщо <b>вимкнено</b>, якщо у вас є будь-які довгі рядки, які виходять за край слайду, програма зменшуватиме розмір шрифту, доки весь рядок не поміститься на слайді.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Увімкнути/вимкнути пункт <a href='http://customFormatting'>персоналізованого форматування</a>.

#Enable/disable <b>Custom Background</b>.
m0038=Увімкнути/вимкнути <b>Персоналізований Фон</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Панель <b>LIVE</b> показує, що наразі транслюється на дисплеї за замовчуванням.<br>(Фон та відео, що відтворюються через VLC Media Player, не будуть показані на панелі.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Якщо для людей на "сцені" ви використовуєте окремий сценічний монітор, ви можете використовувати панель комунікації, щоб показувати повідомлення лише на цьому моніторі.<br>У налаштуваннях дисплея ви можете назначити монітор як <b>Сценічний перегляд</b> (крім головного монітора для аудиторії). Повідомлення на панелі комунікації будуть показані лише на моніторах, призначених як <b>Сценічний перегляд</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Увімкніть аудіо та натисніть на слайд, який має бути показаний під час відтворення пісні.<br> Ви можете призупинити відтворення та перемотати назад, щоб продовжити з потрібного моменту<br> Ви також можете видалити елемент зі списку записів, клацнувши на нього правою кнопкою миші.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Слайд, який буде показано перед першим слайдом, який ви натискаєте, - це слайд, який визначається у вікні редагування.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Не потрібно чекати початку звучання пісні, щоб натиснути на потрібний слайд. Намагайтеся зробити це на кілька тисячних секунд раніше, щоб уникнути затримки переходів між слайдами

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=За допомогою <b>Автоматичної презентації</b> ви можете запрограмувати тривалість кожного слайда, інтегрованого в аудіозапис у форматі MP3 (наприклад, в інструментальній версії).<br>Після створення ви можете вибрати будь-яку тему і запустити презентацію.<br>Аудіо буде відтворюватися медіаплеєром, а слайди будуть автоматично показані під час відтворення композиції.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Встановіть початковий слайд</b> за допомогою опції <i>Розпочати з</i> та вкажіть <i>тривалість</i> початкового слайду (у секундах).

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Налаштування слайдів</b> натисніть правою кнопкою миші, щоб додати нові слайди, і перетягніть слайди, щоб впорядкувати їх.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Встановіть тривалість кожного слайда</b> (у секундах) у полі <i>Тривалість</i>. Ви також можете змінити точний час початку слайда, натиснувши на текст, який показує хвилини, секунди та мілісекунди.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> Відтворити пісню з відповідного слайду до кінця пісні.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> відтворює лише частину відповідного слайда.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Ви можете використовувати <i>Метод захоплення</i>, щоб полегшити створення порядку показу слайдів і тривалості кожного з них.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Під час збереження <i>Автоматичної презентації</i> створений файл <b>[ім'я файлу].ap</b> вже міститиме обране аудіо у форматі MP3. Вам не потрібно окремо копіювати аудіофайл разом із файлом <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Ви можете редагувати текст певних слайдів під час їх показу:<br> - Натисніть правою кнопкою миші на слайді, який потрібно відредагувати (список слайдів розташований у нижній частині головного вікна);<br> - або натисніть сполучення клавіш <b>Shift + F2</b>, щоб відредагувати слайд, який зараз показано.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Чат - це засіб комунікації між програмним забезпеченням Holyrics і мобільним застосунком Holyrics.<br>Будь-який смартфон, підключений до мережі, може отримати доступ до чату через застосунок і відправляти повідомлення на ПК.

#The selected presentation will run automatically.
m0054=Вибрана презентація буде запущена автоматично.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Натисніть на повідомлення, щоб вибрати.<br>Перетягніть повідомлення, щоб змінити його порядок у списку.<br>Введіть виділену клавішу на початку повідомлення, щоб вибрати відповідне повідомлення. <b>(перше зображення)</b><br>Клацніть правою кнопкою миші на повідомленні, щоб отримати додаткові параметри. <b>(друге зображення)</b>

#You can change the background or Theme for each paragraph
m0056=Ви можете змінити фон або тему для кожного абзацу

#by clicking the slide {0} icon
m0057=натиснувши на іконку слайду {0}

#dragging an item from themes list to the slide
m0058=перетягуючи елемент зі списку тем на слайд

#or by right-clicking on the slide for more options
m0059=або натиснувши правою кнопкою миші на слайді, щоб побачити більше варіантів

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Попередження!</b> При налаштуванні зображення або відео як фону, всі налаштування, такі як колір шрифту, вирівнювання, тощо, будуть збережені з вибраної теми пісні. Тому будьте обережні, коли змінюєте <b>тему за замовчуванням</b> пісні, оскільки раніше налаштовані зображення та відео можуть не відповідати новій темі, яку ви обрали.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=Це функція, яка дозволяє використовувати програмне забезпечення так, ніби ви працюєте в розширеному режимі, навіть якщо до нього не підключено ще один монітор.<br>Ви можете показати невелике вікно на власному моніторі, імітуючи те, що буде показано в реальній проєкції.

#Use examples
m0062=Приклади використання

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Ви використовуєте програму вдома, не маєте допоміжного монітора і хотіли б розпочати презентацію, але не в повноекранному режимі

#You want to learn how to use the program in extended mode but haven't a secondary display
