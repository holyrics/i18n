#Development mode
m0894=Режим розробки

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=У режимі розробки JavaScript-код синхронізується з файлом у підпапці програми, і всі зміни, внесені тут у програмі, будуть збережені у файлі, так само як і всі зміни, внесені зовні в файл, будуть відображені в збереженому JavaScript-коді та виконані тут у програмі.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Це дозволяє редагувати JavaScript-код за допомогою зовнішнього редактора (IDE на ваш вибір), а зміни автоматично відображаються тут у програмі.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Увага: будьте обережні, використовуючи цей режим, оскільки це означає, що JavaScript-код, який буде автоматично виконуватися в Holyrics, базується на зовнішньому читабельному файлі, який може бути відредагований будь-яким іншим процесом/програмою, що виконується на комп'ютері.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Ім'я папки може бути змінено, але обов'язково повинно містити id елемента в будь-якому місці назви.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=У режимі розробки Community використовується підпапка програми для зберігання додаткового JavaScript-коду, який буде завантажено разом з кодом JSCommunity, і всі зміни, внесені зовні в файл, будуть відображені в коді "jsc", завантаженому та виконаному тут у програмі.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Це дозволяє створювати коди, які будуть автоматично використовуватися в структурі, сумісній з "jsc", без необхідності рефакторингу коду для відправки на GitHub з новими реалізаціями та змінами.

