#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Можна створювати елементи для додавання на панель уподобань або список відтворення, які виконують HTTP-запити або надсилають коди MIDI на інші пристрої.\nЦе дозволяє виконувати дії з іншими програмами та пристроями, такими як OBS Studio, програма освітлення, камери PTZ тощо.\nНаприклад, ви можете створити елемент, який під час виконання змінює сцену у вашій програмі мовлення, або елемент, який вибирає попередні налаштування з PTZ-камери в мережі тощо.\nЦі дії можна виконати, натиснувши на елемент, або також виконати автоматично за допомогою функціональних можливостей програми <b>Тригери</b>.\nНаприклад, ви можете створити тригер, щоб щоразу, коли Holyrics представляє зображення X у проєкції, воно автоматично змінювалося на сцену Y у вашій програмі трансляції.\nАбо щоразу, коли ви презентуєте біблійний вірш, він автоматично перемикається на сцену Z у вашій програмі мовлення.\nЄ багато можливостей автоматизації, які полегшують і економлять роботу мультимедійної групи.

