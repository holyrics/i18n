#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=विकास मोड में, JavaScript कोड कार्यक्रम के उपफोल्डर में एक फ़ाइल के साथ समन्वयित होता है और यहाँ कार्यक्रम में किए गए सभी परिवर्तनों को फ़ाइल में सहेजा जाएगा, जैसे कि फ़ाइल में बाहरी रूप से किए गए सभी परिवर्तनों को सहेजे गए JavaScript कोड में परिलक्षित किया जाएगा और यहाँ कार्यक्रम में निष्पादित किया जाएगा।

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=यह अनुमति देता है कि JavaScript कोड को एक बाहरी संपादक (आपकी पसंद की IDE) द्वारा संपादित किया जा सके और परिवर्तनों को स्वचालित रूप से यहाँ कार्यक्रम में परिलक्षित किया जाए।

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=ध्यान दें: इस मोड का उपयोग करते समय सावधान रहें, क्योंकि इसका मतलब है कि JavaScript कोड जो Holyrics में स्वचालित रूप से निष्पादित किया जाएगा, एक पठनीय बाहरी फ़ाइल पर आधारित है जिसे कंप्यूटर पर चल रहे किसी अन्य प्रक्रिया/कार्यक्रम द्वारा संपादित किया जा सकता है।

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=फोल्डर का नाम बदला जा सकता है, केवल यह अनिवार्य है कि नाम के किसी भी स्थान पर आइटम का आईडी शामिल हो।

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=Community के विकास मोड में, कार्यक्रम के एक उपफोल्डर का उपयोग अतिरिक्त JavaScript कोड को संग्रहीत करने के लिए किया जाता है जो JSCommunity कोड के साथ लोड किया जाएगा और फ़ाइल में बाहरी रूप से किए गए सभी परिवर्तनों को "jsc" कोड में परिलक्षित किया जाएगा जो यहाँ कार्यक्रम में लोड और निष्पादित किया जाएगा।

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=यह कोड बनाने की अनुमति देता है जो "jsc" के साथ संगत संरचना में स्वचालित रूप से उपयोग किया जाएगा, बिना कोड को फिर से तैयार किए GitHub पर नई कार्यान्वयन और परिवर्तनों के साथ भेजने की आवश्यकता के।

