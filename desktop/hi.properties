#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>स्टेज व्यू</b> एक सेटिंग है जो एक विशिष्ट मॉनिटर के लिए स्लाइड के प्रदर्शन को बदलती है।<br>यदि आपके पास दर्शकों द्वारा देखी गई प्रक्षिप्ति के लिए एक वीडियो आउटपुट है और <b>स्टेज</b> पर मौजूद लोगों के लिए एक और वीडियो आउटपुट है, तो आप <b>रिटर्न</b> मॉनिटर को दर्शकों के लिए प्रदर्शित किए जा रहे से अलग तरीके से कॉन्फ़िगर कर सकते हैं।<br>ऐप के लिए प्रसारण भी कॉन्फ़िगर किया जा सकता है।

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>चेकबॉक्स:</b> स्लाइड के पाठ में एक परिवर्तन को परिभाषित करता है। उदाहरण: वर्तमान स्लाइड के अंत में अगले स्लाइड की पहली पंक्ति प्रस्तुत करना।

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>बड़े अक्षर:</b> पूरे पाठ को बड़े अक्षरों में प्रस्तुत करता है।

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>लाइन ब्रेक हटाएँ:</b> पाठ को निरंतर रूप में प्रस्तुत करता है, स्वचालित रूप से स्लाइड की सीमा पर लाइन तोड़ता है और अधिकतम साइड स्पेस का उपयोग करता है।

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>कस्टम थीम:</b> स्लाइड के प्रदर्शन की थीम को बदलता है।

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>बाइबिल के लिए सक्षम करें:</b> बाइबिल के पदों के लिए सेटिंग्स को भी सक्षम करता है (चेकबॉक्स सेटिंग को छोड़कर)।

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=नोट: वीडियो थीम रिटर्न मॉनिटरों पर काम नहीं करते, केवल दर्शकों के मॉनिटर पर।

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=आप एक विशेष पैराग्राफ के लिए एक कस्टम संपादन जोड़ सकते हैं। उदाहरण के लिए, <b>अनुपात में</b> कोर के फ़ॉन्ट का आकार बढ़ाना।<br>और एक पहचान पाठ (कोर, छंद, आदि...) भी डाल सकते हैं जो केवल स्लाइड के फुटर में दिखाई देगा।

#View example
m0009=उदाहरण देखें

#This feature also works in the Quick Display window
m0010=यह विकल्प त्वरित प्रस्तुति विंडो में भी काम करता है

#Available Settings
m0011=उपलब्ध सेटिंग्स

#All text in uppercase
m0012=सभी पाठ बड़े अक्षरों में

#putting the character '%' after the number is useless
m0013=संख्याओं के बाद '%' वर्ण डालना अनावश्यक है

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=कोष्ठक के भीतर पाठ = (कोरस), (वर्स), (दोहराना), (अंत), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb मान, हेक्साडेसिमल या रंग का नाम कोष्ठकों के भीतर = [128,192,64] या [80c040] या [ff0] या [नीला]...

#Valid names
m0016=मान्य नाम

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=कस्टम फॉर्मेटिंग जोड़ने के लिए, पैराग्राफ की शुरुआत में दो "हैशटैग" ## के साथ एक पंक्ति जोड़ें और उसके बाद जो कोड चाहें उन्हें जोड़ें (कोड का क्रम मायने नहीं रखता)।

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=उदाहरण में, प्रक्षिप्ति के लिए बोल प्रस्तुत करते समय, दूसरा पैराग्राफ बोल्ड में प्रस्तुत किया जाएगा, फ़ॉन्ट का आकार 15% बड़ा होगा और रंग नीला होगा। अन्य पैराग्राफ सामान्य रूप से विषय की सेटिंग्स के साथ प्रस्तुत किए जाएंगे।

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=ध्यान दें: यदि उपयोग में विषय पहले से ही बोल्ड के लिए सेट है, तो यह कस्टम फॉर्मेटिंग कोई अंतर नहीं बनाएगी।

#Some formatting examples
m0020=फॉर्मेटिंग के कुछ उदाहरण

#Bold and italic
m0021=बोल्ड और इटैलिक

#25% bigger
m0022=25% बड़ा

#italic and 5% lower
m0023=इटैलिक और 5% छोटा

#Uppercase and yellow
m0024=बड़े अक्षरों में और पीला

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=यह निर्धारित करना संभव है कि कौन सी पंक्तियों पर कस्टम प्रारूपण लागू किया जाएगा।<br> उस पंक्ति की शुरुआत में दो डैश <b>--</b> जोड़ें जिस पर आप कस्टम प्रारूपण लागू नहीं करना चाहते।

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=उदाहरण में, पंक्ति <b>"लेकिन मुझे पता है कि यह अभी भी कम है"</b> थीम का मूल प्रारूपण का उपयोग करेगी, और अन्य पंक्तियाँ कस्टम प्रारूपण (बोल्ड और पीला) का उपयोग करेंगी।

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=आप <code>##p</code> कोड का उपयोग करके <b>मानक</b> फॉर्मेटिंग का उपयोग कर सकते हैं।<br>सभी पैराग्राफ जो <code>##p</code> के साथ परिभाषित हैं, नीचे दिए गए फ़ील्ड में परिभाषित फॉर्मेटिंग का उपयोग करेंगे.

#Default Custom Formatting
m0028=मानक कस्टम प्रारूपण

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=प्रत्येक सूची Holyrics प्रोग्राम के आंतरिक फ़ोल्डर का प्रतिनिधित्व करती है: ऑडियो, वीडियो और छवि। फ़ाइलें जोड़ने के लिए: संबंधित टैब के {0} आइकन पर क्लिक करें ताकि Windows में फ़ोल्डर खोला जा सके और फ़ाइलें फ़ोल्डर में चिपकाएँ। प्रोग्राम में सूची स्वचालित रूप से फ़ोल्डर की फ़ाइलों के साथ अपडेट होती है (जब तक कोई प्रस्तुति सक्रिय न हो)।

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>नोट:</b> फ़ोल्डर में फ़ाइलों का नाम बदलने से बचें, क्योंकि यदि आप किसी प्लेलिस्ट, फ़ेवरेट आदि में फ़ाइल के लिए शॉर्टकट बनाते हैं और फिर फ़ोल्डर में उसका नाम बदलते हैं, तो कार्यक्रम में शॉर्टकट काम नहीं करेगा, आपको एक नया शॉर्टकट बनाना होगा।

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=प्रत्येक फ़ोल्डर (ऑडियो, वीडियो और इमेज) में, आप प्रोग्राम में फ़ाइलों की सूची के लिए अन्य फ़ोल्डर बना सकते हैं। उदाहरण के लिए: आप <b>इमेज</b> फ़ोल्डर के भीतर <b>प्रस्तुति</b> नामक एक फ़ोल्डर बना सकते हैं और उसमें चित्र जोड़ सकते हैं। यह फ़ोल्डर Holyrics प्रोग्राम में सूची का एक आइटम होगा और उस पर क्लिक करने पर सभी चित्र स्लाइड शो के लिए खोले जाएंगे।

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=आप इन फ़ोल्डरों के लिए अपने डेस्कटॉप पर एक शॉर्टकट जोड़ सकते हैं <a href='http://addShortcutDesktop'>यहाँ</a> क्लिक करके।

#Holyrics Library
m0033=Holyrics पुस्तकालय

#Displays the song lyric in uppercase.
m0034=गाने के बोल को बड़े अक्षरों में दिखाता है।

#Enable/disable the underline in the song title at first slide.
m0035=पहली स्लाइड के गाने के शीर्षक पर अंडरलाइन को सक्रिय/निष्क्रिय करें।

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=<b>सक्रिय</b> विकल्प के साथ, कार्यक्रम लंबी पंक्तियों को स्वचालित रूप से तोड़ देगा, जिससे मूल फ़ॉन्ट का आकार कम नहीं होगा। <b>निष्क्रिय</b> विकल्प के साथ, यदि कोई लंबी पंक्ति है जो स्लाइड के किनारे से बाहर निकलती है, तो कार्यक्रम फ़ॉन्ट का आकार कम कर देगा जब तक कि पूरी पंक्ति स्लाइड के भीतर न हो।

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=पैराग्राफ के लिए <a href='http://customFormatting'>कस्टम प्रारूपण</a> को सक्रिय/निष्क्रिय करें।

#Enable/disable <b>Custom Background</b>.
m0038=कस्टम <b>पृष्ठभूमि योजना</b> को सक्रिय/निष्क्रिय करें।

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>लाइव</b> पैनल वर्तमान में मुख्य प्रक्षिप्ति में प्रस्तुत किया जा रहा है।<br>(VLC मीडिया प्लेयर द्वारा चलाए गए पृष्ठभूमि और वीडियो पैनल में नहीं दिखाई देते।)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=यदि आप 'स्टेज' पर रहने वाले लोगों के लिए एक विशेष रिटर्न मॉनिटर का उपयोग करते हैं, तो आप संचार पैनल का उपयोग केवल इस मॉनिटर पर संदेश प्रस्तुत करने के लिए कर सकते हैं।<br>प्रदर्शन सेटिंग्स में, आप एक मॉनिटर को <b>स्टेज व्यू</b> के रूप में निर्धारित कर सकते हैं (सार्वजनिक के मुख्य मॉनिटर को छोड़कर), और संचार पैनल में संदेश केवल उन मॉनिटरों पर प्रदर्शित होंगे जिन्हें <b>स्टेज व्यू</b> के रूप में निर्धारित किया गया है।

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=ऑडियो को बजाने के लिए सेट करें और उस स्लाइड पर क्लिक करें जिसे आप चाहते हैं कि संगीत बजने के दौरान प्रस्तुत किया जाए।<br>आप संगीत के एक अंश को रोक सकते हैं और वापस जा सकते हैं ताकि आप जहां रुके थे वहां से फिर से शुरू कर सकें।<br>आप सूची से एक आइटम को हटाने के लिए दाएँ क्लिक भी कर सकते हैं।

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=स्लाइड जो पहले प्रस्तुत किया जाएगा, वह है जो संपादन विंडो में निर्धारित है।

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=संगीत के अंश शुरू होने का इंतजार न करें, विशेष स्लाइड पर क्लिक करने के लिए कुछ मिलीसेकंड पहले क्लिक करने का प्रयास करें, स्लाइड के बीच संक्रमण में देरी से बचें।

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=<b>स्वचालित प्रस्तुति</b> के साथ, आप प्रत्येक स्लाइड की अवधि को एक MP3 ऑडियो (उदाहरण के लिए, एक प्लेबैक) के साथ प्रोग्राम कर सकते हैं।<br>एक बार बनाई जाने के बाद, आप कोई भी थीम चुन सकते हैं और प्रस्तुति शुरू कर सकते हैं।<br>ऑडियो मीडिया प्लेयर द्वारा चलाया जाएगा और स्लाइड स्वचालित रूप से प्रदर्शित होंगे जबकि संगीत बज रहा है।

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>प्रारंभिक स्लाइड निर्धारित करें</b> विकल्प <i>शुरू करें</i> और प्रारंभिक स्लाइड की <i>अवधि</i> (सेकंड में) के साथ।

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>स्लाइड व्यवस्थित करें</b> नए स्लाइड जोड़ने के लिए दाएँ क्लिक करके और स्लाइड को खींचकर उन्हें क्रमबद्ध करें।

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>प्रत्येक स्लाइड की अवधि निर्धारित करें</b> (सेकंड में) <i>अवधि</i> फ़ील्ड में। आप स्लाइड शुरू होने के समय को भी बदल सकते हैं, उस टेक्स्ट पर क्लिक करके जो मिनट, सेकंड और मिलीसेकंड दिखाता है।

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> संबंधित स्लाइड से गाना बजाना शुरू करता है और गाने के अंत तक चलता है।

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> केवल संबंधित स्लाइड का अंश बजाता है।

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=आप <i>कैप्चर विधि</i> का उपयोग करके स्लाइड के क्रम और प्रत्येक की अवधि बनाने में आसानी कर सकते हैं।

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=जब आप <i>स्वचालित प्रस्तुति</i> को सहेजते हैं, तो उत्पन्न फ़ाइल <b>[फ़ाइल का नाम].ap</b> पहले से चयनित MP3 ऑडियो को शामिल करेगी। आपको फ़ाइल <b>(*.ap)</b> के साथ ऑडियो कॉपी करने की चिंता करने की आवश्यकता नहीं है।

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=आप कुछ स्लाइड के पाठ को संपादित कर सकते हैं जबकि वे प्रस्तुत किए जा रहे हैं।<br> - उस स्लाइड पर दाएँ क्लिक करके जिसे आप संपादित करना चाहते हैं (मुख्य विंडो के नीचे स्लाइड की सूची);<br> - या वर्तमान में प्रदर्शित स्लाइड को संपादित करने के लिए <b>SHIFT + F12</b> दबाकर।

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=चैट Holyrics पीसी और मोबाइल के लिए Holyrics ऐप के बीच संचार का एक साधन है।<br>किसी भी जुड़े मोबाइल को ऐप के माध्यम से चैट तक पहुँच प्राप्त हो सकता है और पीसी को संदेश भेज सकता है।

#The selected presentation will run automatically.
m0054=चयनित प्रस्तुति स्वचालित रूप से चलायी जाएगी।

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=संदेश का चयन करने के लिए क्लिक करें।<br>सूची में पुनर्व्यवस्थित करने के लिए एक संदेश खींचें।<br>संदेश का चयन करने के लिए संदेश की शुरुआत में हाइलाइट की गई कुंजी टाइप करें। <b>(पहली छवि)</b><br>अधिक विकल्पों के लिए संदेश पर दाएँ क्लिक करें। <b>(दूसरी छवि)</b>

#You can change the background or Theme for each paragraph
m0056=आप प्रत्येक पैराग्राफ के लिए पृष्ठभूमि या थीम बदल सकते हैं

#by clicking the slide {0} icon
m0057=स्लाइड के {0} आइकन पर क्लिक करके

#dragging an item from themes list to the slide
m0058=थीम की सूची से एक आइटम को स्लाइड पर खींचकर

#or by right-clicking on the slide for more options
m0059=या अधिक विकल्पों के लिए स्लाइड पर दाएँ क्लिक करके

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>ध्यान दें!</b> जब छवि या वीडियो को पृष्ठभूमि के रूप में निर्धारित करते हैं, तो सभी सेटिंग्स जैसे फ़ॉन्ट का रंग, संरेखण, आदि संगीत के लिए चयनित थीम से होंगी। इसलिए, संगीत के <b>मानक थीम</b> को बदलते समय सावधान रहें, क्योंकि पहले से सेट की गई छवियाँ और वीडियो नए चयनित थीम के साथ मेल नहीं खा सकते हैं।

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=यह एक फ़ंक्शन है जो आपको प्रोग्राम का उपयोग करने की अनुमति देता है जैसे कि आप विस्तारित मोड में हैं, भले ही अन्य मॉनिटर कनेक्ट न हों।<br>आप अपने स्वयं के मॉनिटर पर एक छोटी विंडो प्रदर्शित कर सकते हैं, जो वास्तविक प्रक्षिप्ति में प्रदर्शित होने वाली चीज़ों का अनुकरण करती है।

#Use examples
m0062=उपयोग के उदाहरण

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=आप घर पर प्रोग्राम का उपयोग कर रहे हैं, कोई सहायक मॉनिटर कनेक्ट नहीं है और आप प्रस्तुतियों को शुरू करना चाहते हैं लेकिन फुल स्क्रीन में नहीं।

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=आप विस्तारित मोड में प्रोग्राम का उपयोग करना सीखना चाहते हैं लेकिन आपके पास कोई सहायक मॉनिटर नहीं है।

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=आप कंप्यूटर का उपयोग केवल स्लाइड को वाईफाई नेटवर्क के माध्यम से प्रसारित करने के लिए करते हैं, जिससे अपनी स्क्रीन पर पूर्ण स्क्रीन प्रदर्शित करना बेकार हो जाता है

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=फीचर <b>स्लाइड विवरण</b> प्रस्तुति के फुटर में स्लाइड की पहचान के लिए एक सहायक के रूप में कार्य करता है।

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=एक पैराग्राफ/स्लाइड का विवरण <b>कस्टम प्रारूपण</b> फ़ंक्शन द्वारा गीत के संपादन विंडो में निर्धारित किया गया है।

#Can be used for
m0068=उपयोग किया जा सकता है

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=फंक्शन <b>जाने के लिए</b> शॉर्टकट निर्धारित करें, जैसे: गीत <b><i>X</i></b> स्लाइड <b><i>X</i></b> पर जाएं

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=एक मानक थीम निर्धारित करें, जैसे: सभी स्लाइड <b><i>X</i></b> में थीम <b><i>X</i></b> होगा।

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=कस्टम फॉर्मेटिंग, जैसे: सभी स्लाइड <b><i>X</i></b> में इटैलिक फ़ॉन्ट।

#<b>Go to</b> function shortcuts
m0072=फंक्शन <b>जाने के लिए</b> के सिस्टम के शॉर्टकट

#Song presentation
m0073=संगीत की प्रस्तुति

#Other presentations
m0074=अन्य प्रस्तुतियाँ

#First paragraph of the song
m0075=गीत का पहला पैराग्राफ

#Second slide of presentation
m0076=प्रस्तुति का दूसरा स्लाइड

#Last paragraph of the song
m0077=गीत का अंतिम पैराग्राफ

#Penultimate presentation slide
m0078=प्रस्तुति का पूर्व अंतिम स्लाइड

#First paragraph of the next song
m0079=अगले गीत का पहला पैराग्राफ

#Next slide
m0080=अगला स्लाइड

#First paragraph of the previous song
m0081=पिछले गीत का पहला पैराग्राफ

#Previous slide
m0082=पिछला स्लाइड

#Last displayed slide
m0083=अंतिम प्रदर्शित स्लाइड

#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=यह एक कार्यक्षमता है जो कोड का उपयोग करने की अनुमति देती है जो सिस्टम में परिभाषित परिवर्तनीय मानों द्वारा प्रतिस्थापित किए जाएंगे, जैसे कि: दिनांक और समय।<br>उपयोग करने के लिए, बस कोड को पाठ के साथ टाइप करें। यह अक्षरों, अलर्ट, संचार पैनल, ... में काम करता है।

#of <b>all</b> songs<br>on the playlist.
m0085=<b>सभी</b> संगीत का<br>प्लेलिस्ट में।

#of <b>played</b> songs<br>on the playlist.
m0086=संगीत <b>चले हुए</b><br>प्लेलिस्ट में।

#of <b>not played</b> songs<br>on the playlist.
m0087=संगीत <b>नहीं चले हुए</b><br>प्लेलिस्ट में।

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=संबंधित सदस्य<br>पूजा/कार्यक्रम और सूची<br>निर्धारित सदस्यों की।

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>अगले गीत का शीर्षक और कलाकार</b><br>जो <b>चला हुआ</b> के रूप में चिह्नित नहीं है<br>प्लेलिस्ट में।

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>अगले गीत का शीर्षक</b> जो<br>चला हुआ के रूप में चिह्नित नहीं है<br>प्लेलिस्ट में।

#Stage Display (as configured)
m0091=रिटर्न मॉनिटर (कॉन्फ़िगरेशन के अनुसार)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=आप गीत या त्वरित प्रस्तुति के बोल में <b>टिप्पणी</b> के रूप में पंक्तियाँ शामिल कर सकते हैं।<br>टिप्पणियाँ केवल रिटर्न मॉनिटर्स पर प्रदर्शित की जाएंगी, जैसा कि <b>प्रदर्शन सेटिंग्स</b> में परिभाषित किया गया है।

#To define a line as a comment, start a line with "two slash" //
m0093=एक पंक्ति को टिप्पणी के रूप में निर्धारित करने के लिए, पंक्ति को "दो बार" // से शुरू करें।

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=टिप्पणी के रंग और फ़ॉन्ट सेटिंग्स को <b>थीम</b> संपादन विंडो में बदला जा सकता है।

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=कई स्क्रीन पर वीडियो चलाना कंप्यूटर के प्रोसेसिंग को ओवरलोड कर सकता है।<br>कम प्रदर्शन वाले कंप्यूटरों पर इस कार्यक्षमता का उपयोग करते समय सावधानी और संयम बरतें।

#Error loading dictionary
m0096=शब्दकोश लोड करने में त्रुटि।

#The program will be closed to apply the changes.\nClick OK and open the program again.
m0097=परिवर्तनों को लागू करने के लिए प्रोग्राम बंद किया जाएगा।\nOK पर क्लिक करें और प्रोग्राम को फिर से खोलें।

#ffmpeg file not found.
m0098=ffmpeg फ़ाइल नहीं मिली।

#Unable to identify video duration.
m0099=वीडियो की अवधि पहचानने में असमर्थ।

#Unable to identify video resolution.
m0100=वीडियो का संकल्प पहचानने में असमर्थ।

#Error starting process.
m0101=प्रक्रिया शुरू करने में त्रुटि।

#Check the files and try again.
m0102=फ़ाइलों की जाँच करें और पुनः प्रयास करें।

#Process has been interrupted
m0103=प्रक्रिया बाधित

#Converting video
m0104=वीडियो को परिवर्तित करना

#Converting video to gif
m0105=वीडियो को gif में परिवर्तित करना

#Extracting image from the video
m0106=वीडियो से छवि निकालना

#Invalid duration
m0107=अमान्य अवधि

#Extracting images from the video
m0108=वीडियो से छवियाँ निकालना

#Resizing video
m0109=वीडियो का आकार बदलना

#(Access denied) Could not save the file in the chosen destination.
m0110=(अभिगम अस्वीकृत) चुने गए गंतव्य पर फ़ाइल को सहेजने में असमर्थ।

#Starts presentation of the item that are in the current <b>media</b> tab of <b>playlist</b> at the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0111=प्रोग्राम की मुख्य विंडो (दाईं ओर) में <b>मीडिया</b> टैब की वर्तमान <b>प्ले लिस्ट</b> में जो आइटम है, उसकी प्रस्तुति शुरू करें।<br>"intensidade" का मान सूची में आइटम (1, 2, 3...) को परिभाषित करता है।

#Starts presentation of the song lyrics that are in the current <b>playlist</b> in the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0112=प्रोग्राम की मुख्य विंडो (दाईं ओर) में वर्तमान <b>प्ले लिस्ट</b> में जो गीत के बोल हैं, उसकी प्रस्तुति शुरू करें।<br>"intensidade" का मान सूची में आइटम (1, 2, 3...) को परिभाषित करता है।

#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=क्रिया कोड <b>स्लाइड पर जाएं...</b> चलाने पर, प्रोग्राम उस स्लाइड को प्रदर्शित करेगा जो "intensidade" के कोड द्वारा दिए गए मान के आधार पर है।<br>यानी, यदि "intensidade" का मान 3 है, तो वर्तमान प्रस्तुति तीसरी स्लाइड प्रदर्शित करेगी।<br>यह एक गीत के बोल की तीसरी स्लाइड, छवियों की सूची की तीसरी छवि, आदि हो सकती है...<br>यह क्रिया एक प्रस्तुति शुरू नहीं करती है, यह केवल एक <b>पहले से शुरू की गई</b> प्रस्तुति के स्लाइड को बदलती है।

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=यदि प्रस्तुति एक गीत के बोल है, तो संख्या पहले पैराग्राफ से गिनती शुरू होती है। <b>शीर्षक और कलाकार</b> वाला स्लाइड शून्य नंबर का स्लाइड है।

#A 32bit version of Java was not found.
