#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=यह फ़ेवरेट्स बार या प्लेलिस्ट में आइटम बनाने की अनुमति देता है जो HTTP अनुरोध करते हैं या अन्य उपकरणों के लिए MIDI कोड भेजते हैं।\nयह अन्य प्रोग्रामों और उपकरणों, जैसे OBS स्टूडियो, लाइटिंग प्रोग्राम, PTZ कैमरे आदि में क्रियाएँ निष्पादित करने की अनुमति देता है।\nउदाहरण के लिए, एक आइटम बनाना संभव है जो, जब निष्पादित किया जाता है, आपके प्रसारण प्रोग्राम में एक दृश्य को बदलता है, या एक आइटम जो नेटवर्क पर एक PTZ कैमरे के प्रीसेट का चयन करता है, आदि।\nइन क्रियाओं को आइटम पर क्लिक करके या प्रोग्राम की <b>ट्रिगर्स</b> कार्यक्षमता के माध्यम से स्वचालित रूप से निष्पादित किया जा सकता है।\nउदाहरण के लिए, एक ट्रिगर बनाना संभव है ताकि जब भी Holyrics प्रक्षिप्ति में चित्र X प्रस्तुत करता है, यह स्वचालित रूप से आपके प्रसारण प्रोग्राम में दृश्य Y में बदल जाता है।\nया जब भी बाइबिल का एक पद प्रस्तुत किया जाता है, यह स्वचालित रूप से आपके प्रसारण प्रोग्राम में दृश्य Z में बदल जाता है।\nस्वचालन की कई संभावनाएँ हैं जो मल्टीमीडिया टीम के काम को आसान और बचत करती हैं।

