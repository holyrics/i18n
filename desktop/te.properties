#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>ప్లాట్‌ఫారమ్ వీక్షణ</b> అనేది ప్రత్యేక మానిటర్‌కు స్లైడ్స్ ప్రదర్శనను మార్చే సెటింగ్.<br>మీరు ప్రజల కోసం ప్రదర్శనకు వీడియో అవుట్‌పుట్ మరియు <b>ప్లాట్‌ఫారమ్</b>లో ఉన్న వారికి మరో వీడియో అవుట్‌పుట్ ఉంటే, మీరు <b>రిటర్న్</b> మానిటర్‌ను ప్రజలకు చూపిస్తున్నదానితో భిన్నంగా సెటప్ చేయవచ్చు.<br>అప్లికేషన్‌కు ప్రసారం కూడా సెటప్ చేయవచ్చు.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>చెక్ బాక్స్:</b> స్లైడ్ పాఠ్యంలో మార్పును నిర్వచిస్తుంది. ఉదాహరణకు, ప్రస్తుత స్లైడ్ చివరలో తదుపరి స్లైడ్ యొక్క మొదటి పంక్తిని ప్రదర్శించండి.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>మొత్తం పెద్ద అక్షరాలు:</b> మొత్తం పాఠ్యాన్ని పెద్ద అక్షరాలలో చూపిస్తుంది.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>లైన్ బ్రేక్‌ను తొలగించండి:</b> పాఠ్యాన్ని నిరంతరంగా చూపిస్తుంది, స్లైడ్ యొక్క పరిమితిలో ఆటోమేటిక్‌గా లైన్‌ను విరామం చేస్తుంది మరియు గరిష్టంగా పక్క స్థలాన్ని ఆక్రమిస్తుంది.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>అనుకూల థీమ్:</b> స్లైడ్ ప్రదర్శన థీమ్‌ను మార్చుతుంది.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>బైబిల్ కోసం ప్రారంభించండి:</b> బైబిల్ వచనాలకు సెటింగ్స్‌ను కూడా ప్రారంభిస్తుంది (చెక్ బాక్స్ సెటింగ్‌ను మినహాయించి).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=గమనిక: వీడియో థీమ్స్ రిటర్న్ మానిటర్లలో పనిచేయవు, కేవలం ప్రజల మానిటర్‌లో.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=మీరు ప్రత్యేకమైన ప్యారాగ్రాఫ్ కోసం అనుకూలీకరించిన ఎడిటింగ్‌ను చేర్చవచ్చు. ఉదాహరణకు, <b>సమానంగా</b> కోర్ యొక్క ఫాంట్ పరిమాణాన్ని పెంచండి.<br>మరియు కేవలం స్లైడ్స్ యొక్క కింద మాత్రమే కనిపించే గుర్తింపు పాఠ్యం (కోర్, వర్సు, మొదలైనవి...) ఉంచండి.

#View example
m0009=ఉదాహరణను చూడండి

#This feature also works in the Quick Display window
m0010=ఈ ఎంపిక కూడా వేగవంతమైన ప్రదర్శన విండోలో పనిచేస్తుంది

#Available Settings
m0011=అందుబాటులో ఉన్న సెట్టింగ్స్

#All text in uppercase
m0012=అన్ని టెక్స్ట్ పెద్ద అక్షరాల్లో

#putting the character '%' after the number is useless
m0013=సంఖ్య తర్వాత '%' అక్షరాన్ని ఉంచడం అవసరం లేదు

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=కోణాలలో ఉన్న టెక్స్ట్ = (కోరు), (వర్షం), (మళ్లీ), (చివరి), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb విలువ, హెక్సాడెసిమల్ లేదా కోల్డ్ పేరు కోశాలలో = [128,192,64] లేదా [80c040] లేదా [ff0] లేదా [నీలం]...

#Valid names
m0016=చెల్లుబాటు అయ్యే పేర్లు

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=కస్టమ్ ఫార్మాటింగ్‌ను జోడించడానికి, పేరాలో మొదటి పంక్తిలో రెండు "హాష్‌ట్యాగ్‌లు" ## మరియు మీరు కోరిన కోడ్లను వెంటనే జోడించండి (కోడ్‌ల క్రమం ముఖ్యం కాదు).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=ఉదాహరణగా, ప్రొజెక్షన్ కోసం లిరిక్స్‌ను ప్రదర్శించినప్పుడు, రెండవ పేరా బోల్డ్‌లో, ఫాంట్ పరిమాణం 15% ఎక్కువగా మరియు నీలం రంగులో ప్రదర్శించబడుతుంది. ఇతర పేరాలు సాధారణంగా థీమ్ సెట్టింగ్స్‌తో ప్రదర్శించబడతాయి.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=గమనిక: ఉపయోగించిన థీమ్ ఇప్పటికే బోల్డ్‌గా అమర్చబడితే, ఈ కస్టమ్ ఫార్మాటింగ్ వ్యత్యాసం చేయదు.

#Some formatting examples
m0020=ఫార్మాటింగ్ యొక్క కొన్ని ఉదాహరణలు

#Bold and italic
m0021=బోల్డ్ మరియు ఇటాలిక్

#25% bigger
m0022=25% ఎక్కువ

#italic and 5% lower
m0023=ఇటాలిక్ మరియు 5% తక్కువ

#Uppercase and yellow
m0024=అక్షరాలు మరియు పసుపు

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=ఎక్కడ ఫార్మాటింగ్ అనుకూలీకరించబడతుందో ఆ వరుసలను నిర్వచించవచ్చు.<br> అనుకూలీకరించిన ఫార్మాటింగ్ వరుసను వరుస ప్రారంభంలో రెండు డాష్ <b>--</b> జోడించండి.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=ఉదాహరణలో, <b>"కానీ ఇంకా ఇది తక్కువగా ఉంది"</b> వరుస థీమ్ యొక్క అసలు ఫార్మాటింగ్‌ను ఉపయోగిస్తుంది, మరియు మిగతా వరుసలు అనుకూలీకరించిన ఫార్మాటింగ్‌ను (బోల్డ్ మరియు పసుపు) ఉపయోగిస్తాయి.

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=మీరు <code>##p</code> కోడ్‌ను ఉపయోగించి <b>ప్రామాణిక</b> ఫార్మాటింగ్‌ను ఉపయోగించవచ్చు.<br> <code>##p</code>తో నిర్వచించిన అన్ని పేరాలు క్రింద ఉన్న ఫీల్డ్‌లో నిర్వచించిన ఫార్మాటింగ్‌ను ఉపయోగిస్తాయి.

#Default Custom Formatting
m0028=అనుకూలీకరించిన ఫార్మాటింగ్ డిఫాల్ట్

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=ప్రతి జాబితా Holyrics ప్రోగ్రామ్‌లోని అంతర్గత ఫోల్డర్‌ను సూచిస్తుంది: ఆడియో, వీడియో మరియు చిత్రం. ఫైళ్లను జోడించడానికి: సంబంధిత ట్యాబ్‌లో {0} చిహ్నాన్ని క్లిక్ చేసి Windowsలో ఫోల్డర్‌ను తెరువండి మరియు ఫోల్డర్‌లో ఫైళ్లను పేస్ట్ చేయండి. ప్రోగ్రామ్‌లో జాబితా ఫోల్డర్‌లోని ఫైళ్లతో ఆటోమేటిక్‌గా నవీకరించబడుతుంది (ఏదైనా ప్రదర్శన చురుకుగా ఉన్నప్పుడు తప్ప).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>గమనిక:</b> ఫోల్డర్‌లో ఫైళ్లను పునఃనామకరించడానికి నివారించండి, ఎందుకంటే మీరు ప్లేబ్యాక్, ఫేవరిట్స్ మొదలైన వాటిలో ఫైల్‌కు షార్ట్‌కట్ సృష్టిస్తే మరియు తరువాత ఫోల్డర్‌లో దాన్ని పునఃనామకరించాలనుకుంటే, ప్రోగ్రామ్‌లో షార్ట్‌కట్ పనిచేయదు, మీరు కొత్త షార్ట్‌కట్‌ను సృష్టించాలి.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=ప్రతి ఫోల్డర్ (ఆడియో, వీడియో మరియు ఇమేజ్) లో, మీరు ప్రోగ్రామ్‌లో ఫైళ్ల జాబితాగా ఉండే ఇతర ఫోల్డర్లను సృష్టించవచ్చు. ఉదాహరణకు: మీరు <b>ప్రెజెంటేషన్</b> అనే ఫోల్డర్‌ను <b>ఇమేజెస్</b> ఫోల్డర్‌లో సృష్టించి, అందులో చిత్రాలను చేర్చవచ్చు. ఆ ఫోల్డర్ ప్రోగ్రామ్ హోలిరిక్స్‌లో జాబితా అంశంగా ఉంటుంది మరియు దానిపై క్లిక్ చేస్తే అన్ని చిత్రాలు స్లైడ్ ప్రెజెంటేషన్ కోసం తెరుస్తాయి.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=మీ డెస్క్‌టాప్‌లో ఈ ఫోల్డర్లకు ఒక షార్ట్‌కట్ జోడించడానికి <a href='http://addShortcutDesktop'>ఇక్కడ</a> క్లిక్ చేయండి.

#Holyrics Library
m0033=హోలిరిక్స్ లైబ్రరీ

#Displays the song lyric in uppercase.
m0034=గీతం యొక్క అక్షరాలను పెద్ద అక్షరాలలో చూపిస్తుంది.

#Enable/disable the underline in the song title at first slide.
m0035=మొదటి స్లైడ్‌లో గీతం శీర్షికపై అండర్‌లైన్‌ను చొరవ/నిష్క్రియ చేయండి.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=<b>చాలా</b> ఎంపికతో, ప్రోగ్రామ్ పొడవైన వరుసలను ఆటోమేటిక్‌గా విరామం చేస్తుంది, మూల అక్షర పరిమాణాన్ని తగ్గించకుండా. <b>నిష్క్రియ</b> ఎంపికతో, స్లైడ్ యొక్క పక్కను దాటించే పొడవైన వరుస ఉంటే, ప్రోగ్రామ్ అక్షర పరిమాణాన్ని తగ్గిస్తుంది, అంతా వరుస స్లైడ్‌లో ఉండే వరకు.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=పేరా యొక్క <a href='http://customFormatting'>అనుకూలీకరించిన ఫార్మాటింగ్</a>ని చొరవ/నిష్క్రియ చేయండి.

#Enable/disable <b>Custom Background</b>.
m0038=<b>అనుకూలీకరించిన నేపథ్యం ప్లాన్</b>ని చొరవ/నిష్క్రియ చేయండి.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>ప్రత్యక్షంగా</b> ప్యానెల్ ప్రస్తుత ప్రదర్శనలో ఏమి చూపిస్తున్నదో చూపిస్తుంది.<br>(VLC మీడియా ప్లేయర్ ద్వారా అమలు చేయబడిన నేపథ్యం మరియు వీడియో ప్యానెల్‌లో కనిపించవు.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=మీరు 'పాల్క్'లో ఉన్న వారికి ప్రత్యేక రీఫర్ మానిటర్‌ను ఉపయోగిస్తే, మీరు ఈ మానిటర్‌లో మాత్రమే సందేశాలను ప్రదర్శించడానికి కమ్యూనికేషన్ ప్యానెల్‌ను ఉపయోగించవచ్చు.<br>ప్రదర్శన సెట్టింగ్స్‌లో, మీరు ఒక మానిటర్‌ను <b>పాల్క్ వీక్షణ</b>గా నిర్వచించవచ్చు (ప్రేక్షకుల ప్రధాన మానిటర్ తప్ప), మరియు కమ్యూనికేషన్ ప్యానెల్‌లో సందేశాలు <b>పాల్క్ వీక్షణ</b>గా నిర్వచించిన మానిటర్లలో మాత్రమే ప్రదర్శించబడతాయి.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=ఆడియోను ప్లే చేయడానికి ఉంచండి మరియు మీరు గీతం ప్లే అవుతున్నప్పుడు ప్రదర్శించాలనుకుంటున్న స్లైడ్‌పై క్లిక్ చేయండి.<br>మీరు ఆడియోలో ఒక భాగాన్ని నిలిపి ఉంచి, ఆపిన చోట నుండి తిరిగి ప్రారంభించవచ్చు.<br>మీరు కాపీ చేసిన అంశాన్ని కుడి క్లిక్ చేసి జాబితా నుండి తొలగించవచ్చు.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=మీరు క్లిక్ చేసిన మొదటి స్లైడ్‌కు ముందు ప్రదర్శించబడే స్లైడ్ ఎడిటింగ్ విండోలో నిర్వచించబడింది.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=గీతం యొక్క భాగాన్ని ప్రారంభించడానికి ప్రత్యేక స్లైడ్‌పై క్లిక్ చేయడానికి వేచి ఉండకండి, స్లైడ్‌పై కొన్ని మిల్లీసెకండ్ల ముందు క్లిక్ చేయడానికి ప్రయత్నించండి, స్లైడ్ల మధ్య మార్పిడి సమయంలో ఆలస్యం నివారించండి.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=<b>ఆటోమేటిక్ ప్రెజెంటేషన్</b>తో మీరు MP3 ఆడియో (ఉదాహరణకు ఒక ప్లేబ్యాక్)తో అనుసంధానిత ప్రతి స్లైడ్ యొక్క వ్యవధిని ప్రోగ్రామ్ చేయవచ్చు.<br>సృష్టించిన తర్వాత, మీరు మీకు కావలసిన ఏదైనా థీమ్‌ను ఎంచుకోవచ్చు మరియు ప్రదర్శనను ప్రారంభించవచ్చు.<br>ఆడియో మీడియా ప్లేయర్ ద్వారా ప్లే చేయబడుతుంది మరియు గీతం ప్లే అవుతున్నప్పుడు స్లైడ్లు ఆటోమేటిక్‌గా ప్రదర్శించబడతాయి.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>ప్రారంభ స్లైడ్‌ను నిర్వచించండి</b> <i>తో ప్రారంభించండి</i> మరియు ప్రారంభ స్లైడ్ యొక్క <i>వ్యవధి</i> (సెకన్లలో).

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>స్లైడ్లను క్రమబద్ధీకరించండి</b> కొత్త స్లైడ్లను జోడించడానికి కుడి క్లిక్ చేయడం ద్వారా మరియు వాటిని క్రమబద్ధీకరించడానికి స్లైడ్లను లాగడం ద్వారా.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>ప్రతి స్లైడ్ యొక్క వ్యవధిని నిర్వచించండి</b> (సెకన్లలో) <i>వ్యవధి</i> ఫీల్డ్‌లో. మీరు స్లైడ్ ప్రారంభమయ్యే ఖచ్చితమైన సమయాన్ని మార్చడానికి నిమిషాలు, సెకన్లు మరియు మిల్లీసెకండ్లను చూపించే పాఠ్యంపై క్లిక్ చేయవచ్చు.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> సంబంధిత స్లైడ్ నుండి గీతం చివర వరకు ప్లే చేస్తుంది.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> కేవలం సంబంధిత స్లైడ్ యొక్క భాగాన్ని మాత్రమే ప్లే చేస్తుంది.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=స్లైడ్ల క్రమాన్ని మరియు ప్రతి ఒక్కరి వ్యవధిని సృష్టించడానికి సులభతరం చేయడానికి <i>కాప్చర్ పద్ధతి</i>ని ఉపయోగించవచ్చు.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=<i>ఆటోమేటిక్ ప్రెజెంటేషన్</i>ని సేవ్ చేసినప్పుడు, ఉత్పత్తి చేయబడిన ఫైల్ <b>[ఫైల్ పేరు].ap</b> ఇప్పటికే ఎంపిక చేసిన MP3 ఆడియోను కలిగి ఉంటుంది. మీరు <b>(*.ap)</b> ఫైల్‌తో ఆడియోను కాపీ చేయడం గురించి ఆందోళన చెందాల్సిన అవసరం లేదు.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=మీరు ప్రదర్శనలో ఉన్నప్పుడు కొన్ని స్లైడ్ల యొక్క పాఠ్యాన్ని ఎడిట్ చేయవచ్చు.<br> - మీరు ఎడిట్ చేయాలనుకుంటున్న స్లైడ్‌పై కుడి క్లిక్ చేయడం ద్వారా (ప్రధాన విండో యొక్క స్లైడ్ జాబితా);<br> - లేదా ప్రస్తుత ప్రదర్శనలో ఉన్న స్లైడ్‌ను ఎడిట్ చేయడానికి <b>SHIFT + F12</b> నొక్కడం ద్వారా.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=చాట్ అనేది కంప్యూటర్‌లో హోలిరిక్స్ మరియు మొబైల్ కోసం హోలిరిక్స్ యాప్ మధ్య కమ్యూనికేషన్ యొక్క ఒక మార్గం.<br>నెట్‌వర్క్‌లో కనెక్ట్ అయిన ఏ మొబైల్ కూడా యాప్ ద్వారా చాట్‌ను యాక్సెస్ చేసి, కంప్యూటర్‌కు సందేశాలు పంపవచ్చు.

#The selected presentation will run automatically.
m0054=ఎంపిక చేసిన ప్రదర్శన ఆటోమేటిక్‌గా అమలు చేయబడుతుంది.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=సందేశాన్ని ఎంచుకోవడానికి క్లిక్ చేయండి.<br>జాబితాలో దాన్ని క్రమబద్ధీకరించడానికి సందేశాన్ని లాగండి.<br>సందేశానికి సంబంధిత సందేశాన్ని ఎంచుకోవడానికి సందేశం ప్రారంభంలో హైలైట్ చేసిన కీని టైప్ చేయండి. <b>(మొదటి చిత్రం)</b><br>మరింత ఎంపికల కోసం సందేశంపై కుడి క్లిక్ చేయండి. <b>(రెండవ చిత్రం)</b>

#You can change the background or Theme for each paragraph
m0056=మీరు ప్రతి పేరా యొక్క నేపథ్యం లేదా థీమ్‌ను మార్చవచ్చు

#by clicking the slide {0} icon
m0057=స్లైడ్ యొక్క {0} చిహ్నంపై క్లిక్ చేయడం ద్వారా

#dragging an item from themes list to the slide
m0058=థీమ్ జాబితా నుండి ఒక అంశాన్ని స్లైడ్‌కు లాగడం ద్వారా

#or by right-clicking on the slide for more options
m0059=లేదా మరింత ఎంపికల కోసం స్లైడ్‌పై కుడి క్లిక్ చేయడం ద్వారా

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>గమనిక!</b> నేపథ్యం కోసం చిత్రం లేదా వీడియోను నిర్వచించినప్పుడు, అక్షరాల రంగు, సమాంతరీకరణ మొదలైన అన్ని సెట్టింగులు గీతానికి ఎంపిక చేసిన థీమ్ నుండి ఉంటాయి. కాబట్టి, గీతానికి <b>డిఫాల్ట్ థీమ్</b>ని మార్చేటప్పుడు జాగ్రత్తగా ఉండండి, ఎందుకంటే ముందుగా అమర్చిన చిత్రాలు మరియు వీడియోలు కొత్తగా ఎంపిక చేసిన థీమ్‌తో సరిపోలకపోవచ్చు.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=ఇది మీరు ఇతర మానిటర్లను కనెక్ట్ చేయకపోయినా విస్తృత మోడ్‌లో ప్రోగ్రామ్‌ను ఉపయోగించడానికి అనుమతించే ఒక ఫంక్షన్.<br>మీ స్వంత మానిటర్‌లో ఒక చిన్న విండోను ప్రదర్శించవచ్చు, ఇది వాస్తవ ప్రదర్శనలో ఏమి ప్రదర్శించబడుతుందో అనుకరించవచ్చు.

#Use examples
m0062=ఉపయోగం యొక్క ఉదాహరణలు

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=మీరు ఇంట్లో ప్రోగ్రామ్‌ను ఉపయోగిస్తున్నారని, మీకు సహాయక మానిటర్ కనెక్ట్ చేయబడలేదు మరియు పూర్తి స్క్రీన్‌లో ప్రదర్శనలు ప్రారంభించాలనుకుంటున్నారు.

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=మీరు విస్తృత మోడ్‌లో ప్రోగ్రామ్‌ను ఉపయోగించడం నేర్చుకోవాలనుకుంటున్నారు కానీ మీకు సహాయక మానిటర్ లేదు.

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=మీరు కేవలం వైఫై నెట్‌వర్క్ ద్వారా స్లైడ్లను ప్రసారం చేయడానికి కంప్యూటర్‌ను ఉపయోగిస్తారు, మీ స్వంత స్క్రీన్‌లో పూర్తి స్క్రీన్ ప్రదర్శన అవసరం లేదు

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=<b>స్లైడ్ వివరణ</b> ఫీచర్ ప్రదర్శన కింద స్లైడ్‌ను గుర్తించడానికి సులభతరం చేస్తుంది.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=ఒక పేరా/స్లైడ్ యొక్క వివరణను అక్షరాల ఫార్మాటింగ్ ఫంక్షన్ <b>అనుకూలీకరించిన ఫార్మాటింగ్</b> ద్వారా ఎడిటింగ్ విండోలో నిర్వచించబడుతుంది.

#Can be used for
m0068=ఇది ఉపయోగించబడవచ్చు

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=ఫంక్షన్ <b>కు వెళ్ళండి</b>లో షార్ట్‌కట్లను నిర్వచించండి, ఉదా: అక్షరాలు <b><i>X</i></b> స్లైడ్ <b><i>X</i></b>కి వెళ్ళండి

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=ఒక ప్రామాణిక థీమ్‌ను నిర్వచించండి, ఉదా: అన్ని స్లైడ్లు <b><i>X</i></b> థీమ్ <b><i>X</i></b> కలిగి ఉంటాయి.

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=వ్యక్తిగత ఫార్మాటింగ్, ఉదా: అన్ని స్లైడ్లు <b><i>X</i></b> ఇటాలిక్ ఫాంట్‌తో.

#<b>Go to</b> function shortcuts
m0072=ఫంక్షన్ <b>కి వెళ్లండి</b> యొక్క వ్యవస్థ యొక్క చిన్నార్లు

#Song presentation
m0073=సంగీత ప్రదర్శన

#Other presentations
m0074=ఇతర ప్రదర్శనలు

#First paragraph of the song
m0075=పాట యొక్క మొదటి పేరా

#Second slide of presentation
m0076=ప్రదర్శన యొక్క రెండవ స్లైడ్

#Last paragraph of the song
m0077=పాట యొక్క చివరి పేరా

#Penultimate presentation slide
m0078=ప్రదర్శన యొక్క రెండవ చివరి స్లైడ్

#First paragraph of the next song
m0079=తదుపరి పాట యొక్క మొదటి పేరా

#Next slide
m0080=తరువాతి స్లైడ్

#First paragraph of the previous song
m0081=మునుపటి పాట యొక్క మొదటి పేరా

#Previous slide
m0082=మునుపటి స్లైడ్

#Last displayed slide
m0083=చివరి స్లైడ్ ప్రదర్శించబడింది

#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=ఇది వ్యవస్థలో నిర్వచించబడిన చలనాలు, తేదీ మరియు సమయం వంటి మార్పిడి విలువలతో భర్తీ చేయబడే కోడ్లను ఉపయోగించడానికి ఒక ఫీచర్.<br>ఉపయోగించడానికి, కోడ్‌ను పాఠంతో కలిపి టైప్ చేయండి. ఇది అక్షరాలు, అలర్ట్‌లు, సంఘటన ప్యానెల్, ... లో పనిచేస్తుంది.

#of <b>all</b> songs<br>on the playlist.
m0085=పాటల జాబితాలో <b>అన్ని</b> పాటల.

#of <b>played</b> songs<br>on the playlist.
m0086=<b>వాయించబడిన</b> పాటల<br>పాటల జాబితాలో.

#of <b>not played</b> songs<br>on the playlist.
m0087=<b>వాయించబడని</b> పాటల<br>పాటల జాబితాలో.

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=సేవకు బాధ్యత వహించే సభ్యుడు<br>పూజ/ఈవెంట్ మరియు సభ్యుల జాబితా<br>ఎంపిక చేసిన సభ్యులు.

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=తదుపరి పాట యొక్క <b>శీర్షిక మరియు కళాకారుడు</b><br> <b>వాయించబడింది</b>గా గుర్తించబడలేదు<br>పాటల జాబితాలో.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=తదుపరి పాట యొక్క <b>శీర్షిక</b> <br> <b>వాయించబడింది</b>గా గుర్తించబడలేదు<br>పాటల జాబితాలో.

#Stage Display (as configured)
m0091=తిరిగి మానిటర్ (సెట్టింగ్ ప్రకారం)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=మీరు పాట లేదా త్వరిత ప్రదర్శన యొక్క పాఠంలో <b>వ్యాఖ్య</b>గా పంక్తులను చేర్చవచ్చు.<br>వ్యాఖ్యలు <b>ప్రదర్శన సెట్టింగ్స్</b>లో నిర్వచించినట్లుగా తిరిగి మానిటర్లలో మాత్రమే ప్రదర్శించబడతాయి.

#To define a line as a comment, start a line with "two slash" //
m0093=ఒక పంక్తిని వ్యాఖ్యగా నిర్వచించడానికి, పంక్తిని "రెండు బార్లు" // తో ప్రారంభించండి.

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=వ్యాఖ్య యొక్క రంగు మరియు ఫాంట్ సెట్టింగులను <b>థీమ్‌లు</b> ఎడిటింగ్ విండోలో మార్చవచ్చు.

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=బహుళ స్క్రీన్లలో వీడియోను నడపడం కంప్యూటర్ ప్రాసెసింగ్‌ను అధికంగా చేయవచ్చు.<br>తక్కువ పనితీరు కంప్యూటర్లలో ఈ ఫీచర్‌ను ఉపయోగించేటప్పుడు జాగ్రత్తగా మరియు మితిమీరినట్లు ఉండండి.

#Error loading dictionary
m0096=డిక్షనరీని లోడ్ చేయడంలో లోపం

#The program will be closed to apply the changes.\nClick OK and open the program again.
m0097=మార్పులను వర్తింపజేయడానికి ప్రోగ్రామ్ ముగుస్తుంది.\nOK క్లిక్ చేసి ప్రోగ్రామ్‌ను మళ్లీ తెరవండి.

#ffmpeg file not found.
m0098=ffmpeg ఫైల్ కనుగొనబడలేదు.

#Unable to identify video duration.
m0099=వీడియో యొక్క వ్యవధిని గుర్తించలేకపోయింది.

#Unable to identify video resolution.
m0100=వీడియో యొక్క రిజల్యూషన్‌ను గుర్తించలేకపోయింది.

#Error starting process.
m0101=ప్రక్రియ ప్రారంభించడంలో లోపం.

#Check the files and try again.
m0102=ఫైళ్లను తనిఖీ చేసి మళ్లీ ప్రయత్నించండి.

#Process has been interrupted
m0103=ప్రక్రియ ఆపివేయబడింది

#Converting video
m0104=వీడియోని మార్చడం

#Converting video to gif
m0105=వీడియోని gif గా మార్చడం

#Extracting image from the video
m0106=వీడియో నుండి చిత్రం తీసుకుంటున్నాయి

#Invalid duration
m0107=చెల్లని వ్యవధి

#Extracting images from the video
m0108=వీడియో నుండి చిత్రాలను తీసుకుంటున్నాయి

#Resizing video
m0109=వీడియోని పునర్వ్యవస్థీకరించడం

#(Access denied) Could not save the file in the chosen destination.
m0110=(ప్రవేశం తిరస్కరించబడింది) ఎంపిక చేసిన గమ్యం ఫైల్‌ను రాయలేకపోయారు.

#Starts presentation of the item that are in the current <b>media</b> tab of <b>playlist</b> at the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0111=ప్రస్తుత ప్రోగ్రామ్ ప్రధాన విండోలో <b>మీడియా</b> ట్యాబ్‌లో <b>ప్లే లిస్ట్</b>లో ఉన్న అంశం యొక్క ప్రదర్శనను ప్రారంభిస్తుంది.<br>"ఇంటెన్సిటీ" విలువ జాబితాలో ఉన్న అంశం (1, 2, 3...) ను నిర్వచిస్తుంది.

#Starts presentation of the song lyrics that are in the current <b>playlist</b> in the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0112=ప్రస్తుత ప్రోగ్రామ్ ప్రధాన విండోలో <b>ప్లే లిస్ట్</b>లో ఉన్న పాట యొక్క లిరిక్స్ ప్రదర్శనను ప్రారంభిస్తుంది.<br>"ఇంటెన్సిటీ" విలువ జాబితాలో ఉన్న అంశం (1, 2, 3...) ను నిర్వచిస్తుంది.

#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=చర్య కోడ్ <b>స్లైడ్‌కు వెళ్లండి...</b>ని అమలు చేసినప్పుడు, ప్రోగ్రామ్ "ఇంటెన్సిటీ" విలువ ద్వారా అందించిన సంఖ్య ఆధారంగా స్లైడ్‌ను చూపిస్తుంది.<br>అంటే, "ఇంటెన్సిటీ" విలువ 3 అయితే, ప్రస్తుత ప్రదర్శన 3వ స్లైడ్‌ను ప్రదర్శిస్తుంది.<br>ఇది పాటల లిరిక్స్ యొక్క 3వ స్లైడ్, చిత్రాల జాబితాలో 3వ చిత్రం, మొదలైనవి కావచ్చు...<br>ఈ చర్య ప్రదర్శనను ప్రారంభించదు, ఇది కేవలం <b>ఇప్పటికే ప్రారంభమైన</b> ప్రదర్శన యొక్క స్లైడ్‌ను మార్చుతుంది.

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=ప్రదర్శన ఒక పాట యొక్క లిరిక్స్ అయితే, సంఖ్య మొదటి పేరా నుండి ప్రారంభమవుతుంది. <b>శీర్షిక మరియు కళాకారుడు</b> ఉన్న స్లైడ్ జీరో సంఖ్య స్లైడ్.

#A 32bit version of Java was not found.
m0115=32 బిట్ Java వెర్షన్ కనుగొనబడలేదు.

#<b>VLC Media Player</b> files were not found, check Holyrics installation files.
m0116=<b>VLC మీడియా ప్లేయర్</b> ఫైళ్లు కనుగొనబడలేదు, ప్రోగ్రామ్ ఇన్‌స్టాలేషన్ ఫైళ్లను తనిఖీ చేయండి.

#Could not initialize the <b>VLC Media Player</b>
m0117=<b>VLC మీడియా ప్లేయర్</b>ని ప్రారంభించలేకపోయారు

#To use the audio and video features of the program, install the <b>VLC Media Player</b> on your computer.
m0118=ప్రోగ్రామ్ యొక్క ఆడియో మరియు వీడియో ఫీచర్లను ఉపయోగించడానికి, మీ కంప్యూటర్లో <b>VLC మీడియా ప్లేయర్</b>ని ఇన్‌స్టాల్ చేయండి.

#After install <b>VLC Media Player</b>, restart the program.
m0119=<b>VLC మీడియా ప్లేయర్</b>ని ఇన్‌స్టాల్ చేసిన తర్వాత, ప్రోగ్రామ్‌ను పునఃప్రారంభించండి.

#Some YouTube links may not work because they are copyright protected.<br>(songs clips usually do not work)
m0120=కొన్ని YouTube లింకులు కాపీరైట్ కారణంగా పనిచేయకపోవచ్చు.<br>(సంగీత క్లిప్‌లు సాధారణంగా పనిచేయవు)

#All selected themes will have <b>only</b> the selected items below changed.<br>The other settings will be available for editing, but will be discarded.<br>For example: if the <b>size</b> option was selected but the <b>font color</b> option was NOT selected, you can change the font color in the edit, but the Themes <b>will not</b> have the font color changed, only the <b>size</b>.
m0121=ఎంచుకున్న అన్ని థీమ్స్ <b>కేవలం</b> క్రింద ఎంపిక చేసిన అంశాలను మాత్రమే మార్చబడతాయి.<br>ఇతర సెట్టింగ్స్ ఎడిట్ చేయడానికి అందుబాటులో ఉంటాయి, కానీ అవి వదులుతాయి.<br>ఉదాహరణకు: <b>పరిమాణం</b> ఎంపిక చేయబడితే కానీ <b>ఫాంట్ రంగు</b> ఎంపిక చేయబడకపోతే, మీరు ఎడిటింగ్‌లో ఫాంట్ రంగును మార్చవచ్చు, కానీ థీమ్స్ <b>ఫాంట్ రంగును మార్చదు</b>, కేవలం <b>పరిమాణం</b>.

