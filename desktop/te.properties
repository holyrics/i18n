#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=HTTP అభ్యర్థనలను అమలు చేసే లేదా ఇతర పరికరాలకు MIDI కోడ్లను పంపించే ఫేవరిట్ బార్ లేదా ప్లే లిస్ట్‌లో చేర్చడానికి అంశాలను సృష్టించడం సాధ్యం.<br>ఇది ఇతర ప్రోగ్రామ్‌లు మరియు పరికరాలలో చర్యలను అమలు చేయడానికి అనుమతిస్తుంది, ఉదాహరణకు OBS స్టూడియో, లైటింగ్ ప్రోగ్రామ్, PTZ కెమెరాలు, మొదలైనవి.<br>ఉదాహరణకు, మీరు అమలు చేసినప్పుడు, మీ ప్రసార ప్రోగ్రామ్‌లో ఒక సీన్‌ను మార్చే అంశాన్ని సృష్టించడం సాధ్యం, లేదా నెట్‌వర్క్‌లోని PTZ కెమెరా యొక్క ప్రీసెట్‌ను ఎంచుకునే అంశాన్ని సృష్టించడం సాధ్యం.<br>ఈ చర్యలను అంశంపై క్లిక్ చేయడం ద్వారా అమలు చేయవచ్చు లేదా ప్రోగ్రామ్ యొక్క <b>ట్రిగ్గర్స్</b> ఫంక్షనాలిటీ ద్వారా ఆటోమేటిక్‌గా అమలు చేయవచ్చు.<br>ఉదాహరణకు, హోలిరిక్స్ ప్రదర్శనలో X చిత్రం ప్రదర్శించినప్పుడు, మీ ప్రసార ప్రోగ్రామ్‌లో Y సీన్‌కు ఆటోమేటిక్‌గా మార్చే ట్రిగ్గర్‌ను సృష్టించడం సాధ్యం.<br>లేదా బైబిల్ యొక్క ఒక వచనం ప్రదర్శించినప్పుడు, మీ ప్రసార ప్రోగ్రామ్‌లో Z సీన్‌కు ఆటోమేటిక్‌గా మార్చే ట్రిగ్గర్‌ను సృష్టించడం సాధ్యం.<br>మల్టీమీడియా బృందం యొక్క పని సులభతరం చేయడానికి మరియు సమయాన్ని ఆదా చేయడానికి అనేక ఆటోమేషన్ అవకాశాలు ఉన్నాయి.

