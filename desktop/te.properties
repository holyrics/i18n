m0213=<b>ఫంక్షన్</b> మోడ్‌లో స్కేల్ పాత ప్రామాణిక మోడ్‌తో పోలిస్తే వేరే ఏర్పాటు ఉంది.<br>ఈ కొత్త రకమైన ఏర్పాటు ద్వారా మీరు (ప్రోగ్రామ్ సెట్టింగ్స్‌లో) మంత్రిత్వంలో ఉన్న అన్ని ఫంక్షన్లను సృష్టించి, ప్రతి ఫంక్షన్‌కు ఒక సభ్యుడిని నిర్వచించాలి.<br><br>పాత మోడ్‌లో మీరు ప్రతి పంక్తిలో ఒక <b>సభ్యుడు</b> కలిగి ఉంటారు మరియు అతను స్కేల్ చేయబడుతున్నాడా లేదా కాదా అని ఒక చెక్ బాక్స్‌ను గుర్తించి నిర్వచించాలి.<br><br>కొత్త మోడ్ (ఫంక్షన్)లో మీరు ప్రతి పంక్తిలో ఒక <b>ఫంక్షన్</b> కలిగి ఉంటారు మరియు ఈ ఫంక్షన్‌కు స్కేల్ చేయబడిన <b>సభ్యుడు</b> ఎవరో నిర్వచించాలి.

