#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=আপনি কেবল স্লাইডগুলি ওয়াইফাই নেটওয়ার্কের মাধ্যমে সম্প্রচার করতে কম্পিউটার ব্যবহার করছেন, আপনার নিজের স্ক্রীনে পূর্ণ পর্দায় প্রদর্শন করা অকার্যকর করে

