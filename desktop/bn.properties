m0213=ফাংশন মোডে স্কেল পুরানো স্ট্যান্ডার্ড মোডের থেকে ভিন্ন একটি সংগঠন রয়েছে।<br>এই নতুন ধরনের সংগঠনে আপনি (প্রোগ্রামের সেটিংসে) মন্ত্রণালয়ে বিদ্যমান সমস্ত ফাংশন তৈরি করেন এবং তারপর প্রতিটি ফাংশনের জন্য একটি সদস্য নির্ধারণ করেন।<br><br>পুরানো মোডে আপনার কাছে প্রতিটি লাইনে একটি <b>সদস্য</b> থাকে এবং আপনি এটি স্কেল করা হয়েছে কিনা তা চেকবক্স চিহ্নিত করে নির্ধারণ করেন।<br><br>নতুন মোডে (ফাংশন) আপনার কাছে প্রতিটি লাইনে একটি <b>ফাংশন</b> থাকে এবং আপনি নির্ধারণ করেন কোন <b>সদস্য</b> এই ফাংশনের জন্য স্কেল করা হয়েছে।

