#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=এমন আইটেম তৈরি করা সম্ভব যা ফেভারিটস বার বা প্লেলিস্টে যুক্ত হয় যা HTTP অনুরোধ সম্পাদন করে বা অন্যান্য ডিভাইসে MIDI কোড পাঠায়।\nএটি অন্যান্য প্রোগ্রাম এবং ডিভাইসে ক্রিয়াকলাপ সম্পাদন করতে দেয়, যেমন OBS স্টুডিও, লাইটিং প্রোগ্রাম, PTZ ক্যামেরা, ইত্যাদি।\nযেমন, একটি আইটেম তৈরি করা সম্ভব যা চালানোর সময় আপনার সম্প্রচার প্রোগ্রামে একটি দৃশ্য পরিবর্তন করে, অথবা একটি আইটেম যা নেটওয়ার্কে একটি PTZ ক্যামেরার প্রিসেট নির্বাচন করে, ইত্যাদি।\nএই ক্রিয়াকলাপগুলি আইটেমে ক্লিক করে সম্পাদন করা যেতে পারে বা প্রোগ্রামের <b>ট্রিগার</b> ফিচারের মাধ্যমে স্বয়ংক্রিয়ভাবে সম্পাদন করা যেতে পারে।\nযেমন, একটি ট্রিগার তৈরি করা সম্ভব যাতে যখনই হোলিরিক্স প্রজেকশনে চিত্র X উপস্থাপন করে, এটি স্বয়ংক্রিয়ভাবে আপনার সম্প্রচার প্রোগ্রামে দৃশ্য Y তে পরিবর্তন করে।\nঅথবা যখনই বাইবেলের একটি শ্লোক উপস্থাপন করে, এটি স্বয়ংক্রিয়ভাবে আপনার সম্প্রচার প্রোগ্রামে দৃশ্য Z তে পরিবর্তন করে।\nএটি অনেক স্বয়ংক্রিয়করণের সম্ভাবনা তৈরি করে যা মাল্টিমিডিয়া দলের কাজকে সহজ এবং সাশ্রয়ী করে।

