#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>মঞ্চের দৃশ্য</b> একটি কনফিগারেশন যা একটি নির্দিষ্ট মনিটরের জন্য স্লাইড প্রদর্শন পরিবর্তন করে।<br>যদি আপনার দর্শকদের জন্য প্রজেকশনের জন্য একটি ভিডিও আউটপুট থাকে এবং মঞ্চে থাকা ব্যক্তির জন্য অন্য একটি ভিডিও আউটপুট থাকে, তবে আপনি <b>রিটার্ন</b> মনিটরটি দর্শকদের জন্য প্রদর্শিত থেকে আলাদা কনফিগার করতে পারেন।<br>অ্যাপ্লিকেশনের জন্য সম্প্রচারও কনফিগারযোগ্য।

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>চেকবক্স:</b> স্লাইডের পাঠ্যে একটি পরিবর্তন নির্ধারণ করে। উদাহরণ: বর্তমান স্লাইডের শেষে পরবর্তী স্লাইডের প্রথম লাইন উপস্থাপন করা।

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>বড় হাতের অক্ষর:</b> পুরো পাঠ্য বড় হাতের অক্ষরে উপস্থাপন করে।

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>লাইন ব্রেক সরান:</b> পাঠ্যটিকে ধারাবাহিকভাবে উপস্থাপন করে, স্লাইডের সীমাতে স্বয়ংক্রিয়ভাবে লাইন ভেঙে দেয় এবং সম্ভবত সর্বাধিক পার্শ্বীয় স্থান দখল করে।

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>কাস্টম থিম:</b> স্লাইডের প্রদর্শনের থিম পরিবর্তন করে।

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>বাইবেলের জন্য সক্ষম করুন:</b> বাইবেলের আয়াতগুলির জন্য কনফিগারেশনও সক্ষম করে (চেকবক্স কনফিগারেশন ব্যতীত)।

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=দ্রষ্টব্য: ভিডিও থিমগুলি রিটার্ন মনিটরে কাজ করে না, শুধুমাত্র দর্শকদের মনিটরে।

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=আপনি একটি নির্দিষ্ট প্যারাগ্রাফের জন্য একটি কাস্টম সংস্করণ যোগ করতে পারেন। উদাহরণস্বরূপ, গায়কের ফন্টের আকার <b>অনুপাতিকভাবে</b> বাড়ানো।<br>এবং একটি শনাক্তকরণ পাঠ্য (গায়ক, স্তবক, ইত্যাদি...) যোগ করুন যা শুধুমাত্র স্লাইডের ফুটারে প্রদর্শিত হবে।

#View example
m0009=উদাহরণ দেখুন

#This feature also works in the Quick Display window
m0010=এই বিকল্পটি দ্রুত উপস্থাপনা উইন্ডোতে কাজ করে

#Available Settings
m0011=উপলব্ধ সেটিংস

#All text in uppercase
m0012=সমস্ত টেক্সট বড় অক্ষরে

#putting the character '%' after the number is useless
m0013=সংখ্যার পরে '%' চিহ্নটি রাখা অপ্রয়োজনীয়

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=কৌতুকের মধ্যে লেখা = (গায়ক), (পদ্য), (পুনরাবৃত্তি), (শেষ), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=আরজিবি মান, হেক্সাডেসিমাল বা রঙের নাম বন্ধনীতে = [128,192,64] বা [80c040] বা [ff0] বা [নীল]...

#Valid names
m0016=বৈধ নাম

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=একটি কাস্টম ফরম্যাটিং যোগ করতে, প্যারাগ্রাফের শুরুতে দুটি "হ্যাশট্যাগ" ## দিয়ে একটি লাইন যোগ করুন এবং পরে আপনার পছন্দের কোডগুলি যুক্ত করুন (কোডগুলির ক্রম গুরুত্বপূর্ণ নয়)।

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=উদাহরণস্বরূপ, প্রক্ষেপণের জন্য লিরিক উপস্থাপন করার সময়, দ্বিতীয় প্যারাগ্রাফটি বোল্ডে, ফন্টের আকার 15% বড় এবং নীল রঙে উপস্থাপন করা হবে। অন্যান্য প্যারাগ্রাফগুলি থিমের সেটিংস সহ স্বাভাবিকভাবে উপস্থাপন করা হবে।

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=দ্রষ্টব্য: যদি ব্যবহৃত থিম ইতিমধ্যে বোল্ডে কনফিগার করা থাকে, উদাহরণস্বরূপ, তবে এই কাস্টম ফরম্যাটিংয়ের কোনও পার্থক্য হবে না।

#Some formatting examples
m0020=ফরম্যাটিংয়ের কিছু উদাহরণ

#Bold and italic
m0021=বোল্ড এবং ইটালিক

#25% bigger
m0022=25% বড়

#italic and 5% lower
m0023=ইটালিক এবং 5% ছোট

#Uppercase and yellow
m0024=মেজর এবং হলুদ

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=কোন কোন লাইনে কাস্টমাইজড ফরম্যাটিং প্রয়োগ করা হবে তা নির্ধারণ করা সম্ভব।<br> আপনি যে লাইনে কাস্টমাইজড ফরম্যাটিং প্রয়োগ করতে চান না তার শুরুতে দুটি ড্যাশ <b>--</b> যোগ করুন।

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=উদাহরণে, <b>"কিন্তু এখনও আমি জানি এটি কম"</b> লাইনটি থিমের মূল ফরম্যাটিং ব্যবহার করবে, এবং অন্যান্য লাইনগুলি কাস্টমাইজড ফরম্যাটিং (বোল্ড এবং হলুদ) ব্যবহার করবে।

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=আপনি <code>##p</code> কোডটি ব্যবহার করে একটি <b>মানক</b> ফরম্যাটিং ব্যবহার করতে পারেন।<br> <code>##p</code> দিয়ে সংজ্ঞায়িত সমস্ত প্যারাগ্রাফ নিচের ক্ষেত্রে সংজ্ঞায়িত ফরম্যাটিং ব্যবহার করবে।

#Default Custom Formatting
m0028=কাস্টমাইজড স্ট্যান্ডার্ড ফরম্যাটিং

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=প্রতিটি তালিকা হল Holyrics প্রোগ্রামের একটি অভ্যন্তরীণ ফোল্ডার: অডিও, ভিডিও এবং ইমেজ। ফাইল যোগ করতে: সংশ্লিষ্ট ট্যাবের {0} আইকনে ক্লিক করুন উইন্ডোজে ফোল্ডার খুলতে এবং ফোল্ডারে ফাইলগুলি পেস্ট করুন। প্রোগ্রামে তালিকাটি স্বয়ংক্রিয়ভাবে ফোল্ডারের ফাইলগুলির সাথে আপডেট হবে (যদি কোনও উপস্থাপনা সক্রিয় না থাকে)।

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>দ্রষ্টব্য:</b> ফোল্ডারে ফাইলের নাম পরিবর্তন করা এড়িয়ে চলুন, কারণ যদি আপনি একটি প্লেব্যাক, বুকমার্ক ইত্যাদির জন্য একটি ফাইলের জন্য শর্টকাট তৈরি করেন এবং পরে ফোল্ডারে নাম পরিবর্তন করেন, তবে প্রোগ্রামে শর্টকাটটি আর কাজ করবে না, আপনাকে একটি নতুন শর্টকাট তৈরি করতে হবে।

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=প্রতিটি ফোল্ডারে (অডিও, ভিডিও এবং ইমেজ), আপনি প্রোগ্রামে ফাইলের একটি তালিকা হিসাবে অন্যান্য ফোল্ডার তৈরি করতে পারেন। উদাহরণস্বরূপ: আপনি <b>ইমেজ</b> ফোল্ডারের মধ্যে <b>প্রেজেন্টেশন</b> নামে একটি ফোল্ডার তৈরি করতে পারেন এবং তাতে ছবি যোগ করতে পারেন। ফোল্ডারটি Holyrics প্রোগ্রামে একটি তালিকার আইটেম হবে এবং এতে ক্লিক করলে সমস্ত ছবি স্লাইড প্রদর্শনের জন্য খোলা হবে।

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=আপনি আপনার ডেস্কটপে এই ফোল্ডারগুলির জন্য একটি শর্টকাট যোগ করতে পারেন <a href='http://addShortcutDesktop'>এখানে</a> ক্লিক করে।

#Holyrics Library
m0033=Holyrics লাইব্রেরি

#Displays the song lyric in uppercase.
m0034=গানের লিরিক্স বড় অক্ষরে দেখায়।

#Enable/disable the underline in the song title at first slide.
m0035=প্রথম স্লাইডের গানের শিরোনামে আন্ডারলাইন সক্রিয়/নিষ্ক্রিয় করুন।

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=<b>সক্রিয়</b> বিকল্পের সাথে, প্রোগ্রামটি স্বয়ংক্রিয়ভাবে দীর্ঘ লাইনগুলি ভেঙে দেবে, মূল ফন্টের আকার কমানো এড়াতে। <b>নিষ্ক্রিয়</b> বিকল্পের সাথে, যদি কোনও দীর্ঘ লাইন থাকে যা স্লাইডের পাশের দিকে চলে যায়, তবে প্রোগ্রামটি ফন্টের আকার কমিয়ে দেবে যতক্ষণ না পুরো লাইনটি স্লাইডের মধ্যে থাকে।

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=প্যারাগ্রাফের <a href='http://customFormatting'>কাস্টম ফরম্যাটিং</a> সক্রিয়/নিষ্ক্রিয় করুন।

#Enable/disable <b>Custom Background</b>.
m0038=কাস্টম <b>পটভূমি</b> সক্রিয়/নিষ্ক্রিয় করুন।

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>লাইভ</b> প্যানেল বর্তমানে প্রধান প্রজেকশনে যা উপস্থাপন করা হচ্ছে তা দেখায়।<br>(VLC মিডিয়া প্লেয়ার দ্বারা চালিত পটভূমি এবং ভিডিও প্যানেলে প্রদর্শিত হয় না।)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=যদি আপনি 'মঞ্চে' থাকা ব্যক্তিদের জন্য একটি বিশেষ রিটার্ন মনিটর ব্যবহার করেন, তবে আপনি যোগাযোগ প্যানেলটি ব্যবহার করে শুধুমাত্র এই মনিটরে বার্তা উপস্থাপন করতে পারেন।<br>প্রদর্শনের সেটিংসে আপনি একটি মনিটরকে <b>মঞ্চের দৃশ্য</b> হিসাবে নির্ধারণ করতে পারেন (জনতার প্রধান মনিটর ব্যতীত), এবং যোগাযোগ প্যানেলে বার্তাগুলি শুধুমাত্র <b>মঞ্চের দৃশ্য</b> হিসাবে নির্ধারিত মনিটরগুলিতে প্রদর্শিত হবে।

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=অডিও বাজাতে দিন এবং স্লাইডে ক্লিক করুন যা আপনি চান যে গানটি বাজানোর সময় উপস্থাপিত হবে।<br>আপনি গানটির একটি অংশ বিরতি দিতে এবং পুনরায় শুরু করতে পারেন যেখানে আপনি থেমে গেছেন।<br>আপনি মাউসের ডান ক্লিক করে ক্যাপচার তালিকা থেকে একটি আইটেম মুছতে পারেন।

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=প্রথম স্লাইডের আগে উপস্থাপিত স্লাইডটি হল যা সম্পাদনা উইন্ডোতে নির্ধারিত।

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=গানের অংশ শুরু হওয়ার জন্য নির্দিষ্ট স্লাইডে ক্লিক করতে অপেক্ষা করবেন না, স্লাইডে ক্লিক করার জন্য কয়েক মিলিসেকেন্ড আগে ক্লিক করার চেষ্টা করুন, স্লাইডগুলির মধ্যে স্থানান্তরের সময় বিলম্ব এড়াতে।

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=<b>স্বয়ংক্রিয় উপস্থাপনা</b> এর মাধ্যমে আপনি একটি MP3 অডিওর সাথে সংযুক্ত প্রতিটি স্লাইডের সময়কাল নির্ধারণ করতে পারেন (যেমন একটি প্লেব্যাক)।<br>একবার তৈরি হলে, আপনি যে কোনও থিম বেছে নিতে পারেন এবং উপস্থাপনাটি শুরু করতে পারেন।<br>অডিও মিডিয়া প্লেয়ার দ্বারা বাজানো হবে এবং স্লাইডগুলি স্বয়ংক্রিয়ভাবে প্রদর্শিত হবে যখন গানটি বাজছে।

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>প্রাথমিক স্লাইড নির্ধারণ করুন</b> <i>শুরু করতে</i> এবং প্রাথমিক স্লাইডের <i>সময়কাল</i> (সেকেন্ডে) দিয়ে।

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>স্লাইডগুলি সংগঠিত করুন</b> নতুন স্লাইড যোগ করতে ডান ক্লিক করে এবং স্লাইডগুলি টেনে সাজান।

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>প্রতিটি স্লাইডের সময়কাল নির্ধারণ করুন</b> (সেকেন্ডে) <i>সময়কাল</i> ক্ষেত্রে। আপনি স্লাইড শুরু হওয়ার সঠিক সময় পরিবর্তন করতে পারেন মিনিট, সেকেন্ড এবং মিলিসেকেন্ড প্রদর্শনকারী টেক্সটে ক্লিক করে।

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> সংশ্লিষ্ট স্লাইড থেকে গানটি বাজায় শেষ পর্যন্ত।

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> শুধুমাত্র সংশ্লিষ্ট স্লাইডের অংশটি বাজায়।

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=আপনি স্লাইডগুলির অর্ডার এবং প্রতিটির সময়কাল তৈরি করতে <i>ক্যাপচার পদ্ধতি</i> ব্যবহার করতে পারেন।

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=স্বয়ংক্রিয় উপস্থাপনাটি সংরক্ষণ করার সময়, তৈরি করা ফাইল <b>[ফাইলের নাম].ap</b> ইতিমধ্যে নির্বাচিত MP3 অডিও অন্তর্ভুক্ত করবে। আপনাকে <b>(*.ap)</b> ফাইলের সাথে অডিও কপি করার বিষয়ে চিন্তা করতে হবে না।

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=আপনি উপস্থাপিত হওয়ার সময় নির্দিষ্ট স্লাইডের টেক্সট সম্পাদনা করতে পারেন।<br> - আপনি যে স্লাইডটি সম্পাদনা করতে চান তাতে ডান ক্লিক করে (মুখ্য উইন্ডোর নিচের স্লাইডের তালিকা);<br> - অথবা বর্তমানে প্রদর্শিত স্লাইডটি সম্পাদনা করতে <b>SHIFT + F12</b> চাপুন।

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=চ্যাট হল Holyrics PC এবং মোবাইলের জন্য Holyrics অ্যাপ্লিকেশনের মধ্যে যোগাযোগের একটি মাধ্যম।<br>নেটওয়ার্কে সংযুক্ত যে কোনও মোবাইল চ্যাট অ্যাপ্লিকেশন দ্বারা চ্যাটে প্রবেশ করতে এবং PC-তে বার্তা পাঠাতে পারে।

#The selected presentation will run automatically.
m0054=নির্বাচিত উপস্থাপনাটি স্বয়ংক্রিয়ভাবে চালানো হবে।

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=বার্তাটি নির্বাচন করতে ক্লিক করুন।<br>একটি বার্তা পুনর্বিন্যাস করতে এটি টেনে আনুন।<br>বার্তার শুরুতে হাইলাইট করা কীটি টাইপ করুন যাতে সংশ্লিষ্ট বার্তাটি নির্বাচন করা হয়। <b>(প্রথম চিত্র)</b><br>বার্তার জন্য আরও বিকল্পের জন্য মাউসের ডান ক্লিক করুন। <b>(দ্বিতীয় চিত্র)</b>

#You can change the background or Theme for each paragraph
m0056=আপনি প্রতিটি প্যারাগ্রাফের পটভূমি বা থিম পরিবর্তন করতে পারেন

#by clicking the slide {0} icon
m0057=স্লাইডের {0} আইকনে ক্লিক করে

#dragging an item from themes list to the slide
m0058=থিমের তালিকা থেকে একটি আইটেম স্লাইডে টেনে এনে

#or by right-clicking on the slide for more options
m0059=অথবা স্লাইডে ডান ক্লিক করে আরও বিকল্পের জন্য

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>সতর্কতা!</b> পটভূমি হিসাবে ছবি বা ভিডিও নির্ধারণ করার সময়, ফন্টের রঙ, অ্যালাইনমেন্ট ইত্যাদির মতো সমস্ত কনফিগারেশন নির্বাচিত থিমের জন্য হবে। তাই গানটির <b>ডিফল্ট থিম</b> পরিবর্তন করার সময় সতর্ক থাকুন, কারণ পূর্বে কনফিগার করা ছবি এবং ভিডিও নতুন নির্বাচিত থিমের সাথে মেলাতে নাও পারে।

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=এটি একটি ফাংশন যা আপনাকে প্রোগ্রামটি সম্প্রসারিত মোডে ব্যবহার করতে দেয় যদিও অন্য মনিটর সংযুক্ত নেই।<br>আপনার নিজের মনিটরে একটি ছোট উইন্ডো প্রদর্শন করতে পারে, যা প্রকৃত প্রক্ষেপণে প্রদর্শিত হবে।

