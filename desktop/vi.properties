#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=Quy mô trong chế độ <b>chức năng</b> có tổ chức khác với chế độ tiêu chuẩn cũ.<br>Trong loại tổ chức mới này, bạn tạo (trong cài đặt của chương trình) tất cả các chức năng có trong bộ phận và sau đó bạn xác định một thành viên cho mỗi chức năng.<br><br>Trong chế độ cũ, bạn có một <b>thành viên</b> trong mỗi dòng và xác định xem họ có được phân công hay không, đánh dấu một ô kiểm.<br><br>Trong chế độ mới (chức năng), bạn có một <b>chức năng</b> trong mỗi dòng và xác định thành viên nào <b>được phân công</b> cho chức năng này.

