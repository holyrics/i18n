#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Chế độ Sân khấu</b> là một cài đặt thay đổi cách hiển thị các slide cho một màn hình cụ thể.<br>Nếu bạn có một đầu ra video cho việc chiếu mà khán giả nhìn thấy và có một đầu ra video khác cho những người ở trên <b>sân khấu</b>, bạn có thể cấu hình màn hình <b>trả về</b> theo cách khác với những gì đang được hiển thị cho khán giả.<br>Việc truyền đến ứng dụng cũng có thể được cấu hình.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Hộp kiểm:</b> Định nghĩa một thay đổi trong văn bản của slide. Ví dụ: Hiển thị dòng đầu tiên của slide tiếp theo ở cuối slide hiện tại.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Chữ hoa:</b> Hiển thị toàn bộ văn bản bằng chữ hoa.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Xóa ngắt dòng:</b> Hiển thị văn bản một cách liên tục, tự động ngắt dòng ở giới hạn của slide và chiếm tối đa không gian bên.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Chủ đề Tùy chỉnh:</b> Thay đổi chủ đề hiển thị của slide.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Bật cho Kinh Thánh:</b> Bật các cài đặt cũng cho các câu trong Kinh Thánh (trừ cài đặt hộp kiểm).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Lưu ý: Chủ đề video không hoạt động trên màn hình trả về, chỉ trên màn hình của khán giả.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Bạn có thể thêm một chỉnh sửa tùy chỉnh cho một đoạn cụ thể của lời bài hát. Ví dụ, tăng <b>tương ứng</b> kích thước phông chữ của điệp khúc.<br>Và cũng đặt một văn bản nhận dạng (điệp khúc, câu, v.v...) sẽ chỉ xuất hiện ở chân trang của các slide.

#View example
m0009=Xem ví dụ

#This feature also works in the Quick Display window
m0010=Tùy chọn này cũng hoạt động trong cửa sổ Trình bày Nhanh

#Available Settings
m0011=Cài đặt có sẵn

#All text in uppercase
m0012=Tất cả văn bản in hoa

#putting the character '%' after the number is useless
m0013=đặt ký tự '%' sau số là không cần thiết

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=văn bản trong ngoặc đơn = (điệp khúc), (câu), (lặp lại), (cuối), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=giá trị rgb, hex hoặc tên màu trong dấu ngoặc vuông = [128,192,64] hoặc [80c040] hoặc [ff0] hoặc [xanh]...

#Valid names
m0016=Tên hợp lệ

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Để thêm định dạng tùy chỉnh, hãy thêm một dòng ở đầu đoạn bắt đầu bằng hai "hashtag" ## và các mã bạn muốn ngay sau đó (thứ tự của các mã không quan trọng).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Trong ví dụ, khi trình bày lời để phát, đoạn thứ hai sẽ được trình bày in đậm, với kích thước chữ lớn hơn 15% và màu xanh. Các đoạn khác sẽ được trình bày bình thường với các cài đặt của Chủ đề.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Lưu ý: Nếu chủ đề đang sử dụng đã được cấu hình để in đậm, ví dụ, định dạng tùy chỉnh này sẽ không có sự khác biệt.

#Some formatting examples
m0020=Một số ví dụ về định dạng

#Bold and italic
m0021=Đậm và nghiêng

#25% bigger
m0022=Lớn hơn 25%

#italic and 5% lower
m0023=nghiêng và nhỏ hơn 5%

#Uppercase and yellow
m0024=Chữ hoa và vàng

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Có thể xác định các dòng nào sẽ áp dụng định dạng tùy chỉnh.<br> Thêm hai dấu gạch ngang <b>--</b> ở đầu dòng mà bạn không muốn áp dụng định dạng tùy chỉnh.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Trong ví dụ, dòng <b>"Nhưng tôi biết vẫn còn ít"</b> sẽ sử dụng định dạng gốc của chủ đề, và các dòng còn lại sẽ sử dụng định dạng tùy chỉnh (đậm và vàng).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Bạn có thể sử dụng mã <code>##p</code> để sử dụng định dạng <b>chuẩn</b>.<br>Tất cả các đoạn văn được xác định bằng <code>##p</code> sẽ sử dụng định dạng được xác định trong trường bên dưới.

#Default Custom Formatting
m0028=Định dạng Tùy chỉnh Chuẩn

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Mỗi danh sách đại diện cho một thư mục nội bộ của chương trình Holyrics: Âm thanh, Video và Hình ảnh. Để thêm tệp: nhấp vào biểu tượng {0} của tab tương ứng để mở thư mục trong Windows và dán các tệp vào thư mục. Danh sách trong chương trình sẽ được cập nhật tự động với các tệp trong thư mục (trừ khi có một bài trình bày nào đó đang hoạt động).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Chú ý:</b> TRÁNH đổi tên các tệp trong thư mục, vì nếu bạn tạo một phím tắt cho một tệp trong danh sách phát, danh sách yêu thích, v.v. và sau đó đổi tên nó trong thư mục, phím tắt trong chương trình sẽ không còn hoạt động nữa, bạn sẽ cần tạo một phím tắt mới.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=Trong mỗi thư mục (Âm thanh, Video và Hình ảnh), bạn có thể tạo các thư mục khác để làm danh sách tệp trong chương trình. Ví dụ: Bạn có thể tạo một thư mục có tên <b>Trình bày</b> bên trong thư mục <b>Hình ảnh</b> và thêm hình ảnh vào đó. Thư mục sẽ là một mục trong danh sách trong chương trình Holyrics và khi nhấp vào nó, tất cả hình ảnh sẽ được mở để trình bày.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Bạn có thể thêm một phím tắt cho các thư mục này trên màn hình chính của bạn bằng cách nhấp vào <a href='http://addShortcutDesktop'>ĐÂY</a>.

#Holyrics Library
m0033=Thư viện Holyrics

#Displays the song lyric in uppercase.
m0034=Hiển thị lời bài hát bằng chữ hoa.

#Enable/disable the underline in the song title at first slide.
m0035=Bật/tắt gạch chân trong tiêu đề bài hát của trang trình bày đầu tiên.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Với tùy chọn <b>được bật</b>, chương trình sẽ tự động ngắt các dòng dài, tránh làm giảm kích thước gốc của phông chữ. Với tùy chọn <b>được tắt</b>, nếu có một dòng dài vượt quá cạnh của trang trình bày, chương trình sẽ giảm kích thước phông chữ cho đến khi toàn bộ dòng nằm trong trang trình bày.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Bật/tắt <a href='http://customFormatting'>định dạng tùy chỉnh</a> cho đoạn văn.

#Enable/disable <b>Custom Background</b>.
m0038=Bật/tắt <b>hình nền tùy chỉnh</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Bảng điều khiển <b>TRỰC TIẾP</b> hiển thị những gì đang được trình bày hiện tại trong chiếu chính.<br>(Hình nền và video phát bằng VLC Media Player sẽ không xuất hiện trên bảng điều khiển.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Nếu bạn sử dụng một màn hình trả lại dành riêng cho những người ở 'sân khấu', bạn có thể sử dụng bảng điều khiển giao tiếp để trình bày tin nhắn chỉ trên màn hình này.<br>Trong cài đặt hiển thị, bạn có thể xác định một màn hình là <b>tầm nhìn sân khấu</b> (trừ màn hình chính của khán giả), và các tin nhắn trên bảng điều khiển giao tiếp sẽ chỉ được hiển thị trên các màn hình được xác định là <b>tầm nhìn sân khấu</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Đặt âm thanh để phát và nhấp vào trang trình bày mà bạn muốn được trình bày trong khi bài hát đang phát.<br>Bạn có thể tạm dừng và quay lại một đoạn của bài hát để bắt đầu lại từ nơi đã dừng lại.<br>Bạn cũng có thể xóa một mục khỏi danh sách đã ghi lại bằng cách nhấp chuột phải.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Trang trình bày sẽ được trình bày trước trang trình bày đầu tiên mà bạn nhấp vào là trang được xác định trong cửa sổ chỉnh sửa.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Đừng chờ đợi để bắt đầu đoạn bài hát để nhấp vào trang trình bày cụ thể, hãy cố gắng nhấp vào trang trình bày vài phần nghìn giây trước, tránh độ trễ trong chuyển tiếp giữa các trang trình bày.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Với <b>Trình bày Tự động</b>, bạn có thể lập trình thời gian cho mỗi trang trình bày tích hợp với âm thanh MP3 (một phát lại, chẳng hạn).<br>Sau khi tạo, bạn có thể chọn bất kỳ chủ đề nào bạn muốn và bắt đầu trình bày.<br>Âm thanh sẽ được phát bằng Media Player và các trang trình bày sẽ được hiển thị tự động trong khi bài hát đang phát.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Đặt trang trình bày ban đầu</b> với tùy chọn <i>Bắt đầu với</i> và <i>thời gian</i> (tính bằng giây) của trang trình bày ban đầu.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Định tổ chức các trang trình bày</b> bằng cách nhấp chuột phải để thêm các trang trình bày mới và kéo các trang trình bày để sắp xếp chúng.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Đặt thời gian cho mỗi trang trình bày</b> (tính bằng giây) trong trường <i>Thời gian</i>. Bạn cũng có thể thay đổi thời gian chính xác mà trang trình bày bắt đầu bằng cách nhấp vào văn bản hiển thị phút, giây và phần nghìn.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> phát bài hát từ trang trình bày tương ứng đến cuối bài hát.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> chỉ phát đoạn tương ứng của trang trình bày.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Bạn có thể sử dụng <i>Phương pháp ghi lại</i> để dễ dàng tạo thứ tự cho các trang trình bày và thời gian cho mỗi trang.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Khi lưu <i>Trình bày Tự động</i>, tệp được tạo <b>[tên tệp].ap</b> sẽ tự động bao gồm âm thanh MP3 đã chọn. Bạn không cần lo lắng về việc sao chép âm thanh cùng với tệp <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Bạn có thể chỉnh sửa văn bản của một số trang trình bày trong khi chúng đang được trình bày.<br> - Nhấp chuột phải vào trang trình bày mà bạn muốn chỉnh sửa (danh sách các trang trình bày ở chân cửa sổ chính);<br> - hoặc nhấn <b>SHIFT + F12</b> để chỉnh sửa trang trình bày đang được hiển thị.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Chat là một phương tiện giao tiếp giữa Holyrics trên PC và ứng dụng Holyrics cho điện thoại di động.<br>Bất kỳ điện thoại di động nào kết nối với mạng đều có thể truy cập chat qua ứng dụng và gửi tin nhắn đến PC.

#The selected presentation will run automatically.
m0054=Trình bày đã chọn sẽ được thực hiện tự động.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Nhấp vào tin nhắn để chọn nó.<br>Kéo một tin nhắn để sắp xếp lại nó trong danh sách.<br>Nhập phím được làm nổi bật ở đầu tin nhắn để chọn tin nhắn tương ứng. <b>(hình ảnh đầu tiên)</b><br>Nhấp chuột phải vào tin nhắn để có thêm tùy chọn. <b>(hình ảnh thứ hai)</b>

#You can change the background or Theme for each paragraph
m0056=Bạn có thể thay đổi hình nền hoặc Chủ đề của mỗi đoạn văn

#by clicking the slide {0} icon
m0057=nhấp vào biểu tượng {0} của trang trình bày

#dragging an item from themes list to the slide
m0058=kéo một mục từ danh sách chủ đề vào trang trình bày

#or by right-clicking on the slide for more options
m0059=hoặc nhấp chuột phải vào trang trình bày để có thêm tùy chọn

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Chú ý!</b> Khi đặt hình ảnh hoặc video làm nền, tất cả các cài đặt như màu chữ, căn chỉnh, v.v. sẽ theo Chủ đề đã chọn cho bài hát. Vì vậy, hãy cẩn thận khi thay đổi <b>Chủ đề mặc định</b> của bài hát, vì hình ảnh và video đã được cấu hình trước đó có thể không phù hợp với chủ đề mới đã chọn.

