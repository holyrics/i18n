#The program uses a free resource provided by the Vagalume lyrics site. But the number of searches per day has a limit, and since all Holyrics users use the same credential it is possible that this limit is reached and no one else can perform searches on the day.<br>If you do a lot of research on the internet, you can create your own credential to prevent the program limit from being reached and other users can not search through this window. Thank you!
m0161=Chương trình sử dụng một tài nguyên miễn phí được cung cấp bởi trang web lời bài hát Vagalume. Tuy nhiên, số lượng tìm kiếm mỗi ngày có giới hạn, và vì tất cả người dùng của Holyrics sử dụng cùng một thông tin xác thực, có thể giới hạn này sẽ bị đạt và không ai có thể thực hiện tìm kiếm trong ngày.<br>Nếu bạn sử dụng nhiều tìm kiếm qua internet, bạn có thể tạo thông tin xác thực riêng của mình để tránh việc giới hạn của chương trình bị đạt và những người dùng khác không thể tìm kiếm qua cửa sổ này. Cảm ơn!

