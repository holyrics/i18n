#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=Trong chế độ phát triển, mã JavaScript được đồng bộ hóa với một tệp trong thư mục con của chương trình và mọi thay đổi được thực hiện ở đây trong chương trình sẽ được lưu vào tệp, cũng như mọi thay đổi được thực hiện bên ngoài tệp sẽ được phản ánh trong mã JavaScript đã lưu và thực thi ở đây trong chương trình.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Điều này cho phép mã JavaScript được chỉnh sửa bởi một trình soạn thảo bên ngoài (IDE mà bạn chọn) và các thay đổi tự động được phản ánh ở đây trong chương trình.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Chú ý: cẩn thận khi sử dụng chế độ này, vì điều đó có nghĩa là mã JavaScript sẽ được thực thi tự động trong Holyrics dựa trên một tệp bên ngoài có thể đọc được và có thể được chỉnh sửa bởi bất kỳ quy trình/chương trình nào khác đang chạy trên máy tính.

