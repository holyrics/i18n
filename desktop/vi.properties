#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=Trong chế độ phát triển của Community, một thư mục con của chương trình được sử dụng để lưu trữ mã JavaScript bổ sung sẽ được tải cùng với mã JSCommunity và mọi thay đổi được thực hiện bên ngoài tệp sẽ được phản ánh trong mã "jsc" được tải và thực thi ở đây trong chương trình.

