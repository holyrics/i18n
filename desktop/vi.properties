#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Có thể tạo các mục để thêm vào thanh dấu trang hoặc danh sách phát thực hiện các yêu cầu HTTP hoặc gửi mã MIDI đến các thiết bị khác.\nĐiều này cho phép thực hiện các hành động trên các chương trình và thiết bị khác, như OBS Studio, chương trình ánh sáng, camera PTZ, v.v.\nVí dụ, có thể tạo một mục mà khi thực thi, thay đổi một cảnh trong chương trình phát sóng của bạn, hoặc một mục chọn một preset của camera PTZ trên mạng, v.v.\nNhững hành động này có thể được thực hiện bằng cách nhấp vào mục hoặc cũng có thể được thực hiện tự động thông qua chức năng <b>Gợi ý</b> của chương trình.\nVí dụ, có thể tạo một gợi ý để mỗi khi Holyrics trình bày hình ảnh X trên chiếu, tự động chuyển sang cảnh Y trong chương trình phát sóng của bạn.\nHoặc mỗi khi trình bày một câu trong Kinh Thánh, tự động chuyển sang cảnh Z trong chương trình phát sóng của bạn.\nCó rất nhiều khả năng tự động hóa giúp dễ dàng và tiết kiệm công sức cho đội ngũ đa phương tiện.

