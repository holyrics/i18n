#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=توجہ: اس موڈ کا استعمال کرتے وقت محتاط رہیں، کیونکہ اس کا مطلب ہے کہ جاوا اسکرپٹ کوڈ جو خودکار طور پر Holyrics میں چلایا جائے گا ایک قابل پڑھنے والی بیرونی فائل پر مبنی ہے جسے کسی دوسرے عمل/پروگرام کے ذریعے ترمیم کیا جا سکتا ہے جو کمپیوٹر پر چل رہا ہے۔

