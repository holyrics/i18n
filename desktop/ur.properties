#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>اسٹیج کا منظر</b> ایک ترتیب ہے جو مخصوص مانیٹر کے لیے سلائیڈز کی نمائش کو تبدیل کرتی ہے۔<br>اگر آپ کے پاس عوام کے لیے پروجیکشن کے لیے ایک ویڈیو آؤٹ پٹ ہے اور اسٹیج پر موجود لوگوں کے لیے ایک اور ویڈیو آؤٹ پٹ ہے، تو آپ ریٹرن مانیٹر کو عوام کے لیے دکھائے جانے والے سے مختلف ترتیب دے سکتے ہیں۔<br>ایپلیکیشن کے لیے نشریات بھی ترتیب دی جا سکتی ہیں۔

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>چیک باکس:</b> سلائیڈ کے متن میں تبدیلی طے کرتا ہے۔ مثال: موجودہ سلائیڈ کے آخر میں اگلی سلائیڈ کی پہلی لائن پیش کرنا۔

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>بڑے حروف:</b> تمام متن کو بڑے حروف میں پیش کرتا ہے۔

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>لائن بریک ہٹائیں:</b> متن کو مسلسل پیش کرتا ہے، خود بخود سلائیڈ کی حد پر لائن توڑتا ہے اور ممکنہ حد تک زیادہ سے زیادہ سائیڈ اسپیس لیتا ہے۔

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>حسب ضرورت تھیم:</b> سلائیڈ کی نمائش کے تھیم کو تبدیل کرتا ہے۔

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>بائبل کے لیے فعال کریں:</b> بائبل کی آیات کے لیے ترتیبات کو بھی فعال کرتا ہے (چیک باکس کی ترتیب کے سوا)۔

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=نوٹ: ویڈیو تھیمز ریٹرن مانیٹروں پر کام نہیں کرتے، صرف عوامی مانیٹر پر۔

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=آپ مخصوص پیراگراف کے لیے ایک حسب ضرورت ایڈیشن شامل کر سکتے ہیں۔ مثال کے طور پر، <b>تناسبی</b> طور پر کور کے متن کے سائز کو بڑھانا۔<br>اور ایک شناختی متن (کور، آیت، وغیرہ...) بھی شامل کریں جو صرف سلائیڈ کے فوٹر میں ظاہر ہوگا۔

#View example
m0009=مثال دیکھیں

#This feature also works in the Quick Display window
m0010=یہ آپشن فوری پیشکش کی ونڈو میں بھی کام کرتا ہے

#Available Settings
m0011=دستیاب ترتیبات

#All text in uppercase
m0012=تمام متن بڑے حروف میں

#putting the character '%' after the number is useless
m0013=نمبر کے بعد '%' کردار ڈالنا غیر ضروری ہے

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=قوسین کے اندر متن = (کورو)، (اشعار)، (دہرائیں)، (اختتام)، ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb، ہیکسڈیکمل یا رنگ کا نام بریکٹ میں = [128,192,64] یا [80c040] یا [ff0] یا [نیلا]...

#Valid names
m0016=معتبر نام

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=حسب ضرورت فارمیٹنگ شامل کرنے کے لیے، پیراگراف کے آغاز میں دو "ہیش ٹیگ" ## کے ساتھ ایک لائن شامل کریں اور اس کے بعد جو بھی کوڈ چاہیں شامل کریں (کوڈ کی ترتیب اہم نہیں ہے)۔

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=مثال کے طور پر، جب پیشکش کے لیے بول پیش کیے جاتے ہیں، تو دوسرا پیراگراف بولڈ میں پیش کیا جائے گا، فونٹ کا سائز 15% بڑا اور نیلے رنگ میں۔ دوسرے پیراگراف عام طور پر تھیم کی ترتیبات کے ساتھ پیش کیے جائیں گے۔

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=نوٹ: اگر استعمال کردہ تھیم پہلے ہی بولڈ کے لیے ترتیب دی گئی ہے، تو یہ حسب ضرورت فارمیٹنگ کوئی فرق نہیں ڈالے گی۔

#Some formatting examples
m0020=فارمیٹنگ کی کچھ مثالیں

#Bold and italic
m0021=موٹا اور اٹالک

#25% bigger
m0022=25% بڑا

#italic and 5% lower
m0023=تھوڑا سا اور 5% چھوٹا

#Uppercase and yellow
m0024=بڑے حروف اور پیلا

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=یہ طے کرنا ممکن ہے کہ کون سی لائنوں پر حسب ضرورت فارمیٹنگ لاگو ہوگی۔<br> اس لائن کے آغاز میں دو ڈیش <b>--</b> شامل کریں جس پر آپ حسب ضرورت فارمیٹنگ لاگو نہیں کرنا چاہتے۔

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=مثال میں، لائن <b>"لیکن میں جانتا ہوں کہ یہ ابھی بھی کم ہے"</b> تھیم کی اصل فارمیٹنگ کا استعمال کرے گی، اور باقی لائنیں حسب ضرورت فارمیٹنگ (موٹا اور پیلا) کا استعمال کریں گی۔

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=آپ <code>##p</code> کو معیاری <b>فارمیٹنگ</b> استعمال کرنے کے لیے استعمال کر سکتے ہیں۔<br>تمام پیراگراف جو <code>##p</code> کے ساتھ مقرر کیے گئے ہیں نیچے دیے گئے فیلڈ میں مقرر کردہ فارمیٹنگ کا استعمال کریں گے۔

#Default Custom Formatting
m0028=حسب ضرورت معیاری فارمیٹنگ

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=ہر فہرست ہولیرکس پروگرام کے اندرونی فولڈر کی نمائندگی کرتی ہے: آڈیو، ویڈیو اور امیج۔ فائلیں شامل کرنے کے لیے: متعلقہ ٹیب کے {0} آئیکن پر کلک کریں تاکہ ونڈوز میں فولڈر کھولیں اور فائلیں فولڈر میں پیسٹ کریں۔ پروگرام میں فہرست خود بخود فولڈر کی فائلوں کے ساتھ اپ ڈیٹ ہو جاتی ہے (سوائے اس کے کہ اگر کوئی پریزنٹیشن فعال ہو)۔

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>نوٹ:</b> فولڈر میں فائلوں کا نام تبدیل کرنے سے گریز کریں، کیونکہ اگر آپ کسی فائل کے لیے ایک شارٹ کٹ بناتے ہیں جو پلے لسٹ، پسندیدہ، وغیرہ میں ہے اور پھر اسے فولڈر میں نام تبدیل کرتے ہیں، تو پروگرام میں شارٹ کٹ مزید کام نہیں کرے گا، آپ کو ایک نیا شارٹ کٹ بنانا ہوگا۔

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=ہر ایک فولڈر (آڈیو، ویڈیو اور امیج) میں، آپ پروگرام میں فائلوں کی فہرست کے لیے دوسرے فولڈرز بنا سکتے ہیں۔ مثال کے طور پر: آپ <b>تصویریں</b> فولڈر کے اندر <b>پریزنٹیشن</b> نامی فولڈر بنا سکتے ہیں اور اس میں تصاویر شامل کر سکتے ہیں۔ یہ فولڈر ہولیرکس پروگرام میں فہرست کا ایک آئٹم ہوگا اور اس پر کلک کرنے پر تمام تصاویر سلائیڈ پریزنٹیشن کے لیے کھل جائیں گی۔

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=آپ ان فولڈروں کے لیے اپنے ڈیسک ٹاپ پر ایک شارٹ کٹ شامل کر سکتے ہیں <a href='http://addShortcutDesktop'>یہاں</a> کلک کرکے۔

#Holyrics Library
m0033=ہولیرکس لائبریری

#Displays the song lyric in uppercase.
m0034=گانے کے الفاظ کو بڑے حروف میں دکھاتا ہے۔

#Enable/disable the underline in the song title at first slide.
m0035=پہلی سلائیڈ کے گانے کے عنوان پر نیچے کی لکیر کو فعال/غیر فعال کریں۔

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=جب <b>فعال</b> آپشن ہو تو، پروگرام طویل لائنوں کو خود بخود توڑ دے گا، اصل فونٹ کے سائز کو کم کرنے سے بچتے ہوئے۔ جب <b>غیر فعال</b> ہو تو، اگر کوئی طویل لائن ہو جو سلائیڈ کے کنارے سے باہر نکل جائے، تو پروگرام فونٹ کے سائز کو کم کر دے گا جب تک کہ پوری لائن سلائیڈ کے اندر نہ ہو۔

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=پیراگراف کی <a href='http://customFormatting'>حسب ضرورت فارمیٹنگ</a> کو فعال/غیر فعال کریں۔

#Enable/disable <b>Custom Background</b>.
m0038=حسب ضرورت <b>پس منظر</b> کو فعال/غیر فعال کریں۔

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>لائیو</b> پینل اس وقت پیش کی جانے والی چیز کو دکھاتا ہے۔<br>(پس منظر اور ویڈیو جو VLC میڈیا پلیئر کے ذریعے چلائی جاتی ہیں وہ پینل میں ظاہر نہیں ہوتی ہیں۔)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=اگر آپ 'اسٹیج' پر موجود لوگوں کے لیے ایک خصوصی ریٹرن مانیٹر استعمال کرتے ہیں، تو آپ مواصلات کے پینل کا استعمال کرکے صرف اس مانیٹر پر پیغامات پیش کر سکتے ہیں۔<br>دکھائی دینے والی ترتیبات میں، آپ ایک مانیٹر کو <b>اسٹیج کا منظر</b> کے طور پر طے کر سکتے ہیں (عوام کے مرکزی مانیٹر کے علاوہ)، اور مواصلات کے پینل میں پیغامات صرف ان مانیٹروں پر دکھائے جائیں گے جو <b>اسٹیج کا منظر</b> کے طور پر طے کیے گئے ہیں۔

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=آڈیو چلائیں اور اس سلائیڈ پر کلک کریں جسے آپ چاہتے ہیں کہ موسیقی چلتے وقت پیش کیا جائے۔<br>آپ موسیقی کے ایک ٹکڑے کو روک سکتے ہیں اور واپس جا سکتے ہیں تاکہ جہاں سے رک گیا تھا وہاں سے دوبارہ شروع کر سکیں۔<br>آپ فہرست سے کسی آئٹم کو حذف کرنے کے لیے دائیں کلک بھی کر سکتے ہیں۔

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=سلائیڈ جو آپ نے پہلے کلک کیا ہے اس سے پہلے پیش کی جائے گی وہ ہے جو ایڈیٹنگ ونڈو میں طے کی گئی ہے۔

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=موسیقی کے ٹکڑے کے شروع ہونے کا انتظار نہ کریں، مخصوص سلائیڈ پر کلک کرنے کے لیے چند ملی سیکنڈ پہلے کلک کرنے کی کوشش کریں، سلائیڈز کے درمیان منتقلی میں تاخیر سے بچنے کے لیے۔

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=<b>خودکار پیشکش</b> کے ساتھ آپ ہر سلائیڈ کی مدت کو ایک MP3 آڈیو (مثلاً ایک پلے بیک) کے ساتھ پروگرام کر سکتے ہیں۔<br>ایک بار بن جانے کے بعد، آپ کوئی بھی تھیم منتخب کر سکتے ہیں جو آپ چاہتے ہیں اور پیشکش شروع کر سکتے ہیں۔<br>آڈیو میڈیا پلیئر کے ذریعے چلایا جائے گا اور سلائیڈز خود بخود دکھائے جائیں گے جب موسیقی چل رہی ہو۔

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>ابتدائی سلائیڈ طے کریں</b> <i>شروع کرنے کے ساتھ</i> اور ابتدائی سلائیڈ کی <i>مدت</i> (سیکنڈ میں) کے ساتھ۔

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>سلائیڈز کو منظم کریں</b> نئے سلائیڈز شامل کرنے کے لیے دائیں کلک کرکے اور سلائیڈز کو ترتیب دینے کے لیے کھینچ کر۔

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=ہر سلائیڈ کی مدت <b>طے کریں</b> (سیکنڈ میں) <i>مدت</i> فیلڈ میں۔ آپ اس وقت کو بھی تبدیل کر سکتے ہیں جب سلائیڈ شروع ہوتا ہے، منٹ، سیکنڈ اور ملی سیکنڈ کے متن پر کلک کرکے۔

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> متعلقہ سلائیڈ سے لے کر گانے کے آخر تک موسیقی چلاتا ہے۔

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> صرف متعلقہ سلائیڈ کے ٹکڑے کو چلاتا ہے۔

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=آپ سلائیڈز کی ترتیب اور ہر ایک کی مدت بنانے میں آسانی کے لیے <i>کیپچر کا طریقہ</i> استعمال کر سکتے ہیں۔

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=جب آپ <i>خودکار پیشکش</i> کو محفوظ کرتے ہیں، تو تیار کردہ فائل <b>[فائل کا نام].ap</b> پہلے سے منتخب کردہ MP3 آڈیو کو شامل کرے گی۔ آپ کو <b>(*.ap)</b> فائل کے ساتھ آڈیو کاپی کرنے کی فکر کرنے کی ضرورت نہیں ہے۔

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=آپ مخصوص سلائیڈز کے متن میں ترمیم کر سکتے ہیں جب وہ پیش کیے جا رہے ہوں۔<br> - جس سلائیڈ میں آپ ترمیم کرنا چاہتے ہیں اس پر دائیں کلک کرکے (اہم ونڈو کے نیچے سلائیڈز کی فہرست)؛<br> - یا اس وقت دکھائی جانے والی سلائیڈ میں ترمیم کرنے کے لیے <b>SHIFT + F12</b> دبائیں۔

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=چیٹ ہولیرکس کو پی سی اور ہولیرکس ایپ کے درمیان مواصلت کا ایک ذریعہ ہے۔<br>کوئی بھی موبائل جو نیٹ ورک سے جڑا ہوا ہے وہ ایپ کے ذریعے چیٹ تک رسائی حاصل کر سکتا ہے اور پی سی کو پیغامات بھیج سکتا ہے۔

#The selected presentation will run automatically.
m0054=منتخب کردہ پیشکش خود بخود چلائی جائے گی۔

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=پیغام پر کلک کریں تاکہ اسے منتخب کریں۔<br>پیغام کو فہرست میں دوبارہ ترتیب دینے کے لیے کھینچیں۔<br>پیغام کے آغاز میں نمایاں کردہ کلید کو ٹائپ کریں تاکہ متعلقہ پیغام منتخب ہو۔ <b>(پہلی تصویر)</b><br>پیغام پر مزید اختیارات کے لیے دائیں کلک کریں۔ <b>(دوسری تصویر)</b>

#You can change the background or Theme for each paragraph
