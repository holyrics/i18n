#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>توجہ!</b> جب تصویر یا ویڈیو کو پس منظر کے طور پر طے کریں تو تمام ترتیبات جیسے فونٹ کا رنگ، سیدھ وغیرہ منتخب کردہ تھیم کے مطابق ہوں گی۔ لہذا، موسیقی کے <b>معیاری تھیم</b> کو تبدیل کرتے وقت محتاط رہیں، کیونکہ پہلے سے طے شدہ تصاویر اور ویڈیوز نئے منتخب کردہ تھیم کے ساتھ ہم آہنگ نہیں ہو سکتے۔

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=یہ ایک ایسی فعالیت ہے جو آپ کو پروگرام کو اس طرح استعمال کرنے کی اجازت دیتی ہے جیسے آپ توسیع شدہ موڈ میں ہیں حالانکہ آپ کے پاس کوئی اضافی مانیٹر منسلک نہیں ہے۔<br>آپ اپنے اپنے مانیٹر پر ایک چھوٹی سی ونڈو دکھا سکتے ہیں، جو حقیقی پروجیکشن میں دکھائی جانے والی چیز کی نقل کرتی ہے۔

