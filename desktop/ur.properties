m0899=کمیونٹی کے ترقیاتی موڈ میں، پروگرام کے ایک ذیلی فولڈر کا استعمال اضافی جاوا اسکرپٹ کوڈ کو ذخیرہ کرنے کے لیے کیا جاتا ہے جو JSCommunity کوڈ کے ساتھ لوڈ کیا جائے گا اور فائل میں کی جانے والی ہر تبدیلی کو "jsc" کوڈ میں یہاں پروگرام میں لوڈ اور چلایا جائے گا۔

