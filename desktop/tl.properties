#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=ito ay isang functionality para gamitin ang mga code na papalitan ng mga variable na halaga na tinukoy sa system, tulad ng halimbawa: petsa at oras.<br>Upang gamitin, i-type lamang ang code kasama ang teksto. Gumagana ito sa mga letra, alerto, communication panel, ...

#of <b>all</b> songs<br>on the playlist.
m0085=ng <b>lahat</b> ng mga awit<br>sa playlist.

#of <b>played</b> songs<br>on the playlist.
m0086=ng mga awit <b>naitugtog</b><br>sa playlist.

