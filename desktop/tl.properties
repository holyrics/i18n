#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>Pamagat at artista</b> ng susunod na awit<br>na HINDI nakatanda bilang <b>naitugtog</b><br>sa playlist.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>Pamagat</b> ng susunod na awit na<br>HINDI nakatanda bilang <b>naitugtog</b><br>sa playlist.

#Stage Display (as configured)
m0091=Return monitor (ayon sa configuration)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=Maaari kang magdagdag ng mga linya bilang <b>komento</b> sa liriko ng awit o mabilis na presentasyon.<br>Ang mga komento ay ipapakita lamang sa mga return monitor, ayon sa tinukoy sa <b>Display Settings</b>.

#To define a line as a comment, start a line with "two slash" //
m0093=Upang itakda ang isang linya bilang komento, simulan ang linya sa "dalawang bar" //

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=Ang mga setting ng kulay at font ng komento ay maaaring baguhin sa editing window ng <b>Mga Tema</b>

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=Ang pag-play ng video sa maraming screen ay maaaring magpabigat sa pagproseso ng computer.<br>Mag-ingat at maging maingat sa paggamit ng functionality na ito sa mga computer na may mababang performance.

#Error loading dictionary
m0096=Error sa pag-load ng diksyunaryo

#The program will be closed to apply the changes.\nClick OK and open the program again.
m0097=Ang programa ay isasara upang ilapat ang mga pagbabago.\nI-click ang OK at muling buksan ang programa.

#ffmpeg file not found.
m0098=Hindi natagpuan ang ffmpeg file.

#Unable to identify video duration.
m0099=Hindi matukoy ang tagal ng video.

