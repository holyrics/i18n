#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>View ng Stage</b> ay isang setting na nagbabago ng pagpapakita ng mga slide para sa isang tiyak na monitor.<br>Kung mayroon kang isang video output para sa projection na nakikita ng publiko at may isa pang video output para sa mga nasa <b>stage</b>, maaari mong i-configure ang return monitor nang iba sa kung ano ang ipinapakita sa publiko.<br>Ang transmission para sa application ay maaari ring i-configure.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Checkbox:</b> Nagtatakda ng isang pagbabago sa teksto ng slide. Hal. Ipakita ang unang linya ng susunod na slide sa dulo ng kasalukuyang slide.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Malaki:</b> Ipinapakita ang buong teksto sa malaki.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Alisin ang line break:</b> Ipinapakita ang teksto nang tuloy-tuloy, awtomatikong nagba-break ng linya sa hangganan ng slide at kumukuha ng maximum na lateral space.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Pasadyang Tema:</b> Binabago ang tema ng pagpapakita ng slide.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Payagan para sa Bibliya:</b> Pinapagana ang mga setting din para sa mga taludtod ng Bibliya (maliban sa setting ng checkbox).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Paalala: Ang mga tema ng video ay hindi gumagana sa mga return monitor, tanging sa monitor ng publiko.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Maaari kang magdagdag ng isang pasadyang edisyon para sa isang tiyak na taludtod ng kanta. Halimbawa, palakihin ang <b>proportional</b> na laki ng font ng chorus.<br>At maaari ring ilagay ang isang teksto ng pagkakakilanlan (chorus, taludtod, atbp...) na lilitaw lamang sa footer ng mga slide.

#View example
m0009=Tumingin ng halimbawa

#This feature also works in the Quick Display window
m0010=Ang opsyon na ito ay gumagana rin sa window ng Quick Presentation

#Available Settings
m0011=Mga available na setting

#All text in uppercase
m0012=Lahat ng teksto sa uppercase

#putting the character '%' after the number is useless
m0013=ang paglalagay ng karakter na '%' pagkatapos ng numero ay hindi kinakailangan

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=teksto sa loob ng mga panaklong = (chorus), (verse), (repeat), (end), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb value, hexadecimal o pangalan ng kulay sa loob ng brackets = [128,192,64] o [80c040] o [ff0] o [asul]...

#Valid names
m0016=Mga wastong pangalan

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Upang magdagdag ng pasadyang format, magdagdag ng isang linya sa simula ng talata na nagsisimula sa dalawang "hashtags" ## at ang mga code na nais mo kaagad pagkatapos (hindi mahalaga ang pagkakasunud-sunod ng mga code).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Sa halimbawa, kapag ipinapakita ang liriko para sa projection, ang pangalawang talata ay ipapakita sa bold, na may sukat ng font na 15% na mas malaki at sa kulay asul. Ang iba pang mga talata ay ipapakita nang normal gamit ang mga setting ng Tema.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Tandaan: Kung ang tema na ginagamit ay naka-configure na para sa bold, halimbawa, ang pasadyang format na ito ay hindi magkakaroon ng pagkakaiba.

#Some formatting examples
m0020=Ilang halimbawa ng format

#Bold and italic
m0021=Bold at kuripot

#25% bigger
m0022=25% na mas malaki

#italic and 5% lower
m0023=kuripot at 5% na mas maliit

#Uppercase and yellow
m0024=Malaki at dilaw

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Posible na tukuyin kung aling mga linya ang magkakaroon ng pasadyang format. <br> Magdagdag ng dalawang guhit <b>--</b> sa simula ng linya na ayaw mong lagyan ng pasadyang format.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Sa halimbawa, ang linya <b>"Ngunit alam kong kulang pa ito"</b> ay gagamit ng orihinal na format ng tema, at ang iba pang mga linya ay gagamit ng pasadyang format (bold at dilaw).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Maaari mong gamitin ang code na <code>##p</code> upang gumamit ng <b>karaniwang</b> format. <br> Lahat ng talata na tinukoy gamit ang <code>##p</code> ay gagamit ng format na tinukoy sa ibaba.

#Default Custom Formatting
m0028=Karaniwang Pasadyang Format

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Bawat listahan ay kumakatawan sa isang panloob na folder ng programang Holyrics: Audio, Video at Image. Upang magdagdag ng mga file: i-click ang icon na {0} ng kaukulang tab upang buksan ang folder sa Windows at i-paste ang mga file sa folder. Ang listahan sa programa ay awtomatikong na-update kasama ang mga file mula sa folder (maliban kung may aktibong presentasyon).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Paalala:</b> Iwasan ang pag-renaming ng mga file sa folder, dahil kung lumikha ka ng shortcut para sa isang file sa isang playlist, paborito, atbp. at pagkatapos ay i-renaming ito sa folder, ang shortcut sa programa ay hindi na gagana, kailangan mong lumikha ng bagong shortcut.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=Sa bawat isa sa mga folder (Audio, Video at Image), maaari kang lumikha ng iba pang mga folder upang maging isang listahan ng mga file sa programa. Halimbawa: Maaari kang lumikha ng folder na tinatawag na <b>Presentasyon</b> sa loob ng folder ng <b>Mga Imahe</b> at magdagdag ng mga imahe dito. Ang folder ay magiging isang item sa listahan sa programa ng Holyrics at kapag nag-click ka dito, lahat ng mga imahe ay bubuksan para sa presentasyon ng slides.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Maaari kang magdagdag ng shortcut para sa mga folder na ito sa iyong desktop sa pamamagitan ng pag-click <a href='http://addShortcutDesktop'>DITO</a>.

#Holyrics Library
m0033=Holyrics Library

#Displays the song lyric in uppercase.
m0034=Ipinapakita ang liriko ng kanta sa malalaki.

#Enable/disable the underline in the song title at first slide.
m0035=I-on/I-off ang underline sa pamagat ng kanta ng unang slide.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Sa <b>na-activate</b> na opsyon, awtomatikong babasagin ng programa ang mahahabang linya, na iniiwasan ang pagbabawas ng orihinal na laki ng font. Sa <b>deactivated</b> na opsyon, kung mayroong mahahabang linya na lumalampas sa gilid ng slide, babawasan ng programa ang laki ng font hanggang ang buong linya ay nasa loob ng slide.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=I-on/I-off ang <a href='http://customFormatting'>pasadyang format</a> ng talata.

#Enable/disable <b>Custom Background</b>.
m0038=I-on/I-off ang <b>pasadyang background</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Ang <b>LIVE</b> na panel ay nagpapakita ng kasalukuyang ipinapakita sa pangunahing projection. <br>(Ang background at video na pinapatakbo ng VLC Media Player ay hindi lumalabas sa panel.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Kung gumagamit ka ng isang eksklusibong return monitor para sa mga nasa 'entablado', maaari mong gamitin ang communication panel upang ipakita ang mga mensahe lamang sa monitor na ito. <br> Sa mga setting ng display maaari mong tukuyin ang isang monitor bilang <b>view ng entablado</b> (maliban sa pangunahing monitor ng publiko), at ang mga mensahe sa communication panel ay ipapakita lamang sa mga monitor na tinukoy bilang <b>view ng entablado</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=I-play ang audio at i-click ang slide na nais mong ipakita habang tumutugtog ang kanta. <br> Maaari mong i-pause at balikan ang isang bahagi ng kanta upang magsimula muli mula sa kung saan ka huminto. <br> Maaari mo ring tanggalin ang isang item mula sa listahan ng mga nakuhang item sa pamamagitan ng pag-right click.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Ang slide na ipapakita bago ang unang slide na iyong i-click ay ang nakatakdang sa editing window.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Huwag maghintay na magsimula ang bahagi ng kanta upang i-click ang tiyak na slide, subukang i-click ang slide ilang milisecond bago, upang maiwasan ang pagkaantala sa paglipat sa pagitan ng mga slide.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Sa <b>Awtomatikong Presentasyon</b> maaari mong i-program ang tagal ng bawat slide na naka-integrate sa isang audio MP3 (isang playback, halimbawa). <br>Pagkatapos malikha, maaari mong piliin ang anumang tema na gusto mo at simulan ang presentasyon. <br>Ang audio ay patatakbuhin ng Media Player at ang mga slide ay ipapakita nang awtomatiko habang ang kanta ay tumutugtog.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Tukuyin ang panimulang slide</b> gamit ang opsyon na <i>Simulan sa</i> at ang <i>tagal</i> (sa segundo) ng panimulang slide.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Ayusin ang mga slide</b> sa pamamagitan ng pag-right click upang magdagdag ng mga bagong slide at i-drag ang mga slide upang ayusin ang mga ito.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Tukuyin ang tagal ng bawat slide</b> (sa segundo) sa field na <i>Tagal</i>. Maaari mo ring baguhin ang eksaktong oras kung kailan nagsisimula ang slide sa pamamagitan ng pag-click sa teksto na nagpapakita ng mga minuto, segundo at milisecond.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> naglalaro ng kanta mula sa tumutugmang slide hanggang sa katapusan ng kanta.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> naglalaro lamang ng bahagi ng slide na tumutugma.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Maaari mong gamitin ang <i>Capture Method</i> upang mapadali ang paglikha ng pagkakasunod-sunod ng mga slide at tagal ng bawat isa.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Kapag sine-save ang <i>Awtomatikong Presentasyon</i>, ang generated file <b>[pangalan ng file].ap</b> ay awtomatikong isasama ang napiling audio MP3. Hindi mo kailangang mag-alala tungkol sa pagkopya ng audio kasama ang file <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Maaari mong i-edit ang teksto ng ilang mga slide habang ipinapakita ang mga ito. <br> - Sa pamamagitan ng pag-right click sa slide na nais mong i-edit (listahan ng mga slide sa ibaba ng pangunahing window); <br> - o sa pamamagitan ng pagpindot sa <b>SHIFT + F12</b> upang i-edit ang slide na kasalukuyang ipinapakita.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Ang chat ay isang paraan ng komunikasyon sa pagitan ng Holyrics sa PC at ang Holyrics app para sa mobile. <br> Anumang mobile na nakakonekta sa network ay makaka-access sa chat sa pamamagitan ng app at magpadala ng mga mensahe sa PC.

#The selected presentation will run automatically.
m0054=Ang napiling presentasyon ay awtomatikong tatakbo.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=I-click ang mensahe upang piliin ito. <br> I-drag ang isang mensahe upang muling ayusin ito sa listahan. <br> I-type ang nakataas na key sa simula ng mensahe upang piliin ang kaukulang mensahe. <b>(unang larawan)</b><br> I-right click ang mensahe para sa higit pang mga opsyon. <b>(ikalawang larawan)</b>

#You can change the background or Theme for each paragraph
m0056=Maaari mong baguhin ang background o Tema ng bawat talata

#by clicking the slide {0} icon
m0057=sa pag-click sa icon na {0} ng slide

#dragging an item from themes list to the slide
m0058=sa pag-drag ng isang item mula sa listahan ng mga tema patungo sa slide

#or by right-clicking on the slide for more options
m0059=o sa pamamagitan ng pag-right click sa slide para sa higit pang mga opsyon

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Pansin!</b> Kapag tinukoy ang larawan o video bilang background, lahat ng mga setting tulad ng kulay ng font, pag-aayos, atbp. ay magiging mula sa napiling Tema para sa kanta. Kaya't mag-ingat sa pagbabago ng <b>karaniwang Tema</b> ng kanta, dahil ang mga larawan at video na na-configure dati ay maaaring hindi tumugma sa bagong napiling tema.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=ito ay isang function na nagpapahintulot sa iyo na gamitin ang programa na parang nasa extended mode kahit na walang ibang monitor na nakakonekta.<br>Maaaring ipakita ang isang maliit na bintana sa iyong sariling monitor, na ginagaya kung ano ang ipapakita sa tunay na projection.

#Use examples
m0062=Mga halimbawa ng paggamit

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Gumagamit ka ng programa sa bahay, walang konektadong auxiliary monitor at nais mong simulan ang mga presentasyon ngunit hindi sa fullscreen

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Nais mong matutunan kung paano gamitin ang programa sa extended mode ngunit walang auxiliary monitor

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Gumagamit ka ng computer lamang para ipasa ang mga slide sa wifi network, na ginagawang walang silbi ang fullscreen na pagpapakita sa iyong sariling screen

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=Ang functionality na <b>Paglalarawan ng Slide</b> ay nagsisilbing tulong para sa pagkilala ng slide sa footer ng presentasyon.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Ang paglalarawan ng isang talata/slide ay tinutukoy sa editing window ng liriko, sa pamamagitan ng function na <b>Pasadyang Format</b>.

#Can be used for
m0068=Maaari itong magamit para sa

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=tukuyin ang mga shortcut sa function na <b>pumunta sa</b>, ex.: letra <b><i>X</i></b> pumunta sa slide <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=itakda ang isang default na Tema, ex.: lahat ng mga slide <b><i>X</i></b> ay magkakaroon ng Tema <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=customized na formatting, ex.: lahat ng mga slide <b><i>X</i></b> na may italic font</b>

#<b>Go to</b> function shortcuts
m0072=Mga shortcut ng system ng function <b>pumunta sa</b>

