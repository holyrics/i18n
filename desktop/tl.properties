#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=Ang scale sa <b>function</b> mode ay may ibang organisasyon mula sa lumang default mode.<br>Sa bagong uri ng organisasyon na ito, lumikha ka (sa mga setting ng programa) ng lahat ng mga function na umiiral sa ministeryo at pagkatapos ay nagtatakda ka ng isang miyembro para sa bawat function.<br><br>Sa lumang mode, mayroon kang isang <b>miyembro</b> sa bawat linya at tinutukoy kung siya ay naka-assign o hindi, sa pamamagitan ng pag-check ng isang kahon.<br><br>Sa bagong mode (function), mayroon kang isang <b>function</b> sa bawat linya at tinutukoy kung aling <b>miyembro</b> ang naka-assign para sa function na ito.

