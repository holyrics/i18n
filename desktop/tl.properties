#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Posible na lumikha ng mga item upang idagdag sa favorites bar o sa playlist na nagsasagawa ng mga HTTP request o nagpapadala ng MIDI codes sa iba pang mga device.\nPinapayagan nito ang pagsasagawa ng mga aksyon sa iba pang mga programa at device, tulad ng OBS Studio, lighting program, PTZ cameras, atbp.\nHalimbawa, posible na lumikha ng isang item na, kapag isinasagawa, ay nagbabago ng isang eksena sa iyong transmission program, o isang item na pumipili ng preset ng isang PTZ camera sa network, atbp.\nAng mga aksyon na ito ay maaaring isagawa sa pamamagitan ng pag-click sa item o maaari ring isagawa nang awtomatiko sa pamamagitan ng functionality na <b>Triggers</b> ng programa.\nHalimbawa, posible na lumikha ng isang trigger upang sa tuwing ang Holyrics ay nagpapakita ng larawan X sa projection, awtomatikong nagbabago sa eksena Y sa iyong transmission program.\nO sa tuwing nagpapakita ng isang taludtod ng Bibliya, awtomatikong nagbabago sa eksena Z sa iyong transmission program.\nMaraming posibilidad ng automation na nagpapadali at nakakatipid ng trabaho ng multimedia team.

