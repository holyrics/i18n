#The program uses a free resource provided by the Vagalume lyrics site. But the number of searches per day has a limit, and since all Holyrics users use the same credential it is possible that this limit is reached and no one else can perform searches on the day.<br>If you do a lot of research on the internet, you can create your own credential to prevent the program limit from being reached and other users can not search through this window. Thank you!
m0161=Gumagamit ang programa ng isang libreng mapagkukunan na ibinibigay ng website ng mga liriko na Vagalume. Gayunpaman, ang bilang ng mga paghahanap bawat araw ay may limitasyon, at dahil lahat ng mga gumagamit ng Holyrics ay gumagamit ng parehong kredensyal, posible na maabot ang limitasyong ito at walang sinuman ang makapag-paghahanap sa araw.<br>Kung madalas kang gumagamit ng paghahanap sa internet, maaari kang lumikha ng iyong sariling kredensyal upang maiwasan ang pag-abot ng limitasyon ng programa at ang iba pang mga gumagamit ay hindi makapag-paghahanap sa pamamagitan ng bintanang ito. Salamat!

