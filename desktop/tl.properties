#Starts presentation of the song lyrics that are in the current <b>playlist</b> in the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0112=Nagsisimula ang presentasyon ng liriko ng kanta na nasa <b>kasalukuyang playlist</b> sa pangunahing window ng programa (kanang bahagi).<br>Ang halaga ng "intensidad" ay nagtatakda kung aling item mula sa listahan (1, 2, 3...)

#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=Kapag pinatakbo ang code ng aksyon <b>pumunta sa slide...</b> ang programa ay magpapakita ng slide batay sa numerong ibinigay ng halaga na "intensidad" ng code.<br>Ibig sabihin, kung ang halaga ng "intensidad" ay 3, ang kasalukuyang presentasyon ay magpapakita ng ikatlong slide na tumatakbo.<br>Maaaring ito ang ikatlong slide ng isang liriko ng kanta, ang ikatlong larawan mula sa isang listahan ng mga larawan, atbp...<br>Ang aksyon na ito ay hindi nagsisimula ng isang presentasyon, ito ay nagbabago lamang ng slide ng isang presentasyon <b>na nagsimula na</b>.

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=Kung ang presentasyon ay isang liriko ng kanta, ang bilang ay nagsisimula mula sa unang talata ng liriko ng kanta. Ang slide na may <b>pamagat at artista</b> ay ang slide na may bilang zero.

