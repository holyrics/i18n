#Development mode
m0894=Mode ng pag-unlad

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=Sa mode ng pag-unlad, ang JavaScript code ay sinasabay sa isang file sa subfolder ng programa at ang lahat ng pagbabago na ginawa dito sa programa ay mase-save sa file, gayundin ang lahat ng pagbabago na ginawa sa labas ng file ay makikita sa na-save na JavaScript code at isasagawa dito sa programa.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Pinapayagan nito ang JavaScript code na ma-edit ng isang external editor (ang IDE ng iyong pinili) at ang mga pagbabago ay awtomatikong makikita dito sa programa.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Pansin: mag-ingat sa paggamit ng mode na ito, dahil nangangahulugan ito na ang JavaScript code na awtomatikong isasagawa sa Holyrics ay batay sa isang external na nababasang file na maaaring i-edit ng anumang ibang proseso/program na tumatakbo sa computer.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Ang pangalan ng folder ay maaaring baguhin, ngunit kinakailangan lamang na naglalaman ito ng id ng item sa anumang bahagi ng pangalan.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=Sa mode ng pag-unlad ng Community, isang subfolder ng programa ang ginagamit upang iimbak ang karagdagang JavaScript code na iloload kasama ng JSCommunity code at ang lahat ng pagbabago na ginawa sa labas ng file ay makikita sa "jsc" code na iloload at isasagawa dito sa programa.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Pinapayagan nito ang paglikha ng mga code na awtomatikong gagamitin sa estruktura na katugma sa "jsc", nang hindi kinakailangang i-refactor ang code upang ipadala sa GitHub na may mga bagong implementasyon at pagbabago.

