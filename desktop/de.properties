#Development mode
m0894=Entwicklungsmodus

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=Im Entwicklungsmodus wird der JavaScript-Code mit einer Datei im Unterordner des Programms synchronisiert, und jede Änderung, die hier im Programm vorgenommen wird, wird in der Datei gespeichert, ebenso wie jede externe Änderung an der Datei im gespeicherten und hier im Programm ausgeführten JavaScript-Code widergespiegelt wird.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Dies ermöglicht es, dass der JavaScript-Code von einem externen Editor (der IDE Ihrer Wahl) bearbeitet wird und die Änderungen automatisch hier im Programm widergespiegelt werden.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Achtung: Seien Sie vorsichtig bei der Verwendung dieses Modus, da dies bedeutet, dass der JavaScript-Code, der automatisch in Holyrics ausgeführt wird, auf einer externen lesbaren Datei basiert, die von jedem anderen Prozess/Programm, das auf dem Computer ausgeführt wird, bearbeitet werden kann.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Der Name des Ordners kann geändert werden, es ist jedoch erforderlich, dass die ID des Elements an irgendeiner Stelle im Namen enthalten ist.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=Im Entwicklungsmodus von Community wird ein Unterordner des Programms verwendet, um den zusätzlichen JavaScript-Code zu speichern, der zusammen mit dem JSCommunity-Code geladen wird, und jede externe Änderung an der Datei wird im geladenen und hier im Programm ausgeführten "jsc"-Code widergespiegelt.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Dies ermöglicht die Erstellung von Codes, die automatisch in der mit "jsc" kompatiblen Struktur verwendet werden, ohne den Code umschreiben zu müssen, um ihn mit neuen Implementierungen und Änderungen an GitHub zu senden.

