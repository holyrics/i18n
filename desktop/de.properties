#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Es ist möglich, Elemente zu erstellen, die zur Favoritenleiste oder zur Wiedergabeliste hinzugefügt werden, die HTTP-Anfragen ausführen oder MIDI-Codes an andere Geräte senden.\nDies ermöglicht das Ausführen von Aktionen in anderen Programmen und Geräten, wie OBS Studio, Lichtprogrammen, PTZ-Kameras usw.\nZum Beispiel ist es möglich, ein Element zu erstellen, das, wenn es ausgeführt wird, eine Szene in Ihrem Übertragungsprogramm ändert, oder ein Element, das ein Preset einer PTZ-Kamera im Netzwerk auswählt usw.\nDiese Aktionen können durch Klicken auf das Element oder auch automatisch über die Funktion <b>Trigger</b> des Programms ausgeführt werden.\nZum Beispiel ist es möglich, einen Trigger zu erstellen, damit immer, wenn Holyrics das Bild X in der Projektion anzeigt, automatisch auf die Szene Y in Ihrem Übertragungsprogramm gewechselt wird.\nOder immer, wenn ein Bibelvers angezeigt wird, automatisch auf die Szene Z in Ihrem Übertragungsprogramm gewechselt wird.\nEs gibt viele Automatisierungsmöglichkeiten, die die Arbeit des Multimedia-Teams erleichtern und Zeit sparen.

