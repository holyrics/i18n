#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=Die Skala im <b>Funktions</b>-Modus hat eine andere Organisation als der alte Standardmodus.<br>In dieser neuen Art der Organisation erstellen Sie (in den Programmeinstellungen) alle Funktionen, die im Ministerium existieren, und definieren dann ein Mitglied für jede Funktion.<br><br>Im alten Modus haben Sie ein <b>Mitglied</b> in jeder Zeile und definieren, ob es eingeplant ist oder nicht, indem Sie ein Kästchen ankreuzen.<br><br>Im neuen Modus (Funktion) haben Sie eine <b>Funktion</b> in jeder Zeile und definieren, welches <b>Mitglied</b> für diese Funktion eingeplant ist.

