#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Stage View</b> ist eine Einstellung, die die Anzeige der Folien für einen bestimmten Monitor ändert.<br>Wenn Sie einen Videoausgang für die Projektion haben, die vom Publikum gesehen wird, und einen anderen Videoausgang für die Personen auf der <b>Bühne</b>, können Sie den Rückmonitor anders konfigurieren als das, was dem Publikum angezeigt wird.<br>Die Übertragung an die Anwendung ist ebenfalls konfigurierbar.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Kontrollkästchen:</b> Definiert eine Änderung im Text der Folie. Z. B.: Die erste Zeile der nächsten Folie am Ende der aktuellen Folie anzeigen.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Großbuchstaben:</b> Zeigt den gesamten Text in Großbuchstaben an.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Zeilenumbruch entfernen:</b> Zeigt den Text kontinuierlich an, bricht die Zeile automatisch am Rand der Folie und nutzt den maximalen seitlichen Platz.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Benutzerdefiniertes Thema:</b> Ändert das Anzeige-Thema der Folie.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Aktivieren für die Bibel:</b> Aktiviert die Einstellungen auch für Bibelverse (außer der Einstellung des Kontrollkästchens).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Hinweis: Video-Themen funktionieren nicht auf Rückmonitoren, nur auf dem Publikummonitor.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Sie können eine benutzerdefinierte Bearbeitung für einen bestimmten Absatz des Textes hinzufügen. Zum Beispiel die Schriftgröße des Refrains <b>proportional</b> erhöhen.<br>Und auch einen Identifikationstext (Refrain, Vers usw.) hinzufügen, der nur im Fußbereich der Folien erscheint.

#View example
m0009=Beispiel ansehen

#This feature also works in the Quick Display window
m0010=Diese Option funktioniert auch im Schnellpräsentationsfenster.

#Available Settings
m0011=Verfügbare Einstellungen

#All text in uppercase
m0012=Alle Texte in Großbuchstaben

#putting the character '%' after the number is useless
m0013=Es ist unnötig, das Zeichen '%' nach der Zahl zu setzen.

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=Text in Klammern = (Refrain), (Vers), (wiederholen), (Ende), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=RGB-Wert, hexadezimal oder Farbname in eckigen Klammern = [128,192,64] oder [80c040] oder [ff0] oder [blau]...

#Valid names
m0016=Gültige Namen

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Um eine benutzerdefinierte Formatierung hinzuzufügen, fügen Sie eine Zeile am Anfang des Absatzes hinzu, die mit zwei "Hashtags" ## beginnt und die gewünschten Codes direkt danach (die Reihenfolge der Codes spielt keine Rolle).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Im Beispiel wird beim Präsentieren des Textes für die Projektion der zweite Absatz fett dargestellt, mit einer Schriftgröße von 15 % größer und in Blau. Die anderen Absätze werden normal mit den Einstellungen des Themas angezeigt.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Hinweis: Wenn das verwendete Thema bereits auf fett eingestellt ist, wird diese benutzerdefinierte Formatierung keinen Unterschied machen.

#Some formatting examples
m0020=Einige Beispiele für Formatierungen

#Bold and italic
m0021=Fett und kursiv

#25% bigger
m0022=25% größer

#italic and 5% lower
m0023=kursiv und 5% kleiner

#Uppercase and yellow
m0024=Großbuchstaben und gelb

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Es ist möglich, festzulegen, welche Zeilen die benutzerdefinierte Formatierung erhalten.<br> Fügen Sie zwei Striche <b>--</b> am Anfang der Zeile hinzu, die nicht die benutzerdefinierte Formatierung erhalten soll.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Im Beispiel wird die Zeile <b>"Aber ich weiß, es ist immer noch wenig"</b> die ursprüngliche Formatierung des Themas verwenden, und die anderen Zeilen verwenden die benutzerdefinierte Formatierung (fett und gelb).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Sie können den Code <code>##p</code> verwenden, um eine <b>Standard</b>-Formatierung zu verwenden.<br>Alle Absätze, die mit <code>##p</code> definiert sind, verwenden die im folgenden Feld definierte Formatierung.

#Default Custom Formatting
m0028=Benutzerdefinierte Standardformatierung

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Jede Liste repräsentiert einen internen Ordner des Holyrics-Programms: Audio, Video und Bild. Um Dateien hinzuzufügen: Klicken Sie auf das Symbol {0} des entsprechenden Tabs, um den Ordner im Windows zu öffnen, und fügen Sie die Dateien in den Ordner ein. Die Liste im Programm wird automatisch mit den Dateien im Ordner aktualisiert (es sei denn, eine Präsentation ist aktiv).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Hinweis:</b> VERMEIDEN Sie es, die Dateien im Ordner umzubenennen, da, wenn Sie eine Verknüpfung zu einer Datei in einer Wiedergabeliste, Favoriten usw. erstellen und sie dann im Ordner umbenennen, die Verknüpfung im Programm nicht mehr funktioniert, und Sie eine neue Verknüpfung erstellen müssen.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=In jedem der Ordner (Audio, Video und Bild) können Sie weitere Ordner erstellen, um eine Liste von Dateien im Programm zu sein. Zum Beispiel: Sie können einen Ordner namens <b>Präsentation</b> im Ordner <b>Bilder</b> erstellen und Bilder darin hinzufügen. Der Ordner wird ein Element in der Liste im Holyrics-Programm sein, und wenn Sie darauf klicken, werden alle Bilder zur Präsentation geöffnet.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Sie können eine Verknüpfung zu diesen Ordnern auf Ihrem Desktop hinzufügen, indem Sie <a href='http://addShortcutDesktop'>HIER</a> klicken.

#Holyrics Library
m0033=Holyrics-Bibliothek

#Displays the song lyric in uppercase.
m0034=Zeigt den Songtext in Großbuchstaben an.

#Enable/disable the underline in the song title at first slide.
m0035=Aktiviert/deaktiviert die Unterstreichung im Titel des Songs auf dem ersten Slide.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Mit der <b>aktivierten</b> Option wird das Programm lange Zeilen automatisch umbrechen, um zu verhindern, dass die ursprüngliche Schriftgröße verringert wird. Mit der <b>deaktivierten</b> Option wird das Programm die Schriftgröße verringern, wenn eine lange Zeile die Seite des Slides überschreitet, bis die gesamte Zeile innerhalb des Slides bleibt.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Aktiviert/deaktiviert die <a href='http://customFormatting'>benutzerdefinierte Formatierung</a> von Absätzen.

#Enable/disable <b>Custom Background</b>.
m0038=Aktiviert/deaktiviert den <b>benutzerdefinierten Hintergrund</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Das <b>LIVE</b>-Panel zeigt, was derzeit in der Hauptprojektion präsentiert wird.<br>(Hintergrund und Video, das vom VLC Media Player abgespielt wird, erscheinen nicht im Panel.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Wenn Sie einen speziellen Rückmonitor für die Personen auf der 'Bühne' verwenden, können Sie das Kommunikationspanel verwenden, um Nachrichten nur auf diesem Monitor anzuzeigen.<br>In den Anzeigeeinstellungen können Sie einen Monitor als <b>Bühnenansicht</b> definieren (außer dem Hauptmonitor des Publikums), und die Nachrichten im Kommunikationspanel werden nur auf den Monitoren angezeigt, die als <b>Bühnenansicht</b> definiert sind.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Lassen Sie das Audio abspielen und klicken Sie auf den Slide, den Sie während des Abspielens des Liedes angezeigt haben möchten.<br>Sie können eine Passage des Liedes pausieren und zurückspulen, um von dort fortzufahren, wo Sie aufgehört haben.<br>Sie können auch einen Eintrag aus der Liste der erfassten Elemente entfernen, indem Sie mit der rechten Maustaste klicken.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Der Slide, der vor dem ersten Slide angezeigt wird, auf den Sie klicken, ist der, der im Bearbeitungsfenster definiert ist.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Warten Sie nicht, bis der Abschnitt des Liedes beginnt, um auf den spezifischen Slide zu klicken, versuchen Sie, einige Millisekunden vorher zu klicken, um Verzögerungen beim Übergang zwischen den Slides zu vermeiden.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Mit <b>Automatischer Präsentation</b> können Sie die Dauer jedes Slides, die in eine MP3-Audio integriert ist (z. B. eine Wiedergabe), programmieren.<br>Nachdem Sie es erstellt haben, können Sie jedes gewünschte Thema auswählen und die Präsentation starten.<br>Das Audio wird vom Media Player abgespielt und die Slides werden automatisch angezeigt, während das Lied gespielt wird.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Definieren Sie den Start-Slide</b> mit der Option <i>Beginnen mit</i> und der <i>Dauer</i> (in Sekunden) des Start-Slides.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Organisieren Sie die Slides</b>, indem Sie mit der rechten Maustaste klicken, um neue Slides hinzuzufügen, und ziehen Sie die Slides, um sie zu ordnen.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Definieren Sie die Dauer jedes Slides</b> (in Sekunden) im Feld <i>Dauer</i>. Sie können auch die genaue Zeit ändern, zu der der Slide beginnt, indem Sie auf den Text klicken, der Minuten, Sekunden und Millisekunden anzeigt.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> spielt das Lied ab dem entsprechenden Slide bis zum Ende des Liedes.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> spielt nur den Abschnitt des entsprechenden Slides ab.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Sie können die <i>Erfassungsmethode</i> verwenden, um die Erstellung der Reihenfolge der Slides und die Dauer jedes einzelnen zu erleichtern.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Beim Speichern der <i>Automatischen Präsentation</i> wird die generierte Datei <b>[Dateiname].ap</b> bereits die ausgewählte MP3-Audio enthalten. Sie müssen sich keine Sorgen machen, das Audio zusammen mit der Datei <b>(*.ap)</b> zu kopieren.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Sie können den Text bestimmter Slides bearbeiten, während sie präsentiert werden.<br> - Klicken Sie mit der rechten Maustaste auf den Slide, den Sie bearbeiten möchten (Liste der Slides im Fußbereich des Hauptfensters);<br> - oder drücken Sie <b>SHIFT + F12</b>, um den aktuell angezeigten Slide zu bearbeiten.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Der Chat ist ein Kommunikationsmittel zwischen Holyrics auf dem PC und der Holyrics-App für Mobiltelefone.<br>Jedes mit dem Netzwerk verbundene Mobiltelefon kann über die App auf den Chat zugreifen und Nachrichten an den PC senden.

#The selected presentation will run automatically.
m0054=Die ausgewählte Präsentation wird automatisch abgespielt.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Klicken Sie auf die Nachricht, um sie auszuwählen.<br>Ziehen Sie eine Nachricht, um sie in der Liste neu anzuordnen.<br>Geben Sie die hervorgehobene Taste am Anfang der Nachricht ein, um die entsprechende Nachricht auszuwählen. <b>(erstes Bild)</b><br>Klicken Sie mit der rechten Maustaste auf die Nachricht für weitere Optionen. <b>(zweites Bild)</b>

#You can change the background or Theme for each paragraph
m0056=Sie können den Hintergrund oder das Thema jedes Absatzes ändern.

#by clicking the slide {0} icon
m0057=indem Sie auf das Symbol {0} des Slides klicken

#dragging an item from themes list to the slide
m0058=indem Sie ein Element aus der Themenliste auf den Slide ziehen

#or by right-clicking on the slide for more options
m0059=oder mit der rechten Maustaste auf den Slide klicken, um weitere Optionen zu erhalten

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Achtung!</b> Wenn Sie ein Bild oder Video als Hintergrund festlegen, werden alle Einstellungen wie Schriftfarbe, Ausrichtung usw. vom für das Lied ausgewählten Thema übernommen. Seien Sie also vorsichtig, wenn Sie das <b>Standardthema</b> des Liedes ändern, da die zuvor festgelegten Bilder und Videos möglicherweise nicht mit dem neuen ausgewählten Thema übereinstimmen.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=ist eine Funktion, die es Ihnen ermöglicht, das Programm so zu verwenden, als ob es im erweiterten Modus wäre, auch wenn keine anderen Monitore angeschlossen sind.<br>Sie können ein kleines Fenster auf Ihrem eigenen Monitor anzeigen, das simuliert, was in der tatsächlichen Projektion angezeigt werden würde.

#Use examples
m0062=Beispiele für die Verwendung

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Sie verwenden das Programm zu Hause, haben keinen zusätzlichen Monitor angeschlossen und möchten Präsentationen starten, aber nicht im Vollbildmodus.

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Sie möchten lernen, das Programm im erweiterten Modus zu verwenden, haben aber keinen zusätzlichen Monitor.

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Sie verwenden den Computer nur, um die Folien über das WLAN-Netzwerk zu übertragen, wodurch die Vollbildanzeige auf Ihrem eigenen Bildschirm nutzlos wird.

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=Die Funktion <b>Foliendescription</b> dient als Hilfsmittel zur Identifizierung der Folie im Präsentationsfuß.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Die Beschreibung eines Absatzes/Folie wird im Textbearbeitungsfenster durch die Funktion <b>Benutzerdefinierte Formatierung</b> festgelegt.

#Can be used for
m0068=Kann verwendet werden für

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=Tastenkombinationen in der Funktion <b>gehen zu</b> festlegen, z.B.: Buchstabe <b><i>X</i></b> gehe zu Folie <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=ein Standardthema festlegen, z.B.: alle Folien <b><i>X</i></b> haben das Thema <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=benutzerdefinierte Formatierung, z.B.: alle Folien <b><i>X</i></b> mit kursiver Schrift</b>

#<b>Go to</b> function shortcuts
m0072=Tastenkombinationen des Systems der Funktion <b>gehen zu</b>

#Song presentation
m0073=Musikpräsentation

#Other presentations
m0074=Andere Präsentationen

#First paragraph of the song
m0075=Erster Absatz des Liedes

#Second slide of presentation
m0076=Zweite Folie der Präsentation

#Last paragraph of the song
m0077=Letzter Absatz des Liedes

#Penultimate presentation slide
m0078=Vorletzte Folie der Präsentation

#First paragraph of the next song
m0079=Erster Absatz des nächsten Liedes

#Next slide
m0080=Nächste Folie

#First paragraph of the previous song
m0081=Erster Absatz des vorherigen Liedes

#Previous slide
m0082=Vorherige Folie

#Last displayed slide
m0083=Letzte Folie angezeigt

#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=ist eine Funktion, um Codes zu verwenden, die durch variable Werte ersetzt werden, die im System definiert sind, wie z.B.: Datum und Uhrzeit.<br>Um es zu verwenden, geben Sie einfach den Code zusammen mit dem Text ein. Es funktioniert in Texten, Warnungen, Kommunikationspanels, ...

#of <b>all</b> songs<br>on the playlist.
m0085=von <b>allen</b> Liedern<br>in der Wiedergabeliste.

#of <b>played</b> songs<br>on the playlist.
m0086=der Lieder <b>gespielt</b><br>in der Wiedergabeliste.

#of <b>not played</b> songs<br>on the playlist.
m0087=der Lieder <b>nicht gespielt</b><br>in der Wiedergabeliste.

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=Verantwortliches Mitglied<br>für den Gottesdienst/Veranstaltung und Liste<br>der zugewiesenen Mitglieder.

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>Titel und Künstler</b> des nächsten Liedes<br>das NICHT als <b>gespielt</b> markiert ist<br>in der Wiedergabeliste.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>Titel</b> des nächsten Liedes, das<br>NICHT als <b>gespielt</b> markiert ist<br>in der Wiedergabeliste.

#Stage Display (as configured)
m0091=Rückmonitor (gemäß Konfiguration)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=Sie können Zeilen als <b>Kommentar</b> im Text des Liedes oder in der schnellen Präsentation einfügen.<br>Die Kommentare werden nur auf Rückmonitoren angezeigt, wie in den <b>Anzeigeeinstellungen</b> festgelegt.

#To define a line as a comment, start a line with "two slash" //
m0093=Um eine Zeile als Kommentar festzulegen, beginnen Sie die Zeile mit "zwei Schrägstrichen" //

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=Die Farbe und Schriftart der Kommentare können im Bearbeitungsfenster von <b>Themen</b> geändert werden.

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=Die Wiedergabe von Videos auf mehreren Bildschirmen kann die Verarbeitung des Computers überlasten.<br>Seien Sie vorsichtig und maßvoll bei der Verwendung dieser Funktion auf leistungsschwachen Computern.

#Error loading dictionary
m0096=Fehler beim Laden des Wörterbuchs

#The program will be closed to apply the changes.\nClick OK and open the program again.
m0097=Das Programm wird geschlossen, um die Änderungen anzuwenden.\nKlicken Sie auf OK und öffnen Sie das Programm erneut.

#ffmpeg file not found.
m0098=ffmpeg-Datei nicht gefunden.

#Unable to identify video duration.
