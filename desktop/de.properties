#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=Beim Ausführen des Aktionscodes <b>gehe zu Folie...</b> zeigt das Programm die Folie basierend auf der durch den Wert "Intensität" des Codes übergebenen Nummer an.<br>Das heißt, wenn der Wert von "Intensität" 3 ist, wird die aktuelle Präsentation die dritte Folie in Ausführung anzeigen.<br>Es kann die dritte Folie eines Liedtextes, das dritte Bild einer Bilderliste usw. sein...<br>Diese Aktion startet keine Präsentation, sie ändert nur die Folie einer <b>bereits gestarteten</b> Präsentation.

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=Wenn die Präsentation ein Liedtext ist, beginnt die Nummerierung ab dem ersten Absatz des Liedtextes. Die Folie mit dem <b>Titel und Künstler</b> ist die Folie mit der Nummer null.

