#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Монитор Сцены</b> - это параметр, который перенапрявляет отображение слайдов на специальный монитор, скрытый от публики.<br>Если у видеокарты вашего ПК есть два выхода, и один подключен к проектору в зале служений, то второй можно использовать для людей, находящихся на <b>Сцене</b>. Вы можете настроить отображение материалов на <b>Мониторе Сцены</b> иначе, чем на основном мониторе, который показывается публике.<br>Трансляция в мобильное приложение также настраивается.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Флажок:</b> устанавливает изменение текста слайда. Например: отобразить первую строку следующего слайда в конце текущего слайда.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Заглавные буквы:</b> Отображает весь текст в верхнем регистре.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Удалить разрыв строки:</b> текст отображается непрерывно, автоматически разрывая строку на границе слайда, занимая всю его ширину.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Пользовательская тема:</b> изменяет тему отображения слайдов.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Включить для Библии:</b> включает настройки также и для стихов из Библии (за исключением установленных флажков).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Примечание: Темы Видео не работают на обратных мониторах сцены, только на мониторе по умолчанию.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Вы можете добавить собственное форматирование к определенному абзацу текста песни. Например, увеличить <b>пропорционально</b> размер шрифта хора.<br>А также ввести идентификационный текст (припев, куплет и т. д.), который будет отображаться только в нижнем колонтитуле слайда.

#View example
m0009=Посмотреть пример

#This feature also works in the Quick Display window
m0010=Эта функция также работает в окне Быстрого Показа

#Available Settings
m0011=Доступные Настройки

#All text in uppercase
m0012=Весь текст в верхнем регистре

#putting the character '%' after the number is useless
m0013=ставить символ '%' после числа не нужно

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=текст в круглых скобках = (припев), (куплет), (повтор), (финал), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb или шестнадцатеричное значение или название цвета в скобках = [128,192,64] или [80c040] или [ff0] или [blue]...

#Valid names
m0016=Допустимые имена

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Чтобы добавить настраиваемое форматирование, добавьте строку в начале абзаца, начинающуюся с двух «хэштегов» ## и следом коды, которые вы хотите (порядок кодов не имеет значения).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=В этом примере, когда отображается песня для проецирования, второй абзац будет выделен жирным шрифтом, с размером шрифта на 15% больше и синим цветом. Остальные абзацы обычно показываются с настройками темы.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Примечание. Если используемая тема уже выделена жирным шрифтом, например, это настраиваемое форматирование не будет иметь никакого значения.

#Some formatting examples
m0020=Некоторые примеры форматирования

#Bold and italic
m0021=Жирный и наклонный

#25% bigger
m0022=на 25% крупнее

#italic and 5% lower
m0023=Наклонный и на 5% меньше

#Uppercase and yellow
m0024=Верхний регистр и желтый цвет

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Вы можете определить, к каким строкам будет применяться настраиваемое форматирование.<br>  Добавьте два дефиса <b>--</b> в начале строки, для которой вы не хотите применять настраиваемое форматирование.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=В этом примере строка <b>«Mas ainda é pouco eu sei»</b> будет использовать исходное форматирование темы, а другие строки будут использовать пользовательское форматирование (жирный и желтый).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Вы можете использовать код <code>##p</code> для использования <b>стандартного</b> форматирования.<br>Все абзацы, помеченные с помощью <code>##p</code>, будут использовать форматирование, как в поле ниже.

#Default Custom Formatting
m0028=Пользовательское форматирование по умолчанию

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Каждый список представляет собой папку программы Holyrics: Audio (Аудио), Video (Видео) и Image (Фото). Чтобы добавить файлы, нажмите значок {0} на соответствующей вкладке, чтобы открыть соответствующую папку в проводнике Windows и вставить в нее файлы. Список в программе автоматически пополняется файлами, содержащимися в папке (если не активна какая-либо презентация).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Примечание.</b> ИЗБЕГАЙТЕ переименования файлов в папке, потому что если вы создадите ярлык для файла в списке воспроизведения, избранном и т. д., а затем переименуете его в папке, ярлык в программе перестанет работать, и вам придется создать новый.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=В каждую папку (Аудио, Видео и Фото) вы можете добавлять новые папки, которые будут списком файлов в программе. Например: вы можете создать папку с именем <b>Презентация</b> внутри папки <b>Фото</b> и добавлять в нее изображения. Папка будет показана как элемент в интерфейсе Holyrics, и щелчок по нему откроет все изображения для слайд-шоу.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Вы можете добавить ярлык для этих папок на ваш рабочий стол, щелкнув <a href='http://addShortcutDesktop'>ЗДЕСЬ</a>.

#Holyrics Library
m0033=Библиотека Holyrics

#Displays the song lyric in uppercase.
m0034=Отображает текст песни в верхнем регистре.

#Enable/disable the underline in the song title at first slide.
m0035=Включение/отключение подчеркивания в названии песни на первом слайде.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Когда <b>включен</b>, программа автоматически разбивает длинные строки, избегая уменьшения исходного размера шрифта. Когда <b>отключено</b>, программа будет уменьшать размер шрифта для длинных строк до тех пор, пока они не уместятся внутри слайда.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Включение/Отключение <a href='http://customFormatting'>Собственного Форматирования абзаца</a>.

#Enable/disable <b>Custom Background</b>.
m0038=Включить/Отключить <b>Собственный Фон</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=На панели <b>ЭФИР</b> показано, что в настоящее время отображается на дисплее по умолчанию.<br>(Фон и видео, воспроизводимые VLC Media Player, не отображаются на панели.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Если вы используете уникальный обратный монитор сцены для тех, кто находится на «сцене», вы можете использовать Панель Связи для отображения сообщений только на этом мониторе.<br>В настройках дисплея вы можете установить монитор как <b>Сцена</b> (кроме основного монитора аудитории), и сообщения Панели Связи будут отображаться только на Мониторах <b>Сцены</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Включите воспроизведение звука и щелкните слайд, который должен отображаться во время воспроизведения песни.<br>Вы можете приостановить и перемотать часть песни, чтобы продолжить с того места, где вы остановились.<br>Вы также можете удалить элемент из захваченного списка, щелкнув его правой кнопкой мыши.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Слайд, который будет отображаться перед первым слайдом, который вы щелкнете, определен в окне редактирования.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Чтобы избежать задержек при переходе между слайдами, попробуйте щелкать нужный слайд немного раньше.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=С помощью <b>Автоматической Презентации</b> вы можете задать продолжительность каждого слайда, объединенного с аудиофайлом MP3 (например, фоновая музыка).<br>После создания вы можете выбрать любую тему и начать презентацию.<br>Звук будет воспроизводиться Медиаплеером, и слайды будут автоматически отображаться во время воспроизведения песни.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Установите начальный слайд</b> с параметром <i>Начать с</i> и <i>продолжительность</i> начального слайда (в секундах).

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Настройте слайды</b>, щелкнув правой кнопкой мыши, чтобы добавить новые слайды, и перетащите слайды, чтобы упорядочить их.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Установите продолжительность каждого слайда</b> (в секундах) в поле <i>Продолжительность</i>. Вы также можете изменить точное время начала слайда, щелкнув текст, отображающий минуты, секунды и миллисекунды.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> воспроизводит песню от соответствующего слайда до конца песни.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> воспроизводит только часть соответствующего слайда.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Вы можете использовать <i>Метод Захвата</i>, чтобы упростить создание порядка слайдов и продолжительности каждого из них.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=При сохранении <i>Автоматической Презентации</i> сгенерированный файл <b>[имя файла].ap</b> уже будет включать выбранный звук в формате MP3. Не нужно копировать аудио вместе с файлом <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Вы можете редактировать текст некоторых слайдов во время их отображения.<br>- щелчок правой кнопкой мыши по слайду, который вы хотите отредактировать (список слайдов в нижней части главного окна);<br>- или нажав <b>SHIFT + F2</b> для редактирования текущего отображаемого слайда.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Чат - это средство связи между программой Holyrics для ПК и мобильным приложением Holyrics.<br>Любой смартфон, подключенный к сети, может получить доступ к чату через мобильное приложение Holyrics и отправлять сообщения на ПК.

#The selected presentation will run automatically.
m0054=Выбранная презентация запустится автоматически.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Щелкните сообщение, чтобы выбрать.<br>Перетащите сообщение, чтобы изменить его порядок в списке.<br>Нажмите выделенную кнопку в начале сообщения, чтобы выбрать соответствующее сообщение. <b>(первое изображение)</b><br>Щелкните сообщение правой кнопкой мыши, чтобы увидеть дополнительные параметры. <b>(второе изображение)</b>

#You can change the background or Theme for each paragraph
m0056=Вы можете изменить фон или Тему для каждого абзаца

#by clicking the slide {0} icon
m0057=нажав на значок слайда {0}

#dragging an item from themes list to the slide
m0058=перетаскивая элемент из списка тем на слайд

#or by right-clicking on the slide for more options
m0059=или щелкнув слайд правой кнопкой мыши, чтобы просмотреть дополнительные параметры

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Предупреждение!</b> При установке изображения или видео в качестве фона все настройки, такие как цвет шрифта, выравнивание и т. д., будут сохранены из выбранной Темы песни. Поэтому будьте осторожны при изменении <b>Темы по умолчанию</b> для песни, потому что ранее настроенные изображения и видео могут не соответствовать новой выбранной вами теме.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=Это функция позволяет вам использовать программное обеспечение, как если бы вы находились в расширенном режиме с несколькими дополнительными мониторами, даже если у вас подключен только один основной монитор.<br>Вы можете отобразить небольшое окно (или несколько) на своем собственном мониторе, имитируя то, что будет отображаться в реальной проекции.

#Use examples
m0062=Примеры использования

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Вы пользуетесь программой дома, у вас не подключен дополнительный монитор и вы хотите начать презентации, но не в полноэкранном режиме.

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Вы хотите узнать, как использовать программу в расширенном режиме, но у вас нет дополнительного монитора

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Вы используете компьютер только для трансляции слайдов по сети, не нуждаясь в полноэкранном отображении на основном мониторе.

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=Функция <b>Описание слайда</b> помогает определить слайд в нижнем колонтитуле презентации.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Описание абзаца/слайда определяется в окне редактирования песни в функции <b>Пользовательское форматирование</b>.

#Can be used for
m0068=Может быть использован для

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=установки горячих клавиш для функции <b>перейти к</b>, например: клавиша <b><i>X</i></b> для перехода к слайду <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=установки Темы по умолчанию, например: ко всем слайдам <b><i>X</i></b> применится тема <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=пользовательского форматирования, например: применить ко всем <b><i>X</i></b> слайдам наклонный</b> шрифт

#<b>Go to</b> function shortcuts
m0072=<b>Перейти</b> к "горячим" клавишам функций

#Song presentation
m0073=Презентация песни

