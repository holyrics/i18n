#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Можно создавать элементы для добавления в панель избранного или список воспроизведения, которые выполняют HTTP-запросы или отправляют коды MIDI на другие устройства.\nЭто позволяет вам выполнять действия с другими программами и устройствами, такими как OBS Studio, программа освещения, PTZ-камеры и т. д.\nНапример, вы можете создать элемент, который при выполнении изменяет сцену в вашей программе вещания, или элемент, который выбирает предустановку с PTZ-камеры в сети и т. д.\nЭти действия можно выполнить, щелкнув элемент, или также выполнить их автоматически с помощью функции <b>Triggers</b>.\nНапример, вы можете создать триггер, чтобы всякий раз, когда Holyrics представляет изображение X в проекции, оно автоматически менялось на сцену Y в вашей программе вещания.\nИли всякий раз, когда вы представляете библейский стих, он автоматически переключается на сцену Z в вашей программе вещания.\nСуществует множество возможностей автоматизации, которые облегчают и экономят работу мультимедийной команды.

