#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=Расписание в режиме <b>роль</b> отличается от старого стандартного режима.<br>В этом новом типе организации вы создаете (в настройках программы) все роли, которые существуют в группе, а затем определяете участника для роли.<br> <br>В старом режиме у вас есть по одному <b>участнику</b> на строку, и вы можете задать, запланировано это или нет, установив флажок.<br> <br>В новом режиме (роли) у вас есть по одной <b>роли</b> в каждой строке и вы определяете, какой <b>участник</b> будет назначен для этой роли.

