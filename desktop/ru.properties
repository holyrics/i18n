#Development mode
m0894=Режим разработки

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=В режиме разработки код JavaScript синхронизируется с файлом в подпапке программы, и все изменения, внесенные здесь в программе, будут сохранены в файле, так же как и все изменения, внесенные внешне в файл, будут отражены в сохраненном и выполняемом здесь коде JavaScript.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Это позволяет редактировать код JavaScript с помощью внешнего редактора (IDE по вашему выбору), и изменения автоматически отражаются здесь в программе.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Внимание: будьте осторожны при использовании этого режима, так как это означает, что код JavaScript, который будет автоматически выполняться в Holyrics, основан на внешнем читаемом файле, который может быть отредактирован любым другим процессом/программой, работающей на компьютере.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Имя папки может быть изменено, но обязательно должно содержать id элемента в любом месте имени.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=В режиме разработки Community используется подпапка программы для хранения дополнительного кода JavaScript, который будет загружен вместе с кодом JSCommunity, и все изменения, внесенные внешне в файл, будут отражены в загруженном и выполняемом здесь коде "jsc".

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Это позволяет создавать коды, которые будут автоматически использоваться в структуре, совместимой с "jsc", без необходимости рефакторинга кода для отправки на GitHub с новыми реализациями и изменениями.

