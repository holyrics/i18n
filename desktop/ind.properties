#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Visi Panggung</b> adalah pengaturan yang mengubah tampilan slide untuk monitor tertentu.<br>Jika Anda memiliki output video untuk proyeksi yang dilihat oleh publik dan memiliki output video lain untuk yang berada di <b>panggung</b>, Anda dapat mengatur monitor <b>pengembalian</b> dengan cara yang berbeda dari yang ditampilkan untuk publik.<br>Transmisi ke aplikasi juga dapat dikonfigurasi.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Kotak centang:</b> Menentukan perubahan pada teks slide. Misalnya: Menampilkan baris pertama dari slide berikutnya di akhir slide saat ini.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Huruf Besar:</b> Menampilkan teks sepenuhnya dalam huruf besar.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Hapus pemisah baris:</b> Menampilkan teks secara terus menerus, memecah baris secara otomatis pada batas slide dan memanfaatkan ruang samping sebanyak mungkin.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Tema Kustom:</b> Mengubah tema tampilan slide.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Aktifkan untuk Alkitab:</b> Mengaktifkan pengaturan juga untuk ayat-ayat Alkitab (kecuali pengaturan kotak centang).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Catatan: Tema video tidak berfungsi di monitor pengembalian, hanya di monitor publik.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Anda dapat menambahkan editan khusus untuk paragraf tertentu dari lirik. Misalnya, meningkatkan <b>proporsional</b> ukuran font dari paduan suara.<br>Dan juga menempatkan teks identifikasi (paduan suara, bait, dll...) yang hanya akan muncul di footer slide.

#View example
m0009=Lihat contoh

#This feature also works in the Quick Display window
m0010=Opsi ini juga berfungsi di jendela Presentasi Cepat

#Available Settings
m0011=Pengaturan yang tersedia

#All text in uppercase
m0012=Semua teks dalam huruf kapital

#putting the character '%' after the number is useless
m0013=meletakkan karakter '%' setelah angka tidak perlu

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=teks dalam tanda kurung = (paduan suara), (bait), (ulang), (akhir), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=nilai rgb, heksadesimal atau nama warna dalam tanda kurung = [128,192,64] atau [80c040] atau [ff0] atau [biru]...

#Valid names
m0016=Nama yang valid

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Untuk menambahkan format khusus, tambahkan baris di awal paragraf yang dimulai dengan dua "hashtag" ## dan kode yang Anda inginkan segera setelahnya (urutan kode tidak penting).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Dalam contoh, saat menampilkan lirik untuk proyeksi, paragraf kedua akan ditampilkan dengan huruf tebal, dengan ukuran font 15% lebih besar dan berwarna biru. Paragraf lainnya akan ditampilkan secara normal dengan pengaturan Tema.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Catatan: Jika tema yang digunakan sudah diatur untuk huruf tebal, misalnya, format khusus ini tidak akan berpengaruh.

#Some formatting examples
m0020=Beberapa contoh format

#Bold and italic
m0021=Tebal dan miring

#25% bigger
m0022=25% lebih besar

#italic and 5% lower
m0023=miring dan 5% lebih kecil

#Uppercase and yellow
m0024=Huruf kapital dan kuning

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Anda dapat menentukan baris mana yang akan diterapkan format kustom.<br> Tambahkan dua tanda hubung <b>--</b> di awal baris yang tidak ingin Anda terapkan format kustom.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Dalam contoh, baris <b>"Tapi masih sedikit saya tahu"</b> akan menggunakan format asli tema, dan baris lainnya akan menggunakan format kustom (tebal dan kuning).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Anda dapat menggunakan kode <code>##p</code> untuk menggunakan format <b>standar</b>.<br>Semua paragraf yang ditentukan dengan <code>##p</code> akan menggunakan format yang ditentukan di kolom di bawah.

#Default Custom Formatting
m0028=Format Kustom Standar

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Setiap daftar mewakili folder internal dari program Holyrics: Audio, Video, dan Gambar. Untuk menambahkan file: klik ikon {0} di tab yang sesuai untuk membuka folder di Windows dan tempel file di folder. Daftar di program akan diperbarui secara otomatis dengan file dari folder (kecuali jika ada presentasi yang aktif).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Catatan:</b> HINDARI mengganti nama file di folder, karena jika Anda membuat pintasan untuk file dalam daftar putar, favorit, dll. dan kemudian menggantinya di folder, pintasan di program tidak akan berfungsi lagi, Anda perlu membuat pintasan baru.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=Di setiap folder (Audio, Video, dan Gambar), Anda dapat membuat folder lain untuk menjadi daftar file di program. Misalnya: Anda dapat membuat folder bernama <b>Presentasi</b> di dalam folder <b>Gambar</b> dan menambahkan gambar di dalamnya. Folder tersebut akan menjadi item dalam daftar di program Holyrics dan saat Anda mengkliknya, semua gambar akan dibuka untuk presentasi slide.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Anda dapat menambahkan pintasan untuk folder ini di desktop Anda dengan mengklik <a href='http://addShortcutDesktop'>DI SINI</a>.

#Holyrics Library
m0033=Perpustakaan Holyrics

#Displays the song lyric in uppercase.
m0034=Menampilkan lirik lagu dalam huruf kapital.

#Enable/disable the underline in the song title at first slide.
m0035=Aktif/nonaktifkan garis bawah pada judul lagu dari slide pertama.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Dengan opsi <b>diaktifkan</b>, program akan secara otomatis memecah baris panjang, menghindari pengurangan ukuran asli font. Dengan opsi <b>dinonaktifkan</b>, jika ada baris panjang yang melampaui sisi slide, program akan mengurangi ukuran font hingga seluruh baris berada di dalam slide.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Aktif/nonaktifkan <a href='http://customFormatting'>format kustom</a> paragraf.

#Enable/disable <b>Custom Background</b>.
m0038=Aktif/nonaktifkan <b>latar belakang kustom</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Panel <b>LIVE</b> menunjukkan apa yang sedang ditampilkan saat ini di proyeksi utama.<br>(Latar belakang dan video yang dijalankan oleh VLC Media Player tidak muncul di panel.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Jika Anda menggunakan monitor kembali khusus untuk orang yang berada di 'panggung', Anda dapat menggunakan panel komunikasi untuk menampilkan pesan hanya di monitor ini.<br>Di pengaturan tampilan, Anda dapat menetapkan monitor sebagai <b>pandangan panggung</b> (kecuali monitor utama untuk publik), dan pesan di panel komunikasi akan ditampilkan hanya di monitor yang ditetapkan sebagai <b>pandangan panggung</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Putar audio dan klik slide yang ingin Anda tampilkan saat lagu diputar.<br>Anda dapat menjeda dan kembali ke bagian lagu untuk memulai dari tempat Anda berhenti.<br>Anda juga dapat menghapus item dari daftar yang ditangkap dengan mengklik kanan mouse.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Slide yang akan ditampilkan sebelum slide pertama yang Anda klik adalah yang ditentukan di jendela pengeditan.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Jangan tunggu untuk memulai bagian lagu untuk mengklik slide tertentu, coba klik slide beberapa milidetik sebelumnya, menghindari keterlambatan dalam transisi antar slide.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Dengan <b>Presentasi Otomatis</b> Anda dapat memprogram durasi setiap slide yang terintegrasi dengan audio MP3 (sebuah pemutaran, misalnya).<br>Setelah dibuat, Anda dapat memilih tema apa pun yang Anda inginkan dan memulai presentasi.<br>Audio akan diputar oleh Media Player dan slide akan ditampilkan secara otomatis saat lagu diputar.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Tentukan slide awal</b> dengan opsi <i>Mulai dengan</i> dan <i>durasi</i> (dalam detik) dari slide awal.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Atur slide</b> dengan mengklik kanan untuk menambahkan slide baru dan seret slide untuk mengurutkannya.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Tentukan durasi setiap slide</b> (dalam detik) di kolom <i>Durasi</i>. Anda juga dapat mengubah waktu tepat saat slide dimulai dengan mengklik teks yang menunjukkan menit, detik, dan milidetik.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> memutar lagu dari slide yang sesuai hingga akhir lagu.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> hanya memutar bagian dari slide yang sesuai.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Anda dapat menggunakan <i>Metode penangkapan</i> untuk memudahkan pembuatan urutan slide dan durasi masing-masing.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Saat menyimpan <i>Presentasi Otomatis</i>, file yang dihasilkan <b>[nama file].ap</b> sudah akan menyertakan audio MP3 yang dipilih. Anda tidak perlu khawatir untuk menyalin audio bersama dengan file <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Anda dapat mengedit teks dari slide tertentu saat ditampilkan.<br> - Mengklik kanan pada slide yang ingin Anda edit (daftar slide di bagian bawah jendela utama);<br> - atau menekan <b>SHIFT + F12</b> untuk mengedit slide yang sedang ditampilkan.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Obrolan adalah sarana komunikasi antara Holyrics di PC dan aplikasi Holyrics untuk ponsel.<br>Setiap ponsel yang terhubung ke jaringan dapat mengakses obrolan melalui aplikasi dan mengirim pesan ke PC.

#The selected presentation will run automatically.
m0054=Presentasi yang dipilih akan dijalankan secara otomatis.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Klik pada pesan untuk memilihnya.<br>Seret pesan untuk mengurutkannya dalam daftar.<br>Ketik tombol yang disorot di awal pesan untuk memilih pesan yang sesuai. <b>(gambar pertama)</b><br>Klik kanan pada pesan untuk opsi lebih lanjut. <b>(gambar kedua)</b>

#You can change the background or Theme for each paragraph
m0056=Anda dapat mengubah latar belakang atau Tema dari setiap paragraf

#by clicking the slide {0} icon
m0057=mengklik ikon {0} dari slide

#dragging an item from themes list to the slide
m0058=menyeret item dari daftar tema ke slide

#or by right-clicking on the slide for more options
m0059=atau mengklik kanan pada slide untuk opsi lebih lanjut

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Perhatian!</b> Saat menetapkan gambar atau video sebagai latar belakang, semua pengaturan seperti warna font, perataan, dll. akan mengikuti Tema yang dipilih untuk lagu. Jadi hati-hati saat mengubah <b>Tema default</b> lagu, karena gambar dan video yang telah diatur sebelumnya mungkin tidak cocok dengan tema baru yang dipilih.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=adalah fungsi yang memungkinkan Anda menggunakan program seolah-olah dalam mode diperluas meskipun tidak memiliki monitor lain yang terhubung.<br>Dapat menampilkan jendela kecil di monitor Anda sendiri, mensimulasikan apa yang akan ditampilkan dalam proyeksi nyata.

#Use examples
m0062=Contoh penggunaan

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Anda menggunakan program di rumah, tidak memiliki monitor tambahan yang terhubung dan ingin memulai presentasi tetapi tidak dalam layar penuh

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Anda ingin belajar menggunakan program dalam mode diperluas tetapi tidak memiliki monitor tambahan

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Anda menggunakan komputer hanya untuk menyiarkan slide melalui jaringan wifi, sehingga tampilan layar penuh di layar Anda sendiri menjadi tidak berguna

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=Fungsi <b>Deskripsi Slide</b> berfungsi sebagai alat untuk mengidentifikasi slide di footer presentasi.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Deskripsi dari paragraf/slide ditentukan di jendela pengeditan lirik, melalui fungsi <b>Format Kustom</b>.

#Can be used for
m0068=Dapat digunakan untuk

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=menetapkan pintasan pada fungsi <b>pergi ke</b>, misalnya: huruf <b><i>X</i></b> pergi ke slide <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=menetapkan Tema default, misalnya: semua slide <b><i>X</i></b> akan memiliki Tema <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=format kustom, misalnya: semua slide <b><i>X</i></b> dengan font miring</b>

#<b>Go to</b> function shortcuts
m0072=Pintasan sistem dari fungsi <b>pergi ke</b>

