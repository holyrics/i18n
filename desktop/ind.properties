#Stage Display (as configured)
m0091=Monitor pengembalian (sesuai pengaturan)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=Anda dapat menyertakan baris sebagai <b>komentar</b> dalam lirik lagu atau presentasi cepat.<br>Komentar hanya akan ditampilkan di monitor pengembalian, sesuai yang ditentukan dalam <b>Pengaturan Tampilan</b>.

#To define a line as a comment, start a line with "two slash" //
m0093=Untuk menetapkan baris sebagai komentar, awali baris dengan "dua garis miring" //

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=Pengaturan warna dan font komentar dapat diubah di jendela pengeditan <b>Tema</b>

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=Menjalankan video di beberapa layar dapat membebani pemrosesan komputer.<br>Hati-hati dan moderat saat menggunakan fungsi ini di komputer dengan kinerja rendah.

