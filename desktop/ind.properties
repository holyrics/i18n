#Development mode
m0894=Mode pengembangan

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=Dalam mode pengembangan, kode JavaScript disinkronkan dengan file di subfolder program dan setiap perubahan yang dilakukan di sini dalam program akan disimpan di file, sama seperti setiap perubahan yang dilakukan secara eksternal pada file akan tercermin dalam kode JavaScript yang disimpan dan dijalankan di sini dalam program.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Ini memungkinkan kode JavaScript diedit oleh editor eksternal (IDE pilihan Anda) dan perubahan secara otomatis tercermin di sini dalam program.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Perhatian: hati-hati saat menggunakan mode ini, karena berarti bahwa kode JavaScript yang akan dieksekusi di Holyrics secara otomatis didasarkan pada file eksternal yang dapat dibaca yang dapat diedit oleh proses/program lain yang berjalan di komputer.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Nama folder dapat diubah, hanya saja harus mengandung id item di mana saja dalam nama.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=Dalam mode pengembangan Community, subfolder program digunakan untuk menyimpan kode JavaScript tambahan yang akan dimuat bersama dengan kode JSCommunity dan setiap perubahan yang dilakukan secara eksternal pada file akan tercermin dalam kode "jsc" yang dimuat dan dijalankan di sini dalam program.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Ini memungkinkan untuk membuat kode yang akan digunakan secara otomatis dalam struktur yang kompatibel dengan "jsc", tanpa perlu merombak kode untuk mengirim ke GitHub dengan implementasi dan perubahan baru.

