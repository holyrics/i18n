#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=Skala dalam mode <b>fungsi</b> memiliki organisasi yang berbeda dari mode standar lama.<br>Dalam jenis organisasi baru ini, Anda membuat (di pengaturan program) semua fungsi yang ada di kementerian dan kemudian Anda menetapkan anggota untuk setiap fungsi.<br><br>Dalam mode lama, Anda memiliki <b>anggota</b> di setiap baris dan menentukan apakah dia dijadwalkan atau tidak, dengan menandai kotak centang.<br><br>Dalam mode baru (fungsi), Anda memiliki <b>fungsi</b> di setiap baris dan menentukan anggota <b>mana</b> yang dijadwalkan untuk fungsi ini.

