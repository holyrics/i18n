m0067=คำอธิบายของย่อหน้า/สไลด์ถูกกำหนดในหน้าต่างการแก้ไขเนื้อเพลง โดยฟังก์ชัน <b>การจัดรูปแบบที่กำหนดเอง</b>.

#Can be used for
m0068=สามารถใช้เพื่อ

