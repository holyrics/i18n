#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=การเล่นวิดีโอบนหลายหน้าจออาจทำให้การประมวลผลของคอมพิวเตอร์หนักเกินไป.<br>โปรดระมัดระวังและใช้ฟังก์ชันนี้อย่างมีสติในคอมพิวเตอร์ที่มีประสิทธิภาพต่ำ.

