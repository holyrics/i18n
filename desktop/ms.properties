#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Anda boleh mencipta item untuk ditambah dalam bar penanda buku atau dalam senarai main yang melaksanakan permintaan HTTP atau menghantar kod MIDI ke peranti lain.\nIni membolehkan melaksanakan tindakan dalam program dan peranti lain, seperti OBS Studio, program pencahayaan, kamera PTZ, dll.\nContohnya, anda boleh mencipta item yang, apabila dilaksanakan, mengubah adegan dalam program penyiaran anda, atau item yang memilih preset kamera PTZ dalam rangkaian, dll.\nTindakan ini boleh dilaksanakan dengan mengklik item atau juga dilaksanakan secara automatik melalui fungsi <b>Trigger</b> program.\nContohnya, anda boleh mencipta trigger supaya setiap kali Holyrics memaparkan imej X dalam proyeksi, ia secara automatik mengubah kepada adegan Y dalam program penyiaran anda.\nAtau setiap kali memaparkan ayat Alkitab, ia secara automatik mengubah kepada adegan Z dalam program penyiaran anda.\nTerdapat banyak kemungkinan automasi yang memudahkan dan menjimatkan kerja pasukan multimedia.

