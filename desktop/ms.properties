#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=Apabila menjalankan kod tindakan <b>pergi ke slaid...</b> program akan menunjukkan slaid berdasarkan nombor yang diberikan oleh nilai "intensiti" kod tersebut.<br>Dengan kata lain, jika nilai "intensiti" adalah 3, pembentangan semasa akan menunjukkan slaid ketiga yang sedang berjalan.<br>Ia boleh menjadi slaid ketiga dari lirik lagu, imej ketiga dari senarai imej, dan lain-lain...<br>Tindakan ini tidak memulakan pembentangan, ia hanya mengubah slaid pembentangan <b>yang sudah dimulakan</b>.

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=Jika pembentangan adalah lirik lagu, penomboran bermula dari perenggan pertama lirik lagu. Slaid dengan <b>tajuk dan artis</b> adalah slaid nombor sifar.

