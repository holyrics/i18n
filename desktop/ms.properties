#Development mode
m0894=Mod pembangunan

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=Dalam mod pembangunan, kod JavaScript diselaraskan dengan fail dalam subfolder program dan sebarang perubahan yang dibuat di sini dalam program akan disimpan dalam fail, sama seperti sebarang perubahan yang dibuat secara luaran pada fail akan dipantulkan dalam kod JavaScript yang disimpan dan dilaksanakan di sini dalam program.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Ini membolehkan kod JavaScript diedit oleh editor luaran (IDE pilihan anda) dan perubahan secara automatik dipantulkan di sini dalam program.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Perhatian: berhati-hati semasa menggunakan mod ini, kerana ia bermakna bahawa kod JavaScript yang akan dilaksanakan di Holyrics secara automatik berdasarkan pada fail luaran yang boleh dibaca yang boleh diedit oleh mana-mana proses/program lain yang sedang berjalan di komputer.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Nama folder boleh diubah, hanya perlu mengandungi id item di mana-mana lokasi dalam nama.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=Dalam mod pembangunan Community, subfolder program digunakan untuk menyimpan kod JavaScript tambahan yang akan dimuatkan bersama dengan kod JSCommunity dan sebarang perubahan yang dibuat secara luaran pada fail akan dipantulkan dalam kod "jsc" yang dimuatkan dan dilaksanakan di sini dalam program.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Ini membolehkan anda membuat kod yang akan digunakan secara automatik dalam struktur yang serasi dengan "jsc", tanpa perlu merombak kod untuk dihantar ke GitHub dengan pelaksanaan dan perubahan baru.

