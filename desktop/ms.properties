#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=adalah fungsi untuk menggunakan kode yang akan diganti dengan nilai variabel yang ditentukan dalam sistem, seperti misalnya: tanggal dan waktu.<br>Untuk menggunakannya, cukup ketik kode bersama dengan teks. Berfungsi dalam lirik, peringatan, panel komunikasi, ...

#of <b>all</b> songs<br>on the playlist.
m0085=dari <b>semua</b> lagu<br>di daftar putar.

#of <b>played</b> songs<br>on the playlist.
m0086=dari lagu <b>diputar</b><br>di daftar putar.

#of <b>not played</b> songs<br>on the playlist.
m0087=dari lagu <b>tidak diputar</b><br>di daftar putar.

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=Anggota yang bertanggung jawab<br>atas kebaktian/acara dan daftar<br>anggota yang ditugaskan.

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>Judul dan artis</b> dari lagu berikutnya<br>yang TIDAK ditandai sebagai <b>diputar</b><br>di daftar putar.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>Judul</b> dari lagu berikutnya yang<br>TIDAK ditandai sebagai <b>diputar</b><br>di daftar putar.

#Stage Display (as configured)
m0091=Monitor pengembalian (sesuai pengaturan)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=Anda dapat menyertakan baris sebagai <b>komentar</b> dalam lirik lagu atau presentasi cepat.<br>Komentar hanya akan ditampilkan di monitor pengembalian, sesuai yang ditentukan dalam <b>Pengaturan Tampilan</b>.

#To define a line as a comment, start a line with "two slash" //
m0093=Untuk menetapkan baris sebagai komentar, awali baris dengan "dua garis miring" //

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=Pengaturan warna dan font komentar dapat diubah di jendela pengeditan <b>Tema</b>

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=Menjalankan video di beberapa layar dapat membebani pemrosesan komputer.<br>Hati-hati dan moderat saat menggunakan fungsi ini di komputer dengan kinerja rendah.

#Error loading dictionary
m0096=Kesalahan saat memuat kamus

#The program will be closed to apply the changes.\nClick OK and open the program again.
m0097=Program akan ditutup untuk menerapkan perubahan.\nKlik OK dan buka program lagi.

