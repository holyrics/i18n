#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=Skala dalam mod <b>fungsi</b> mempunyai organisasi yang berbeza daripada mod standard lama.<br>Dalam jenis organisasi baru ini, anda mencipta (dalam tetapan program) semua fungsi yang wujud dalam kementerian dan kemudian anda menetapkan seorang anggota untuk setiap fungsi.<br><br>Dalam mod lama, anda mempunyai <b>anggota</b> dalam setiap baris dan menetapkan sama ada dia dijadualkan atau tidak, dengan menandakan kotak.<br><br>Dalam mod baru (fungsi), anda mempunyai <b>fungsi</b> dalam setiap baris dan menetapkan <b>anggota</b> yang dijadualkan untuk fungsi ini.

