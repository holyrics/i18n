#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Vue de la scène</b> est un paramètre qui modifie l'affichage des diapositives pour un moniteur spécifique.<br>Si vous disposez d'une sortie vidéo pour la projection vue par le public et d'une autre sortie vidéo pour ceux qui se trouvent sur la <b>scène</b>, vous pouvez configurer le moniteur <b>de retour</b> différemment de celui affiché. au public.<br>Le streaming vers l'application est également configurable.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>case à cocher :</b> définit une modification du texte de la diapositive. Par exemple, afficher la première ligne de la diapositive suivante à la fin de la diapositive actuelle.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Majuscules :</b> affiche tout le texte en majuscules.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Supprimer le retour à la ligne :</b> affiche le texte en continu, en retournant automatiquement au bord de la diapositive et en occupant autant d'espace latéral que possible.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Thème personnalisé :</b> modifie le thème d'affichage des diapositives.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Activer pour la Bible :</b> Activez également les paramètres pour les versets bibliques (sauf le paramètre de case à cocher).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Remarque : Les thèmes vidéo ne fonctionnent pas sur les moniteurs de retour, uniquement sur le moniteur d'audience.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Vous pouvez ajouter une modification personnalisée à un paragraphe spécifique de la lettre. Par exemple, augmentez la taille de la police du refrain <b>proportionnellement</b>.<br>Et mettez également un texte d'identification (refrain, couplet, etc...) qui apparaîtra uniquement en pied de page des slides.

#View example
m0009=Afficher l'exemple

#This feature also works in the Quick Display window
m0010=Cette fonction fonctionne également dans la fenêtre d'affichage rapide

#Available Settings
m0011=Paramètres disponibles

#All text in uppercase
m0012=Tous les texte en majuscules

#putting the character '%' after the number is useless
m0013=mettre le caractère '%' après le numéro n'est pas nécessaire

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=texte entre parenthèses = (refrain), (couplet), (répétition), (final), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb, valeur hexadécimale ou nom de la couleur entre crochets = [128,192,64] ou [80c040] ou [ff0] ou [bleu]...

#Valid names
m0016=Noms valides

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Pour ajouter une mise en forme personnalisée, ajoutez une ligne au début du paragraphe commençant par deux "hashtags" ## et les codes de votre choix juste après (l'ordre des codes n'a pas d'importance).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Dans l'exemple, lors de la présentation de la lettre pour projection, le deuxième paragraphe sera présenté en gras, avec une taille de police 15 % plus grande et en bleu. Les autres paragraphes seront présentés normalement avec les paramètres du Thème.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Remarque : Si le thème utilisé est déjà en gras par exemple, cette mise en forme personnalisée ne fera aucune différence.

#Some formatting examples
m0020=Quelques exemples de formatage

#Bold and italic
m0021=Gras et italique

#25% bigger
m0022=25% plus grand

#italic and 5% lower
m0023=italique et 5% inférieur

#Uppercase and yellow
m0024=Majuscule et jaune

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Vous pouvez définir les lignes auxquelles un formatage personnalisé sera appliqué.<br>  Ajoutez deux tirets <b>--</b> au début de la ligne à laquelle vous ne souhaitez pas appliquer de mise en forme personnalisée.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Dans l'exemple, la ligne <b>"Mais je ne sais toujours pas grand-chose"</b> utilisera la mise en forme d'origine du thème, et les lignes restantes utiliseront une mise en forme personnalisée (gras et jaune).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Vous pouvez utiliser le code <code>##p</code> pour utiliser un format <b>standard</b>.<br>Tous les paragraphes définis avec <code>##p</code> utiliseront le formatage défini dans le champ ci-dessous.

#Default Custom Formatting
m0028=Formatage personnalisé par défaut

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Chaque liste représente un dossier interne du programme Holyrics : Audio, Vidéo et Image. Pour ajouter des fichiers : cliquez sur l'icône {0} de l'onglet correspondant pour ouvrir le dossier dans Windows et collez les fichiers dans le dossier. La liste du programme est automatiquement mise à jour avec les fichiers du dossier (sauf si une présentation est active).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Remarque :</b> ÉVITEZ de renommer les fichiers du dossier, comme si vous créiez un raccourci vers un fichier dans une liste de lecture, des favoris, etc. puis renommez-le dans le dossier, le raccourci dans le programme ne fonctionnera plus, vous devrez créer un nouveau raccourci.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=Dans chacun des dossiers (Audio, Vidéo et Image), vous pouvez créer d'autres dossiers pour constituer une liste de fichiers dans le programme. Par exemple : vous pouvez créer un dossier appelé <b>Présentation</b> dans le dossier <b>Images</b> et y ajouter des images. Le dossier sera un élément de liste dans le programme Holyrics et cliquer dessus ouvrira toutes les images pour le diaporama.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Vous pouvez ajouter un raccourci vers ces dossiers sur votre bureau en cliquant <a href='http://addShortcutDesktop'>ICI</a>.

#Holyrics Library
m0033=Bibliothèque Holyrics

#Displays the song lyric in uppercase.
m0034=Affiche les paroles de la chanson en majuscules.

#Enable/disable the underline in the song title at first slide.
m0035=Active/désactive le soulignement dans le titre musical de la première diapositive.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Avec l'option <b>activée</b>, le programme enveloppera automatiquement les longues lignes, évitant ainsi de diminuer la taille de la police d'origine. Avec l'option <b>désactivée</b>, si vous avez une longue ligne qui dépasse le côté de la diapositive, le programme réduira la taille de la police jusqu'à ce que toute la ligne soit à l'intérieur de la diapositive.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Activer/désactiver le paragraphe <a href='http://custom Formatting'>formatage personnalisé</a> du paragraphe.

#Enable/disable <b>Custom Background</b>.
m0038=Active/désactive l'<b>arrière-plan personnalisé</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=Le panneau <b>LIVE</b> montre ce qui est actuellement projeté dans la projection principale.<br>(L'arrière-plan et la vidéo lus par VLC Media Player n'apparaissent pas dans le panneau.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Si vous utilisez un moniteur de retour exclusif pour ceux qui sont sur la « scène », vous pouvez utiliser le panneau de communication pour présenter les messages uniquement sur ce moniteur.<br>Dans les paramètres d'affichage, vous pouvez définir un moniteur comme <b>vue de scène</b> (à l'exception du moniteur du public principal), et les messages sur le panneau de communication seront affichés uniquement sur les moniteurs définis comme <b>vue de scène</b>. .

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Mettez l'audio à lire et cliquez sur la diapositive que vous souhaitez lire pendant la lecture de la musique.<br>Vous pouvez mettre en pause et rembobiner une section de la chanson pour reprendre là où vous vous étiez arrêté.<br>Vous pouvez également supprimer un élément de la liste capturée en cliquant dessus avec le bouton droit.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=La diapositive qui sera affichée avant la première diapositive sur laquelle vous cliquez est celle définie dans la fenêtre d'édition.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=N'attendez pas que la section musicale commence à cliquer sur la diapositive spécifique, essayez de cliquer sur la diapositive quelques millièmes de seconde avant, en évitant les retards dans la transition entre les diapositives.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Avec <b>Présentation automatique</b> vous pouvez programmer la durée de chaque diapositive intégrée à un audio MP3 (une lecture, par exemple).<br>Une fois créé, vous pouvez choisir le thème de votre choix et démarrer la présentation.<br>L'audio sera lu via le lecteur multimédia et les diapositives s'afficheront automatiquement pendant la lecture de la musique.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Définissez la diapositive initiale</b> avec l'option <i>Commencer par</i> et la <i>durée</i> (en secondes) de la diapositive initiale.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Organiser les diapositives</b> cliquez avec le bouton droit pour ajouter de nouvelles diapositives et faites glisser les diapositives pour les trier.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Définissez la durée de chaque diapositive</b> (en secondes) dans le champ <i>Durée</i>. Vous pouvez également modifier l'heure exacte de début de la diapositive en cliquant sur le texte qui indique les minutes, les secondes et les millisecondes.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> jouez la chanson à partir de la diapositive correspondante jusqu'à la fin de la chanson.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> lit uniquement la partie de la diapositive correspondante.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Vous pouvez utiliser la <i>Méthode Capture</i> pour faciliter la création de l'ordre des diapositives et de la durée de chacune.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Lors de l'enregistrement de la <i>Présentation automatique</i>, le fichier généré <b>[nom du fichier].ap</b> inclura déjà l'audio MP3 sélectionné. Vous n'avez pas à vous soucier de copier l'audio avec le fichier <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Vous pouvez modifier le texte de certaines diapositives pendant leur présentation.<br> - Faites un clic droit sur la slide que vous souhaitez éditer (liste des slides en pied de page de la fenêtre principale) ;<br> - soit en appuyant sur <b>SHIFT + F12</b> pour éditer la diapositive actuellement affichée.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Le chat est un moyen de communication entre Holyrics sur PC et l'application mobile Holyrics.<br>N'importe quel téléphone portable connecté au réseau pourra accéder au chat via l'application et envoyer des messages au PC.

#The selected presentation will run automatically.
m0054=La présentation sélectionnée sera lue automatiquement.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Cliquez sur le message pour le sélectionner.<br>Faites glisser un message pour le réorganiser dans la liste.<br>Tapez la touche en surbrillance au début du message pour sélectionner le message correspondant. <b>(première image)</b><br>Cliquez avec le bouton droit sur le message pour plus d'options. <b>(deuxième image)</b>

#You can change the background or Theme for each paragraph
m0056=Vous pouvez changer l'arrière-plan ou le thème de chaque paragraphe

#by clicking the slide {0} icon
m0057=En cliquant sur l'icône {0} sur la diapositive

#dragging an item from themes list to the slide
m0058=faire glisser un élément de la liste de thèmes sur la diapositive

#or by right-clicking on the slide for more options
m0059=ou faites un clic droit sur la diapositive pour plus d'options

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Attention !</b> Lors de la définition d'une image ou d'une vidéo comme arrière-plan, tous les paramètres tels que la couleur de la police, l'alignement, etc. proviendra du thème sélectionné pour la chanson. Soyez donc prudent lorsque vous modifiez le <b>Thème par défaut</b> de la musique, car les images et vidéos précédemment configurées peuvent ne pas correspondre au thème nouvellement sélectionné.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=est une fonction qui vous permet d'utiliser le programme comme s'il était en mode étendu même sans avoir d'autres moniteurs connectés.<br>Être capable d'afficher une petite fenêtre sur son propre moniteur, simulant ce qui serait affiché dans la projection réelle.

#Use examples
m0062=Exemples d'utilisation

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Vous utilisez le programme à la maison, vous n'avez pas de moniteur auxiliaire connecté et vous souhaitez démarrer des présentations mais pas en plein écran

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Vous souhaitez apprendre à utiliser le programme en mode étendu mais vous ne disposez pas de moniteur auxiliaire

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Vous utilisez uniquement l'ordinateur pour transmettre les diapositives sur le réseau WiFi, ce qui rend inutile la visualisation en plein écran sur votre propre écran.

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=La fonctionnalité <b>Description de la diapositive</b> sert de facilitateur pour identifier la diapositive dans le pied de page de la présentation.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=La description d'un paragraphe/diapositive est définie dans la fenêtre d'édition des paroles, à l'aide de la fonction <b>Formatage personnalisé</b>.

#Can be used for
m0068=Peut être utilisé pour

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=Réglez les raccourcis à <b>allez à la fonction</b>, par exemple: <b><i>x</i></b> lettre allez à la diapositive <b><i>x</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=définissez un thème par défaut, par exemple toutes les diapositives <b><i>X</i></b> auront le thème <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=formatage personnalisé, par exemple toutes les diapositives <b><i>X</i></b> avec une police italique</b>

#<b>Go to</b> function shortcuts
m0072=<b>Accéder</b> aux raccourcis de fonctions

#Song presentation
m0073=Présentation de la chanson

#Other presentations
m0074=Autres présentations

