#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=La balance en mode <b>fonction</b> a une organisation différente de l'ancien mode standard.<br>Dans ce nouveau type d'organisation, vous créez (dans les paramètres du programme) tous les rôles qui existent dans le ministère puis vous définissez un membre pour chaque rôle.<br><br>A l'ancienne vous aviez un <b>membre</b> sur chaque ligne et vous définissiez s'il est programmé ou non en cochant une case.<br><br>En nouveau mode (fonction), vous avez une <b>fonction</b> sur chaque ligne et définissez quel <b>membre</b> est affecté à cette fonction.

