#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Il est possible de créer des éléments à ajouter à la barre de favoris ou à la liste de lecture qui exécutent des requêtes HTTP ou envoient des codes MIDI à d'autres appareils.\nCela vous permet d'effectuer des actions sur d'autres programmes et appareils tels que OBS Studio, un programme d'éclairage, des caméras PTZ, etc.\nPar exemple, vous pouvez créer un élément qui, une fois exécuté, modifie une scène dans votre programme de diffusion, ou un élément qui sélectionne un préréglage d'une caméra PTZ sur le réseau, etc.\nCes actions peuvent être exécutées en cliquant sur l'élément ou également exécutées automatiquement via la fonctionnalité <b>Déclencheurs</b> du programme.\nPar exemple, il est possible de créer un déclencheur pour que chaque fois que Holyrics présente l'image X dans la projection, il passe automatiquement à la scène Y dans votre programme de transmission.\nOu chaque fois que vous affichez un verset biblique, il passe automatiquement à la scène Z dans votre programme diffusé.\nIl existe de nombreuses possibilités d'automatisation qui facilitent et économisent du travail pour l'équipe multimédia.

