m0083=Dernière diapositive affichée

#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=Il s'agit d'une fonctionnalité permettant d'utiliser des codes qui seront remplacés par des valeurs variables définies dans le système, telles que : la date et l'heure.<br>Pour l'utiliser, entrez simplement le code avec le texte. Fonctionne sur les courriers, alertes, panneau de communication, ...

#of <b>all</b> songs<br>on the playlist.
m0085=de <b>toutes</b> les chansons<br>dans la playlist.

#of <b>played</b> songs<br>on the playlist.
m0086=de chansons <b>jouées</b><br>dans la playlist.

#of <b>not played</b> songs<br>on the playlist.
m0087=de chansons <b>non jouées</b><br>dans la playlist.

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=Membre responsable<br>par le culte/événement et la liste<br>des membres programmés.

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>Titre et artiste</b> de la chanson suivante<br>qui n'est PAS marqué comme <b>joué</b><br>dans la playlist.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>Titre</b> de la prochaine chanson qui<br>Il n'est PAS marqué comme <b>joué</b><br>dans la playlist.

#Stage Display (as configured)
m0091=Moniteur de retour (selon configuration)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=Vous pouvez inclure des lignes telles que <b>commentaire</b> dans les paroles de la chanson ou dans une présentation rapide.<br>Les commentaires ne seront affichés que sur les moniteurs de commentaires tels que définis dans les <b>Paramètres d'affichage</b>.

#To define a line as a comment, start a line with "two slash" //
m0093=Pour commenter une ligne, commencez la ligne par "deux barres obliques" //

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=Les paramètres de couleur et de police des commentaires peuvent être modifiés dans la fenêtre d'édition des <b>Thèmes</b>.

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=La lecture de vidéo sur plusieurs écrans peut surcharger le traitement de votre ordinateur.<br>Faites preuve de prudence et de modération lorsque vous utilisez cette fonctionnalité sur des ordinateurs peu performants.

#Error loading dictionary
m0096=Erreur lors du chargement du dictionnaire

