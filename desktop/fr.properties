#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=Lors de l'exécution du code d'action <b>aller à la diapositive...</b> le programme affichera la diapositive en fonction du nombre transmis par la valeur "intensité" du code.<br>Autrement dit, si la valeur « intensité » est de 3, la présentation actuelle affichera la troisième diapositive en cours d'exécution.<br>Il peut s'agir de la troisième diapositive des paroles d'une chanson, de la troisième image d'une liste d'images, etc...<br>Cette action ne démarre pas une présentation, elle modifie uniquement la diapositive d'une présentation <b>déjà démarrée</b>.

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=Si la présentation concerne les paroles d’une chanson, la numérotation commence à partir du premier paragraphe des paroles de la chanson. La diapositive avec le <b>titre et l'artiste</b> est la diapositive numéro zéro.

