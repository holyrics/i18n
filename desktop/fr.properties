#Development mode
m0894=Mode de développement

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=En mode développement, le code JavaScript est synchronisé avec un fichier dans le sous-dossier du programme et toute modification faite ici dans le programme sera enregistrée dans le fichier, tout comme toute modification faite extérieurement dans le fichier sera reflétée dans le code JavaScript enregistré et exécuté ici dans le programme.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Cela permet que le code JavaScript soit édité par un éditeur externe (l'IDE de votre choix) et que les modifications soient automatiquement reflétées ici dans le programme.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Attention : faites attention en utilisant ce mode, car cela signifie que le code JavaScript qui sera exécuté automatiquement dans Holyrics est basé sur un fichier externe lisible qui peut être modifié par tout autre processus/programme en cours d'exécution sur l'ordinateur.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Le nom du dossier peut être modifié, il est seulement obligatoire de contenir l'id de l'élément à n'importe quel endroit du nom.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=En mode développement de la Community, un sous-dossier du programme est utilisé pour stocker le code JavaScript supplémentaire qui sera chargé avec le code JSCommunity et toute modification faite extérieurement dans le fichier sera reflétée dans le code "jsc" chargé et exécuté ici dans le programme.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Cela permet de créer des codes qui seront utilisés automatiquement dans la structure compatible avec "jsc", sans avoir besoin de refactoriser le code pour l'envoyer sur GitHub avec de nouvelles implémentations et modifications.

