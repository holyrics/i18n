#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Scenari görünüşü</b> slaydların müəyyən bir monitor üçün göstərilməsini dəyişən bir ayardır.<br>Əgər siz auditoriya tərəfindən görünən proyeksiya üçün bir video çıxışı varsa və <b>scenari</b>də olanlar üçün başqa bir video çıxışı varsa, <b>geri</b> monitoru auditoriyaya göstərilənlərdən fərqli bir şəkildə konfiqurasiya edə bilərsiniz.<br>Tətbiqə ötürmə də konfiqurasiya edilə bilər.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Seçim qutusu:</b> Slaydın mətni üzərində bir dəyişiklik müəyyən edir. Məs.: Növbəti slaydın ilk sətirini cari slaydın sonunda təqdim etmək.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Böyük hərflə:</b> Mətni tamamilə böyük hərflə təqdim edir.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Sətir qırılmasını sil:</b> Mətni davamlı şəkildə təqdim edir, slaydın sərhədində avtomatik olaraq sətir qırır və mümkün olan maksimum yan sahəni tutur.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Fərdi Tema:</b> Slaydın göstərilmə temasını dəyişir.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Müqəddəs Kitab üçün aktivləşdirin:</b> Ayələr üçün ayarları da aktivləşdirir (seçim qutusu ayarından başqa).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Qeyd: Video mövzuları geri monitorlarda işləməyir, yalnız auditoriya monitorunda.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Mətnin xüsusi bir paraqrafı üçün fərdi redaktə əlavə edə bilərsiniz. Məsələn, xorun şrift ölçüsünü <b>proporcional olaraq</b> artırın.<br>Və yalnız slaydların alt hissəsində görünəcək bir identifikasiya mətni (xor, bənd və s.) də əlavə edə bilərsiniz.

#View example
m0009=Nümunəyə bax

#This feature also works in the Quick Display window
m0010=Bu seçim Hızlı Təqdimat pəncərəsində də işləyir

#Available Settings
m0011=Mövcud parametrlər

#All text in uppercase
m0012=Bütün mətn böyük hərflə

#putting the character '%' after the number is useless
m0013=rəqəmin ardından '%' simvolunu qoymaq lazım deyil

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=parantez içindəki mətn = (xor), (bənd), (təkrarla), (son), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb dəyəri, onaltılıq və ya rəng adı qıvrım içində = [128,192,64] və ya [80c040] və ya [ff0] və ya [mavi]...

#Valid names
m0016=Etibarlı adlar

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Xüsusi formatlama əlavə etmək üçün abzasın əvvəlində iki "hashtag" ## ilə başlayan bir sətir əlavə edin və istədiyiniz kodları dərhal əlavə edin (kodların sırası əhəmiyyətli deyil).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Məsələn, təqdimat üçün sözləri təqdim edərkən, ikinci abzas qalın şəkildə, 15% daha böyük şrift ölçüsü və mavi rəngdə təqdim ediləcək. Digər abzaslar isə Tema parametrləri ilə normal şəkildə təqdim ediləcək.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Qeyd: İstifadə olunan mövzu artıq qalın olaraq konfiqurasiya edilibsə, bu xüsusi formatlama fərq yaratmayacaq.

#Some formatting examples
m0020=Bazı biçimlendirme örnekleri

#Bold and italic
m0021=Kalın ve italik

#25% bigger
m0022=%25 daha büyük

#italic and 5% lower
m0023=italik ve %5 daha küçük

#Uppercase and yellow
m0024=Büyük harf ve sarı

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Hansı sətirlərin xüsusi formatlamanın tətbiq olunacağını müəyyən etmək mümkündür.<br> Xüsusi formatlamanı tətbiq etmək istəmədiyiniz sətirin əvvəlində iki xətt <b>--</b> əlavə edin.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Məsələn, <b>"Amma hələ də azdır, bilirəm"</b> sətiri mövzunun orijinal formatını istifadə edəcək, digər sətirlər isə xüsusi formatlamanı (qalın və sarı) istifadə edəcək.

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Standart <code>##p</code> formatlamasını istifadə etmək üçün <code>##p</code> kodunu istifadə edə bilərsiniz.<br> <code>##p</code> ilə müəyyən edilmiş bütün abzaslar aşağıdakı sahədə müəyyən edilmiş formatlamanı istifadə edəcək.

#Default Custom Formatting
m0028=Standart Xüsusi Formatlama

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Hər bir siyahı Holyrics proqramının daxili qovluğunu təmsil edir: Səs, Video və Şəkil. Faylları əlavə etmək üçün: müvafiq sekmenin {0} ikonuna vurun, Windows-da qovluğu açın və faylları qovluğa yapışdırın. Proqramdakı siyahı qovluqdakı fayllarla avtomatik yenilənir (hər hansı bir təqdimat aktiv olmadıqda).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Not:</b> Klasördeki dosyaların adını değiştirmekten KAÇININ, çünkü bir çalma listesi, favoriler vb. için bir dosyaya kısayol oluşturursanız ve ardından klasörde adını değiştirirseniz, programdaki kısayol artık çalışmayacaktır, yeni bir kısayol oluşturmanız gerekecektir.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=Her bir klasörde (Ses, Video ve Resim), programda dosya listesi olacak başka klasörler oluşturabilirsiniz. Örneğin: <b>Resimler</b> klasörü içinde <b>Sunum</b> adında bir klasör oluşturabilir ve içine resimler ekleyebilirsiniz. Klasör, Holyrics programında bir liste öğesi olacak ve üzerine tıkladığınızda tüm resimler slayt gösterisi için açılacaktır.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Bu klasörler için masaüstünüzde bir kısayol ekleyebilirsiniz, <a href='http://addShortcutDesktop'>BURAYA</a> tıklayarak.

#Holyrics Library
m0033=Holyrics Kütüphanesi

#Displays the song lyric in uppercase.
m0034=Şarkı sözlerini büyük harfle gösterir.

#Enable/disable the underline in the song title at first slide.
m0035=İlk slaytın şarkı başlığında altı çizili olup olmadığını etkinleştir/etkisizleştir.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=<b>etkinleştirildiğinde</b>, program uzun satırları otomatik olarak kıracak, orijinal yazı boyutunu küçültmekten kaçınacaktır. <b>etkisizleştirildiğinde</b>, eğer slaytın kenarını aşan uzun bir satır varsa, program yazı boyutunu, tüm satır slaytın içinde kalana kadar küçültecektir.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Paragraf için <a href='http://customFormatting'>özel biçimlendirmeyi</a> etkinleştir/etkisizleştir.

#Enable/disable <b>Custom Background</b>.
m0038=<b>özel arka plan planını</b> etkinleştir/etkisizleştir.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>CANLI</b> paneli, ana projeksiyonda şu anda sunulanı gösterir.<br>(VLC Media Player tarafından yürütülen arka plan ve video panelde görünmez.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Əgər 'səhnə'də olanlar üçün xüsusi bir geri monitor istifadə edirsinizsə, yalnız bu monitor üçün mesajlar təqdim etmək üçün ünsiyyət panelindən istifadə edə bilərsiniz.<br>Görüntü parametrlərində bir monitoru <b>səhnə görünüşü</b> olaraq təyin edə bilərsiniz (ictimaiyyətin əsas monitoru istisna olmaqla) və ünsiyyət panelindəki mesajlar yalnız <b>səhnə görünüşü</b> olaraq təyin edilmiş monitorlarda göstəriləcək.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Sesin çalmasını sağlayın ve müzik çalarken sunulmasını istediğiniz slayta tıklayın.<br>Müziğin bir bölümünü duraklatabilir ve geri alarak kaldığınız yerden başlayabilirsiniz.<br>Ayrıca, yakalanan listeden bir öğeyi sağ tıklayarak silebilirsiniz.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Tıkladığınız ilk slayttan önce sunulacak slayt, düzenleme penceresinde tanımlanan slayttır.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Müziğin bölümünün başlamasını beklemeyin, belirli slayta tıklamak için birkaç milisaniye önceden tıklamaya çalışın, slaytlar arasındaki geçişte gecikmeleri önleyin.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=<b>Otomatik Sunum</b> ile her slaytın süresini bir MP3 ses dosyasıyla (örneğin bir çalma) entegre edebilirsiniz.<br>Oluşturulduktan sonra, istediğiniz herhangi bir temayı seçebilir ve sunuma başlayabilirsiniz.<br>Ses, Media Player tarafından çalınacak ve slaytlar müzik çalarken otomatik olarak gösterilecektir.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Başlangıç slaydını belirleyin</b> <i>Başlamak için</i> seçeneği ve başlangıç slaytının <i>süresi</i> (saniye cinsinden) ile.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Slaytları düzenleyin</b> yeni slaytlar eklemek için sağ tıklayarak ve slaytları sıralamak için sürükleyerek.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Her slaytın süresini belirleyin</b> (saniye cinsinden) <i>Süre</i> alanında. Slaytın ne zaman başlayacağını tam olarak değiştirmek için, dakikaları, saniyeleri ve milisaniyeleri gösteren metne tıklayabilirsiniz.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> müziği ilgili slayttan başlayarak şarkının sonuna kadar çalar.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> yalnızca ilgili slaytın bölümünü çalar.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Slaydların sırasını və hər birinin müddətini asanlaşdırmaq üçün <i>Çəkiliş Metodu</i> istifadə edə bilərsiniz.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=<i>Avtomatik Təqdimat</i> saxlayarkən, yaradılan fayl <b>[fayl adı].ap</b> artıq seçilmiş MP3 səsini daxil edəcək. Faylı <b>(*.ap)</b> ilə birlikdə səsi kopyalamaq barədə narahat olmağa ehtiyac yoxdur.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Təqdimat zamanı bəzi slaydların mətni redaktə edə bilərsiniz.<br> - Redaktə etmək istədiyiniz slayda sağ tıklayaraq (əsas pəncərənin altındakı slaydlar siyahısı);<br> - və ya hazırda göstərilən slaydı redaktə etmək üçün <b>SHIFT + F12</b> düymələrini basaraq.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Söhbət, Holyrics-in PC-də və mobil telefon üçün Holyrics tətbiqi arasında bir ünsiyyət vasitəsidir.<br>Şəbəkəyə qoşulmuş hər hansı bir mobil telefon tətbiq vasitəsilə söhbətə daxil ola bilər və PC-yə mesaj göndərə bilər.

#The selected presentation will run automatically.
m0054=Seçilmiş təqdimat avtomatik olaraq icra ediləcək.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Mesaja seçmək üçün tıklayın.<br>Bir mesajı siyahıda yenidən sıralamaq üçün sürükləyin.<br>Mesajın uyğun mesajını seçmək üçün mesajın əvvəlində vurğulanan düyməni basın. <b>(birinci şəkil)</b><br>Mesaja sağ tıklayaraq daha çox seçim üçün. <b>(ikinci şəkil)</b>

#You can change the background or Theme for each paragraph
m0056=Hər bir paragrafın fonunu və ya Mövzusunu dəyişə bilərsiniz

#by clicking the slide {0} icon
m0057=slaydın {0} ikonuna tıklayaraq

#dragging an item from themes list to the slide
m0058=mövzu siyahısından slayda bir elementi sürükləyərək

#or by right-clicking on the slide for more options
m0059=və ya slayda sağ tıklayaraq daha çox seçim üçün

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Diqqət!</b> Şəkil və ya videonu fon olaraq təyin edərkən, mətnin rəngi, hizalanma və s. kimi bütün parametrlər musiqi üçün seçilmiş Mövzudan olacaq. Buna görə də, musiqinin <b>standart mövzusu</b> dəyişdirilərkən diqqətli olun, çünki əvvəlcədən təyin edilmiş şəkil və videolar yeni seçilmiş mövzu ilə uyğun gəlməyə bilər.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=bu, sizə proqramı genişləndirilmiş rejimdə istifadə etməyə imkan verən bir funksiyadır, əlavə monitorlar qoşulmadan.<br>Öz monitorunuzda kiçik bir pəncərə göstərə bilər, real proyeksiyada nə olacağını simulyasiya edərək.

#Use examples
m0062=İstifadə nümunələri

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Evinizdə proqramı istifadə edirsiniz, əlavə bir monitor qoşulmayıb və təqdimatları başlamaq istəyirsiniz, amma tam ekran olmadan

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Proqramı genişləndirilmiş rejimdə istifadə etməyi öyrənmək istəyirsiniz, amma əlavə bir monitorunuz yoxdur

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Kompüteri yalnız slaydları wifi şəbəkəsi vasitəsilə yaymaq üçün istifadə edirsiniz, öz ekranınızda tam ekran görüntüsünü göstərmək mənasızdır

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=<b>Slayd Təsviri</b> funksiyası təqdimatın alt hissəsində slaydın tanınmasını asanlaşdırır.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Bir paragraf/slaydın təsviri, mətni redaktə pəncərəsində <b>Fərdi Formatlaşdırma</b> funksiyası ilə təyin edilir.

#Can be used for
m0068=İstifadə oluna bilər

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=<b>gedin</b> funksiyasında qısa yollar təyin edin, məsələn: <b><i>X</i></b> slaydına getmək <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=Standart bir Tema təyin edin, məsələn: bütün slaydlar <b><i>X</i></b> <b><i>X</i></b> Temasına sahib olacaq

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=Xüsusi formatlama, məsələn: bütün slaydlar <b><i>X</i></b> italik şriftlə

#<b>Go to</b> function shortcuts
m0072=<b>getmək</b> funksiyasının sistem qısa yolları

#Song presentation
m0073=Mahnı təqdimatı

#Other presentations
m0074=Digər təqdimatlar

#First paragraph of the song
m0075=Mahnının ilk abzası

#Second slide of presentation
m0076=Təqdimatın ikinci slaydı

#Last paragraph of the song
m0077=Mahnının son abzası

#Penultimate presentation slide
m0078=Təqdimatın əvvəlki slaydı

#First paragraph of the next song
m0079=Növbəti mahnının ilk abzası

#Next slide
m0080=Növbəti slayd

#First paragraph of the previous song
m0081=Ötən mahnının ilk abzası

#Previous slide
