#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=HTTP sorğuları yerinə yetirən və ya digər cihazlara MIDI kodları göndərən sevimli çubuğa və ya çalğı siyahısına əlavə etmək üçün maddələr yaratmaq mümkündür.\nBu, OBS Studio, işıqlandırma proqramı, PTZ kameraları və s. kimi digər proqramlarda və cihazlarda əməliyyatları yerinə yetirməyə imkan verir.\nMəsələn, icra edildikdə yayım proqramınızdakı səhnəni dəyişdirən bir maddə yaratmaq və ya şəbəkədəki PTZ kameranın presetini seçən bir maddə yaratmaq mümkündür.\nBu əməliyyatlar maddəyə klikləməklə və ya proqramın <b>Triggerlər</b> funksiyası vasitəsilə avtomatik olaraq yerinə yetirilə bilər.\nMəsələn, Holyrics proyeksiyada X görüntüsünü təqdim etdikdə, avtomatik olaraq yayım proqramınızdakı Y səhnəsinə keçid edən bir tetikleyici yaratmaq mümkündür.\nVə ya hər dəfə Müqəddəs Kitabdan bir ayə təqdim edildikdə, avtomatik olaraq yayım proqramınızdakı Z səhnəsinə keçid edən bir tetikleyici yaratmaq mümkündür.\nMultimedia komandasının işini asanlaşdıran və qənaət edən bir çox avtomatlaşdırma imkanları var.

