#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=<b>funksiya</b> rejimindəki eskalasiya köhnə standart rejimdən fərqli bir təşkilata malikdir.<br>Bu yeni təşkilat növündə siz (proqramın parametrlərində) xidmətin bütün funksiyalarını yaradırsınız və sonra hər bir funksiya üçün bir üzv təyin edirsiniz.<br><br>Köhnə rejimdə siz hər bir sətirdə bir <b>üzv</b> var və onun eskalasiya olunub-olunmadığını bir qutu işarələyərək müəyyən edirsiniz.<br><br>Yeni rejimdə (funksiya) siz hər bir sətirdə bir <b>funksiya</b> var və bu funksiya üçün hansı <b>üzv</b> eskalasiya olunduğunu müəyyən edirsiniz.

