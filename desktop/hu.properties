#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=A fejlesztési módban a JavaScript kód szinkronizálva van egy fájllal a program almappájában, és minden itt a programban végrehajtott módosítás mentésre kerül a fájlban, ahogyan minden külső módosítás a fájlban tükröződni fog a mentett és itt végrehajtott JavaScript kódon.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Ez lehetővé teszi, hogy a JavaScript kódot egy külső szerkesztő (az Ön által preferált IDE) szerkeszthesse, és a módosítások automatikusan tükröződnek itt a programban.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Figyelem: óvatosan használja ezt a módot, mivel ez azt jelenti, hogy a Holyrics-ben automatikusan végrehajtott JavaScript kód egy olvasható külső fájlon alapul, amelyet bármely más folyamat/program módosíthat a számítógépen.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=A mappa neve megváltoztatható, de kötelező, hogy tartalmazza az elem azonosítóját a név bármely részén.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=A Community fejlesztési módban a program egy almappáját használják a kiegészítő JavaScript kód tárolására, amely a JSCommunity kóddal együtt lesz betöltve, és minden külső módosítás a fájlban tükröződni fog a "jsc" kódon, amely itt a programban van betöltve és végrehajtva.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Ez lehetővé teszi olyan kódok létrehozását, amelyeket automatikusan használni fognak a "jsc"-vel kompatibilis struktúrában, anélkül, hogy a kódot refaktorálni kellene a GitHub-ra történő új implementációk és módosítások küldéséhez.

