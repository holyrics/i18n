#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Lehetőség van olyan tételek létrehozására, amelyek hozzáadódnak a kedvencekhez vagy a lejátszási listához, amelyek HTTP kéréseket hajtanak végre vagy MIDI kódokat küldenek más eszközökre.\nEz lehetővé teszi, hogy műveleteket hajtsanak végre más programokban és eszközökben, mint például az OBS Studio, világítási programok, PTZ kamerák stb.\nPéldául létrehozhat egy elemet, amely, amikor végrehajtják, megváltoztat egy jelenetet az adásprogramjában, vagy egy elemet, amely kiválaszt egy előbeállítást egy PTZ kamerán a hálózaton, stb.\nEzek a műveletek végrehajthatók az elemre kattintva, vagy automatikusan végrehajthatók a program <b>Trigger</b> funkcióján keresztül.\nPéldául létrehozhat egy triggert, hogy mindig, amikor a Holyrics az X képet mutatja a projekción, automatikusan váltson a Y jelenetre az adásprogramjában.\nVagy mindig, amikor egy bibliai verset mutat, automatikusan váltson a Z jelenetre az adásprogramjában.\nSok automatizálási lehetőség van, amelyek megkönnyítik és csökkentik a multimédia csapat munkáját.

