#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>A színpad nézete</b> egy beállítás, amely megváltoztatja a diák megjelenítését egy adott monitoron.<br>Ha van egy videokimenet a közönség által látott projekcióhoz, és van egy másik videokimenet a <b>színpadon</b> lévők számára, akkor a <b>visszajelző</b> monitort másképp állíthatja be, mint amit a közönség lát.<br>A közvetítés az alkalmazás számára szintén konfigurálható.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Jelölőnégyzet:</b> A dián lévő szöveg megváltoztatását határozza meg. Pl.: A következő diának az első sorát a jelenlegi dián a végén mutatja.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Nagybetűs:</b> Az összes szöveget nagybetűs formában jeleníti meg.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Sortörés eltávolítása:</b> A szöveget folyamatosan jeleníti meg, automatikusan sortörést végez a dia határain belül, és a lehető legnagyobb oldalsó teret foglalja el.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Személyre szabott téma:</b> Megváltoztatja a dia megjelenítési témáját.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Engedélyezés a Bibliához:</b> Engedélyezi a beállításokat a Biblia verseihez is (kivéve a jelölőnégyzet beállítását).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Megjegyzés: A videótémák nem működnek visszajelző monitorokon, csak a közönség monitorán.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Személyre szabott szerkesztést adhat hozzá a dal szövegének egy adott bekezdéséhez. Például a kórus betűméretének <b>arányos</b> növelése.<br>És egy azonosító szöveget is elhelyezhet (kórus, vers, stb...), amely csak a diák láblécében fog megjelenni.

#View example
m0009=Nézze meg a példát.

#This feature also works in the Quick Display window
m0010=Ez az opció a Gyors Bemutató ablakban is működik

#Available Settings
m0011=Elérhető beállítások

#All text in uppercase
m0012=Minden szöveg nagybetűs

#putting the character '%' after the number is useless
m0013=a '%' karaktert a szám után elhelyezni felesleges

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=szöveg zárójelben = (kórus), (vers), (ismétlés), (vég), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb érték, hexadecimális vagy szín neve zárójelek között = [128,192,64] vagy [80c040] vagy [ff0] vagy [kék]...

#Valid names
m0016=Érvényes nevek

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=A testreszabott formázás hozzáadásához adjon hozzá egy sort a bekezdés elejére, amely két "hashtag"-gel kezdődik ## és a kívánt kódokkal azonnal utána (a kódok sorrendje nem számít).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=A példában, amikor a szöveget vetítjük, a második bekezdés félkövér betűtípussal, 15%-kal nagyobb betűmérettel és kék színnel jelenik meg. A többi bekezdés normálisan jelenik meg a téma beállításaival.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Megjegyzés: Ha a használt téma már be van állítva félkövérre, például, akkor ez a testreszabott formázás nem fog különbséget tenni.

#Some formatting examples
m0020=Néhány példa a formázásra

#Bold and italic
m0021=Félkövér és dőlt

#25% bigger
m0022=25%-kal nagyobb

#italic and 5% lower
m0023=dőlt és 5%-kal kisebb

#Uppercase and yellow
m0024=Nagybetűs és sárga

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Meg lehet határozni, hogy mely sorok kapják meg a személyre szabott formázást.<br> Adjon hozzá két kötőjelet <b>--</b> a sor elejére, amelyre nem szeretné alkalmazni a személyre szabott formázást.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=A példában a <b>"De tudom, hogy ez még mindig kevés"</b> sor az eredeti téma formázását fogja használni, míg a többi sor a személyre szabott formázást (félkövér és sárga) fogja használni.

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=A <code>##p</code> kódot használhatja egy <b>alapértelmezett</b> formázás használatához.<br>Minden bekezdés, amelyet <code>##p</code> -vel definiáltak, a lenti mezőben meghatározott formázást fogja használni.

#Default Custom Formatting
m0028=Személyre szabott formázás alapértelmezett

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Minden lista a Holyrics program belső mappáit képviseli: Hang, Videó és Kép. Fájlok hozzáadásához: kattintson a megfelelő fül {0} ikonra a mappa megnyitásához a Windowsban, és másolja a fájlokat a mappába. A programban a lista automatikusan frissül a mappa fájljaival (kivéve, ha aktív bemutató van).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Megjegyzés:</b> ELKERÜLNI a fájlok átnevezését a mappában, mert ha parancsikont hoz létre egy fájlhoz egy lejátszási listában, könyvjelzőkben stb., és később átnevezi a mappában, a programban a parancsikon nem fog működni, új parancsikont kell létrehoznia.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=Minden mappában (Audio, Video és Kép) létrehozhat más mappákat, hogy fájlok listáját alkosson a programban. Például: Létrehozhat egy <b>Prezentáció</b> nevű mappát a <b>Képek</b> mappán belül, és képeket adhat hozzá. A mappa egy elem lesz a Holyrics program listájában, és ha rákattint, az összes kép megnyílik a diavetítéshez.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Hozzáadhat egy parancsikont ezekhez a mappákhoz az asztalán, ha rákattint <a href='http://addShortcutDesktop'>IDE</a>.

#Holyrics Library
m0033=Holyrics Könyvtár

#Displays the song lyric in uppercase.
m0034=A dal szövegét nagybetűs formában jeleníti meg.

#Enable/disable the underline in the song title at first slide.
m0035=A dal címének aláhúzása az első dián aktiválása/deaktiválása.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=A <b>bekapcsolt</b> opcióval a program automatikusan tördelni fogja a hosszú sorokat, elkerülve az eredeti betűméret csökkentését. A <b>kikapcsolt</b> opcióval, ha van egy hosszú sor, amely túllépi a dia szélét, a program csökkenti a betűméretet, amíg az egész sor bele nem fér a diába.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=A <a href='http://customFormatting'>személyre szabott formázás</a> aktiválása/deaktiválása.

#Enable/disable <b>Custom Background</b>.
m0038=A <b>személyre szabott háttér</b> aktiválása/deaktiválása.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=A <b>ÉLŐ</b> panel megmutatja, mi van jelenleg bemutatva a fő vetítésben.<br>(A VLC Media Player által futtatott háttér és videó nem jelenik meg a panelen.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Ha van egy visszajelző monitora, amely kizárólag a 'színpadon' lévők számára készült, használhatja a kommunikációs panelt, hogy üzeneteket mutasson csak ezen a monitoron.<br>A megjelenítési beállításokban beállíthat egy monitort <b>színpad nézet</b> -nek (kivéve a közönség fő monitorát), és a kommunikációs panelen megjelenő üzenetek csak a <b>színpad nézet</b> -ként beállított monitorokon fognak megjelenni.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Indítsa el a hanganyagot, és kattintson arra a diára, amelyet szeretne bemutatni, miközben a zene szól.<br>Megállíthatja és visszatekerheti a zene egy részét, hogy ott folytassa, ahol abbahagyta.<br>Az elemek listájából is törölhet egy elemet, ha jobb kattintással kattint rá.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=A dia, amelyet a legelsőként bemutatnak, az, amely a szerkesztő ablakban van beállítva.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Ne várja meg, hogy a dal részlete elkezdődjön, mielőtt rákattint a konkrét diára, próbáljon meg néhány ezredmásodperccel korábban rákattintani, elkerülve a késéseket a diák közötti átmenetben.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=A <b>Automatikus Prezentációval</b> beállíthatja minden dia időtartamát, amely egy MP3 hanganyaghoz van integrálva (például egy lejátszáshoz).<br>Miután létrehozta, bármilyen témát választhat, amit szeretne, és elindíthatja a prezentációt.<br>A hanganyagot a Media Player fogja lejátszani, és a diák automatikusan megjelennek, miközben a zene szól.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Határozza meg a kezdő diát</b> az <i>Kezdeni</i> opcióval és a kezdő dia <i>időtartamával</i> (másodpercben).

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Rendezze a diákot</b> jobb kattintással új diák hozzáadásához, és húzza a diákot a rendezéshez.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Határozza meg minden dia időtartamát</b> (másodpercben) az <i>Időtartam</i> mezőben. A dia kezdési időpontját is megváltoztathatja, ha rákattint a perceket, másodperceket és ezredmásodperceket mutató szövegre.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> a dalt a megfelelő diától a dal végéig játssza le.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> csak a megfelelő diának megfelelő részletet játssza le.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Használhatja a <i>Rögzítési Módszert</i> a diák sorrendjének és időtartamának megkönnyítésére.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Az <i>Automatikus Prezentáció</i> mentésekor a generált fájl <b>[fájl neve].ap</b> már tartalmazni fogja a kiválasztott MP3 hanganyagot. Nem kell aggódnia a hanganyag fájl <b>(*.ap)</b> melletti másolása miatt.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Bizonyos diák szövegét szerkesztheti, miközben bemutatják.<br> - Jobb kattintással kattintson arra a diára, amelyet szerkeszteni szeretne (a fő ablak alján lévő diák listája);<br> - vagy nyomja meg a <b>SHIFT + F12</b> billentyűt a jelenleg megjelenített dia szerkesztéséhez.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=A chat egy kommunikációs eszköz a Holyrics PC és a Holyrics mobilalkalmazás között.<br>Bármely csatlakoztatott mobiltelefon hozzáférhet a chathoz az alkalmazáson keresztül, és üzeneteket küldhet a PC-re.

#The selected presentation will run automatically.
m0054=A kiválasztott prezentáció automatikusan fog futni.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Kattintson az üzenetre a kiválasztásához.<br>Húzzon egy üzenetet a lista sorrendjének megváltoztatásához.<br>Írja be a kiemelt billentyűt az üzenet elejére, hogy kiválassza a megfelelő üzenetet. <b>(első kép)</b><br>Jobb kattintással kattintson az üzenetre további lehetőségekhez. <b>(második kép)</b>

#You can change the background or Theme for each paragraph
m0056=Megváltoztathatja a háttér vagy a téma minden bekezdés esetében.

#by clicking the slide {0} icon
m0057=a dia {0} ikonra kattintva

#dragging an item from themes list to the slide
m0058=egy téma lista elemének húzásával a diára

#or by right-clicking on the slide for more options
m0059=vagy jobb kattintással a diára további lehetőségekhez

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Figyelem!</b> Ha képet vagy videót állít be háttérként, akkor minden beállítás, mint a betűszín, igazítás stb. a kiválasztott téma szerint fog működni a dalhoz. Legyen óvatos a dal <b>alapértelmezett téma</b> módosításakor, mert a korábban beállított képek és videók nem biztos, hogy illeszkednek az újonnan kiválasztott témához.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=ez egy funkció, amely lehetővé teszi, hogy a programot úgy használja, mintha kiterjesztett módban lenne, még akkor is, ha nincsenek más monitorok csatlakoztatva.<br>Lehetősége van egy kis ablakot megjeleníteni a saját monitorján, szimulálva, hogy mi lenne látható a valós vetítésen.

#Use examples
m0062=Használati példák

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Otthon használja a programot, nincs csatlakoztatott segédmonitor, és szeretne bemutatókat indítani, de nem teljes képernyőn

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Meg szeretné tanulni a program kiterjesztett módjának használatát, de nincs segédmonitorja

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Csak a számítógépet használja a diák wifi hálózaton történő továbbítására, így a teljes képernyős megjelenítés feleslegessé válik a saját képernyőjén

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=A <b>Dia Leírása</b> funkció segíti a dia azonosítását a bemutató láblécében.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=A bekezdés/dia leírását a szöveg szerkesztő ablakában a <b>Testreszabott Formázás</b> funkció határozza meg.

#Can be used for
m0068=Használható a következőhöz

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=gyorsbillentyűk beállítása a <b>ugrás</b> funkcióhoz, pl.: <b><i>X</i></b> betű ugrás a <b><i>X</i></b> diára

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=alapértelmezett téma beállítása, pl.: minden dia <b><i>X</i></b> a <b><i>X</i></b> témát fogja használni

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=testreszabott formázás, pl.: minden dia <b><i>X</i></b> dőlt betűs

#<b>Go to</b> function shortcuts
m0072=A <b>ugrás</b> funkció rendszer gyorsbillentyűi

#Song presentation
m0073=Zenei bemutató

#Other presentations
m0074=Más bemutatók

#First paragraph of the song
m0075=A dal első bekezdése

#Second slide of presentation
m0076=A bemutató második diája

#Last paragraph of the song
m0077=A dal utolsó bekezdése

#Penultimate presentation slide
m0078=A bemutató utolsó diája

#First paragraph of the next song
m0079=A következő dal első bekezdése

#Next slide
m0080=Következő dia

#First paragraph of the previous song
m0081=A korábbi dal első bekezdése

#Previous slide
m0082=Előző dia

#Last displayed slide
m0083=Utolsó megjelenített dia

#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=ez egy funkció, amely lehetővé teszi kódok használatát, amelyeket a rendszer által meghatározott változó értékekre cserélnek, mint például: dátum és idő.<br>A használathoz egyszerűen írja be a kódot a szöveggel együtt. Működik szövegekben, figyelmeztetésekben, kommunikációs panelekben, ...

#of <b>all</b> songs<br>on the playlist.
m0085=a <b>minden</b> dalból<br>a lejátszási listában.

#of <b>played</b> songs<br>on the playlist.
