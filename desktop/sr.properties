#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Binski prikaz</b> je postavka koja menja prikaz slajdova na određenom monitoru. <br> Ako imate video izlaz za projekciju javnosti, a imate još jedan video izlaz za nekoga ko je na <b>bini</b> možete podesiti <b>povratni</b> monitor drugačije nego što se prikazuje u javnosti. <br> prenos aplikaciji je takođe podesiv.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Polje za potvrdu:</b> Podesite promenu u tekstu slajda. Npr: Prikaži prvu liniju sledećeg slajda na kraju sadašnjeg slajda.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Velika slova:</b> Prikazuje ceo tekst u formatu velikih slova.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Ukloni prelom reda</b> Prikazuje tekst u kontinuitetu, razbijanje linije automatski na granici slajda i uzimanje što više bočnog prostora moguće.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Prilagođena Tema:</b> Menja temu prikazanih slajdova.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Omogući za Bibliju:</b> Omogućava postavke za Biblijske stihove takođe (osim podešavanja polja za potvrdu).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Napomena: Video teme ne rade na binskim prikazima, već samo na podrazumevanim monitorima.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Možete da dodate prilagođene izmene na određenom paragrafu reči pesme. Na primer, <b>proporcionalno</b> povećanje  veličine fonta hora. <br> Takođe, staviti identifikacioni tekst (hor, stih, itd ...) koji će se pojaviti samo u podnožju slajda.

#View example
m0009=Prikaži primer

#This feature also works in the Quick Display window
m0010=Ova funkcija takođe radi u prozoru Brzi pregled

#Available Settings
m0011=Dostupne postavke

#All text in uppercase
m0012=Ceo tekst velikim slovima

#putting the character '%' after the number is useless
m0013=Stavljanje lika '%' posle broja je beskorisno

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=Tekst u zagradama = (hor), (stih), (ponavljanje), (konačno), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=RGB ili heksadecimalna vrednost ili ime boje u zagradama = [128,192,64] ili [80f040] ili [ff0] ili [plava] ...

#Valid names
m0016=Važeća imena

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Da biste dodali prilagođeno formatiranje, dodajte liniju na početku paragrafa koji počinje sa dva "Heš-taga" ## i kodove koje želite sledeće (redosled kodova nije bitan).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=U ovom primeru, tokom prikaza reči za projekciju, drugi paragraf će se pojaviti podebljan, sa veličinom fonta 15% veći i plavoj boji. Ostali paragrafi će se pojaviti sa podešavanjima teme.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Napomena: Ako je tema koja se koristi već postavljena na podebljan prikaz, na primer, ovo prilagođeno formatiranje neće praviti nikakvu razliku.

#Some formatting examples
m0020=Neki primeri formatiranja

#Bold and italic
m0021=Podebljan i iskošen

#25% bigger
m0022=25% veći

#italic and 5% lower
m0023=iskošen i 5% smanjen

#Uppercase and yellow
m0024=Velika slova i žuta

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Možete definisati koje linije će imati primeniti prilagođeno formatiranje.<br> Dodajte dve crtice <b>--</b> na početku linije na koje ne želite da primenite prilagođeno formatiranje.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=U ovom primeru, <b>"Mas ainda é pouco eu sei"</b> linija će koristiti originalno formatiranje teme, i druge linije će koristiti prilagođeno formatiranje (podebljano i žuta).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Možete koristiti <code>##s</code>, kod da koristite <b>standardno</b> formatiranje. Sve tačke definisane sa <code>##p</code> će koristiti formatiranje koje je definisano u polje ispod.

#Default Custom Formatting
m0028=Uobičajeno Prilagođeno Formatiranje

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Svaka lista predstavlja unutrašnju Holyrics fascikla: audio, video, i slike. Za dodavanje datoteka: Kliknite na {0} ikonu odgovarajuće kartice da biste otvorili fasciklu u operativnom sistemu Windows i kopirajte datoteke u fasciklu. Lista u programu se automatski ažurira sa datotekama u fascikli (osim ako je neka prezentacija aktivna)

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Napomena:</b> IZBEGAVAJTE preimenovanja datoteke u fascikli, jer ako kreirate prečicu do datoteke u Playlist-i, Omiljeno, itd i onda preimenujete ga u fascikli, prečica u programu neće više raditi, moraćete da kreirate novu prečicu.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=U svakoj fascikli (audio, video i slike), možete dodati nove fascikle da budu lista datoteka u programu. Na primer: Možete napraviti fasciklu pod nazivom <b>Prezentacija</b> unutar fascikle <b>slike</b> i dodati slike u nju. Fascikla će biti navedena u Holyrics interfejsu i klikom na nju otvara sve slike za slajdove.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Možete dodati prečicu do tih fascikli na radnoj površini tako što ćete kliknuti <a href='http://addShortcutDesktop'>OVDE</a>.

#Holyrics Library
m0033=Holyrics Biblioteka

#Displays the song lyric in uppercase.
m0034=Prikazuje reči pesama velikim slovima.

#Enable/disable the underline in the song title at first slide.
m0035=Omogući/onemogući podvlačenje u naslovu pesme na prvom slajdu.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Kada <b>omogućeno</b>, program će automatski prelomiti duge linije, izbegavajući da se smanji prvobitna veličina fonta. Kada <b>oemogućeno</b> ako imate duge linije koje štrče sa strane slajda, program će smanjiti veličinu fonta da cela linija bude unutar slajda.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Omogući/onemogući paragraf <a href='http://customFormatting'>prilagođeno formatiranje</a>.

#Enable/disable <b>Custom Background</b>.
m0038=Omogući/onemogući <b>Prilagođenu Pozadinu</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>Uživo</b> panel pokazuje šta se trenutno prikazane u podrazumevanom prikazu<br>. (Pozadina i video snimak od VLC Media Plejera se ne pojavljuju na panelu.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Ako koristite jedinstveni povratni monitor za one na "bini", možete koristiti komunikacijsku ploču da bi prikazali poruke samo na ovom monitoru. <br> U podešavanjima ekrana možete podesiti monitor kao <b>binski prikaz</b> (osim glavnog ekrana za publiku), kao i poruke u komunikacijskoj tabli će biti prikazane samo u monitorima postavljenim kao <b>binski pregled</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Pustite audio i kliknite na slajd koji želite da bude prikazan dok se pesma emituje. <br> Možete pauzirati i restartovati deo pesme da se nastavi odakle ste zaustavili. <br> Takođe, možete brisatistavku iz snimljene liste desnim klikom na njega.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Slajd koji će biti prikazan pre prvog slajda na koji kliknete je onaj koji je definisan u prozoru za uređivanje.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Nemojte očekivati da pokrenete sekciju pesama da kliknete na slajd, pokušajte da kliknete na slajd nekoliko hiljaditom delu sekunde pre, izbegavanje zastoja u tranziciji između slajdova.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Sa <b>Automatskom Prezentacijom</b> možete programirati trajanje svakog slajda ujedinjeno u MP3 audio (instrumentalna verzija, na primer). <br> Kada je napravljena, možete izabrati bilo koju temu koju želite i započne prezentacija. <br> zvuk će se pustiti od strane Media Plejera i slajdovi će se automatski prikazivati kada se pesma reprodukuje.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>obeleži početni slajd</b> sa <i>Započni</i> opcije i <i>trajanje</i> (u sekundama) od početnog slajda.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Podešavanje slajdova</b> desnim klikom dodati nove slajdove i prevući slajdove da ih sortiranje.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Podesite trajanje svakog slajda</b> (u sekundama) na terenu <i>Trajanje</i>. Takođe možete promeniti tačno vreme da se slajd počinje klikom na tekst koji prikazuje minute, sekunde, i milisekunde.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> pusti pesmu iz odgovarajućeg slajda do kraja pesme.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>| ► |</b> pusti samo deo odgovarajućeg slajda.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Možete koristiti <i>Slikaj metodu</i> da se stvori redosled slajdova i trajanje svakog.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Prilikom čuvanja <i>Automatske Prezentacije</i>, generisano <b>[ime datoteke] .ap</b> fajl će već uključivati izabrani MP3 audio. Ne morate da brinete o kopiranju zvuka zajedno sa <b>(*. Ap)</b> File.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Možete menjati tekst pojedinih slajdova, dok su prikazani. <br> - desnim klikom na slajd koji želite da izmenite (spisak slajdova u podnožju glavnog prozora), . <br> - ili pritiskom na <b>Shift+F2 da</b> da izmenite trenutno prikazan slajd.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Ćaskanje je sredstvo komunikacije između Holyrics Softvare i Holyrics aplikacija za mobilne uređaje. <br> Bilo koji smartphone povezan na mrežu može da pristupi ćaskanju preko poruka u aplikaciji i poslati ka računaru.

#The selected presentation will run automatically.
m0054=Izabrana prezentacija će se automatski pokrenuti.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Kliknite na poruku da bi je izabrali. <br>Prevucite poruku kako biste promenili redosled na listi. Unesite označeni ključ na početku poruke da izaberete odgovarajući poruku. <b>(prva slika)</b> Desni klik na poruku za više opcija. <b>(druga slika)</b>

#You can change the background or Theme for each paragraph
m0056=Možete da promenite pozadinu ili temu svakog pasusa

#by clicking the slide {0} icon
m0057=Klikom na slajd {0} ikonu

#dragging an item from themes list to the slide
m0058=Prevući stavku sa liste Teme na slajd

#or by right-clicking on the slide for more options
m0059=Ili desnim klikom na slajd za više opcija

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Upozorenje!</b> Prilikom postavljanja slika ili videa kao pozadine, sva podešavanja, kao što su boja fonta, poravnanje, itd će se čuvati kod izabrane teme pesme. Zato budite pažljivi prilikom promene <b>Podrazumevana Tema</b> pesme, jer je prethodno podešena slika i video ne odgovaraju na novu temu koju ste izabrali.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=To je funkcija koja vam omogućava da koristite softver kao da ste bili u proširenom režimu iako niste još jedan monitor prikačen <br> Možete prikazati mali prozor na svom monitoru, simulaciju šta će biti prikazano u stvarnoj projekciji. .

#Use examples
m0062=Primeri korišćenja

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Vi koristite program kod kuće, Sekundarni monitor  nije priključen i prezentacija želi da počne, ali ne preko celog ekrana

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Želite da naučite kako da koristite program u proširenom režimu, ali bez sekundarnog ekrana

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Koristite računar samo da emitujete slajdove kroz mrežu, što čini ekran beskorisnim na celom ekranu na vašem ekranu

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=<b>Opis slajda</b> karakteristika radi kao posrednik za identifikaciju slajda u podnožju prezentacije.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Opis paragrafa/slajda je definisan u prozoru lirskog uređivanje, u <b>Prilagođeno Formatirovanje</b> funkcija.

#Can be used for
m0068=Može se koristiti za

