m0069=Set prečica na <b>idi na</b> funkcija, npr: <b><i>k</i></b> slovo idi na slajd <b><i>k</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=Postavili podrazumevanu temu, npr: Sve <b><i>k</i></b> slajdovi će dobiti <b><i>k</i></b> tema

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=Prilagođeno formatiranje, na primer: svi <b><i>k</i></b> slajdovi sa Zakrivljeni</b>

#<b>Go to</b> function shortcuts
m0072=<b>Idite na</b> funkcije prečice

#Song presentation
m0073=Prezentacija pesme

