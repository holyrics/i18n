#Stage Display (as configured)
m0091=Binski ekran (kao konfigurisan)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=Možete uključiti linije kao <b>Komentar</b> u rečima pesama ili brze prezentacije.<br>Komentari će se pojaviti samo na binskom prikazu, kao što je podešeno u <b>Podešavanje Ekrana</b>.

#To define a line as a comment, start a line with "two slash" //
m0093=Da biste definisali liniju kao komentar, započnite liniju sa "dve crte" //

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=Podešavanje fonta boje i komentara može da se promeni u <b>Teme</b> prozoru za uređivanje.

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=Puštanje videa na više ekrana može preopteretiti kompjutersku obradu. Vodite računa i uzdržanost kada koristite ovu funkciju na niskim performansama računara.

#Error loading dictionary
m0096=Greška pri učitavanju rečnika

