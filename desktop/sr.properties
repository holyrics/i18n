#Development mode
m0894=Režim razvoja

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=U režimu razvoja, JavaScript kod se sinhronizuje sa datotekom u podfolderu programa i sve izmene napravljene ovde u programu će biti sačuvane u datoteci, kao i sve izmene napravljene spolja u datoteci će se odraziti u sačuvanom i izvršenom JavaScript kodu ovde u programu.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Ovo omogućava da se JavaScript kod uređuje putem spoljnog editora (IDE po vašem izboru) i izmene se automatski odražavaju ovde u programu.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Pažnja: budite oprezni prilikom korišćenja ovog režima, jer to znači da je JavaScript kod koji će se automatski izvršavati u Holyrics zasnovan na spoljnjoj datoteci koja se može uređivati od strane bilo kog drugog procesa/programa koji se izvršava na računaru.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=Ime foldera može biti promenjeno, samo je obavezno da sadrži id stavke na bilo kojem mestu u imenu.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=U režimu razvoja Community, koristi se podfolder programa za skladištenje dodatnog JavaScript koda koji će biti učitan zajedno sa kodom JSCommunity i sve izmene napravljene spolja u datoteci će se odraziti u "jsc" kodu učitanom i izvršenom ovde u programu.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Ovo omogućava kreiranje kodova koji će se automatski koristiti u strukturi kompatibilnoj sa "jsc", bez potrebe za refaktorisanje koda za slanje na GitHub sa novim implementacijama i izmenama.

