#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=<b>செயல்பாடு</b> முறையில் அளவீடு பழைய முறையுடன் ஒப்பிடும்போது வேறுபாடு உள்ளது.<br>இந்த புதிய அமைப்பில் நீங்கள் (பிரோகிராமின் அமைப்புகளில்) அமைச்சகத்தில் உள்ள அனைத்து செயல்பாடுகளையும் உருவாக்குகிறீர்கள், பின்னர் ஒவ்வொரு செயல்பாட்டிற்கும் ஒரு உறுப்பினரை வரையறுக்கிறீர்கள்.<br><br>பழைய முறையில், ஒவ்வொரு வரியிலும் ஒரு <b>உறுப்பினர்</b> உள்ளது மற்றும் அவர் எப்போது தேர்ந்தெடுக்கப்பட்டுள்ளார் என்பதை ஒரு சின்னத்தைச் சுட்டிக்காட்டி வரையறுக்கிறீர்கள்.<br><br>புதிய முறையில் (செயல்பாடு) ஒவ்வொரு வரியிலும் ஒரு <b>செயல்பாடு</b> உள்ளது மற்றும் எந்த <b>உறுப்பினர்</b> இந்த செயல்பாட்டிற்காக தேர்ந்தெடுக்கப்பட்டுள்ளது என்பதை வரையறுக்கிறீர்கள்.

