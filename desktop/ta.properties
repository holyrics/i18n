#If enabled, the person must enter an access token to respond to the poll.\nAfter creating the poll, you can generate tokens and distribute to participants.\nNote: Tokens are individual and are not reusable, you will need to generate and distribute a different token to each person.
m0250=இது செயல்படுத்தப்பட்டால், நபர் கருத்துக்கணிப்புக்கு பதிலளிக்க அணுகல் டோக்கனை வழங்க வேண்டும்.\nகருத்துக்கணிப்பை உருவாக்கிய பிறகு, நீங்கள் டோக்கன்களை உருவாக்கி பங்கேற்பாளர்களுக்கு வழங்கலாம்.\nகுறிப்பு: டோக்கன்கள் தனிப்பட்டவை மற்றும் மீண்டும் பயன்படுத்த முடியாது, ஒவ்வொரு நபருக்கும் வேறு டோக்கனை உருவாக்கி வழங்க வேண்டும்.

