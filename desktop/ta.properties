#The <b>BETA</b> versions of Holyrics software are for testing.<br>If you want to use them in production, be aware of the risks for using a version and features that have not been extensively tested yet.
m0216=Holyrics இன் <b>BETA</b> பதிப்புகள் சோதனைக்காகவே.<br>உதவிக்குறிப்புகளைப் பயன்படுத்த விரும்பினால், பரவலாக சோதிக்கப்படாத பதிப்பு மற்றும் செயல்பாடுகளைப் பயன்படுத்துவதற்கான ஆபத்திகளைப் புரிந்துகொள்ளுங்கள்.

#When saving a playlist, all linked files will be saved to the same file.<br>Song, announcement, audio, video, image, etc.<br>It is not necessary to save them separately.<br><br>Only the schedule WILL NOT be saved.
m0217=ஒரு பாடல் பட்டியலைச் சேமிக்கும்போது, அனைத்து இணைக்கப்பட்ட கோப்புகள் ஒரே கோப்பில் சேமிக்கப்படும்.<br>எழுத்து, அறிவிப்பு, ஒலி, வீடியோ, படம், மற்றும் பிற.<br>அவற்றைப் தனியாகச் சேமிக்க தேவையில்லை.<br><br>மட்டுமே அளவீடு சேமிக்கப்படாது.

