#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>மேடையின் காட்சி</b> என்பது குறிப்பிட்ட திரையில் ஸ்லைடுகளை காண்பிக்க மாற்றுகிறது.<br>நீங்கள் பொதுமக்கள் காணும் ஒளிப்படத்திற்கு வீடியோ வெளியீடு மற்றும் <b>மேடையில்</b> உள்ளவர்களுக்கு வேறு வீடியோ வெளியீடு இருந்தால், நீங்கள் <b>திரும்பும்</b> திரையை பொதுமக்களுக்கு காண்பிக்கும் விதமாக அமைக்கலாம்.<br>அப்ளிகேஷனுக்கு ஒளிபரப்பு செய்யவும் அமைக்கக்கூடியது.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>தேர்வு பெட்டி:</b> ஸ்லைடின் உரையில் மாற்றத்தை வரையறுக்கிறது. எடுத்துக்காட்டாக: அடுத்த ஸ்லைடின் முதல் வரியை தற்போதைய ஸ்லைடின் இறுதியில் காண்பிக்க.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>மூல எழுத்து:</b> உரையை முழுவதும் பெரிய எழுத்தில் காண்பிக்கிறது.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>வரிசை உடைப்பை நீக்கவும்:</b> உரையை தொடர்ச்சியாக காண்பிக்கிறது, ஸ்லைடின் எல்லை அடைந்தால் தானாக வரி உடைக்கிறது மற்றும் அதிகபட்ச பக்க இடத்தைப் பயன்படுத்துகிறது.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>தனிப்பயன் தீம்:</b> ஸ்லைடின் காட்சியை மாற்றுகிறது.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>பைபிளுக்கு செயல்படுத்தவும்:</b> பைபிளின் வசனங்களுக்கு அமைப்புகளை செயல்படுத்துகிறது (தேர்வு பெட்டியின் அமைப்பை தவிர).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=குறிப்பு: வீடியோ தீமைகள் திரும்பும் திரைகளில் செயல்படவில்லை, பொதுமக்கள் திரையில் மட்டுமே.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=ஒரு குறிப்பிட்ட வரியில் தனிப்பயன் பதிப்பைச் சேர்க்கலாம். எடுத்துக்காட்டாக, <b>சமவெளியில்</b> எழுத்தின் அளவை அதிகரிக்கவும்.<br>மேலும், ஒரு அடையாள உரையை (கோரை, வரி, முதலியன...) சேர்க்கலாம், இது ஸ்லைட்களின் அடிக்குறியில் மட்டுமே தோன்றும்.

#View example
m0009=எடுத்துக்காட்டு காண்க

#This feature also works in the Quick Display window
m0010=இந்த விருப்பம் விரைவு காட்சி ஜன்னலில் செயல்படுகிறது

#Available Settings
m0011=கிடைக்கக்கூடிய அமைப்புகள்

#All text in uppercase
m0012=எல்லா உரையும் பெரிய எழுத்தில்

#putting the character '%' after the number is useless
m0013=எண்ணிக்கைக்கு '%' எழுத்தை வைக்க வேண்டும் என்பது தேவையில்லை

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=கோஷ்டிகளில் உள்ள உரை = (குரல்), (பாடல்), (மீண்டும்), (முடிவு), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb மதிப்பு, ஹெக்சடெசிமல் அல்லது கோஷ்டிகளில் உள்ள நிறம் = [128,192,64] அல்லது [80c040] அல்லது [ff0] அல்லது [நீலம்]...

#Valid names
m0016=சரியான பெயர்கள்

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=ஒரு தனிப்பயனாக்கத்தைச் சேர்க்க, இரண்டு "ஹாஷ்டேக்" ## கொண்டு தொடங்கும் ஒரு வரியை பத்தியின் தொடக்கத்தில் சேர்க்கவும் மற்றும் விரும்பிய குறியீடுகளை உடனே சேர்க்கவும் (குறியீடுகளின் வரிசை முக்கியமல்ல).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=உதாரணமாக, காட்சிக்கு வரியை காட்சியளிக்கும்போது, இரண்டாவது பத்தி தடித்த எழுத்தில், எழுத்தின் அளவு 15% அதிகமாகவும் நீல நிறத்தில் காட்சியளிக்கப்படும். மற்ற பத்திகள் தீமையின் அமைப்புகளுடன் சாதாரணமாக காட்சியளிக்கப்படும்.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=குறிப்பு: தேர்ந்தெடுக்கப்பட்ட தீமை ஏற்கனவே தடித்ததாக அமைக்கப்பட்டால், இந்த தனிப்பயனாக்கம் வேறுபாடு ஏற்படுத்தாது.

#Some formatting examples
m0020=சில வடிவமைப்பு உதாரணங்கள்

#Bold and italic
m0021=தடிப்பு மற்றும் இத்தாலிய

#25% bigger
m0022=25% அதிகமாக

#italic and 5% lower
m0023=இத்தாலிய மற்றும் 5% குறைவாக

#Uppercase and yellow
m0024=முதன்மை எழுத்து மற்றும் மஞ்சள்

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=எந்த வரிகளுக்கு தனிப்பயன் வடிவமைப்பு பயன்படுத்தப்படும் என்பதை நீங்கள் வரையறுக்கலாம்.<br> தனிப்பயன் வடிவமைப்பை பயன்படுத்த விரும்பாத வரியின் தொடக்கத்தில் இரண்டு குறுக்குகள் <b>--</b> சேர்க்கவும்.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=உதாரணத்தில், <b>"ஆனால் இன்னும் குறைவாகவே எனக்கு தெரியும்"</b> வரி தலைப்பின் முந்தைய வடிவமைப்பைப் பயன்படுத்தும், மற்ற வரிகள் தனிப்பயன் வடிவமைப்பைப் (தடிப்பும் மஞ்சள்) பயன்படுத்தும்.

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=நீங்கள் <code>##p</code> குறியீட்டை பயன்படுத்தி <b>தரநிலை</b> வடிவமைப்பை பயன்படுத்தலாம்.<br> <code>##p</code> உடன் வரையறுக்கப்பட்ட அனைத்து பத்திகளும் கீழே உள்ள புலத்தில் வரையறுக்கப்பட்ட வடிவமைப்பைப் பயன்படுத்தும்.

#Default Custom Formatting
m0028=தனிப்பயன் தரநிலை வடிவமைப்பு

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=ஒவ்வொரு பட்டியலும் Holyrics செயலியின் உள்ளக கோப்புறையை பிரதிநிதித்துவப்படுத்துகிறது: ஒலி, வீடியோ மற்றும் படம். கோப்புகளைச் சேர்க்க: Windows இல் கோப்புறையை திறக்க தொடர்புடைய தாவலின் {0} ஐகானை கிளிக் செய்து கோப்புகளை அந்த கோப்புறையில் ஒட்டவும். செயலியில் உள்ள பட்டியல் தானாகவே கோப்புறையின் கோப்புகளுடன் புதுப்பிக்கப்படும் (எனினும், எந்தவொரு காட்சி செயல்பாட்டும் செயல்பாட்டில் இருந்தால்).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>குறிப்பு:</b> கோப்புறையில் கோப்புகளை மறுபெயரிடுவது தவிர்க்கவும், ஏனெனில் நீங்கள் ஒரு இசை பட்டியலில், விருப்பங்களில், மற்றும் பிறவற்றில் ஒரு கோப்புக்கு குறுக்கு இணைப்பு உருவாக்கினால், பின்னர் கோப்புறையில் அதை மறுபெயரிட்டால், செயலியில் குறுக்கு இணைப்பு வேலை செய்யாது, நீங்கள் புதிய குறுக்கு இணைப்பை உருவாக்க வேண்டும்.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=ஒவ்வொரு கோப்புறையிலும் (ஒலி, வீடியோ மற்றும் படம்), நீங்கள் செயலியில் கோப்புகளின் பட்டியலாக இருக்கும் மற்ற கோப்புறைகளை உருவாக்கலாம். எடுத்துக்காட்டாக: நீங்கள் <b>பிரதிபலிப்பு</b> என்ற கோப்புறையை <b>படங்கள்</b> கோப்புறையின் உள்ளே உருவாக்கலாம் மற்றும் அதில் படங்களைச் சேர்க்கலாம். அந்த கோப்புறை Holyrics செயலியில் பட்டியலின் ஒரு உருப்படியாக இருக்கும் மற்றும் அதில் கிளிக் செய்தால் அனைத்து படங்களும் ஸ்லைடாக திறக்கப்படும்.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=இந்த கோப்புறைகளுக்கு உங்கள் மேசையில் ஒரு குறுக்கு இணைப்பைச் சேர்க்கலாம் <a href='http://addShortcutDesktop'>இங்கே</a> கிளிக் செய்து.

#Holyrics Library
m0033=Holyrics நூலகம்

#Displays the song lyric in uppercase.
m0034=பாடலின் வரிகளை பெரிய எழுத்தில் காட்டு.

#Enable/disable the underline in the song title at first slide.
m0035=முதல் ஸ்லைடின் பாடலின் தலைப்பில் கீழே வரி இயக்கவும்/நிறுத்தவும்.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=<b>செயல்படுத்தப்பட்ட</b> விருப்பத்துடன், செயலி நீண்ட வரிகளை தானாகவே உடைக்கிறது, எழுத்தின் அசல் அளவை குறைக்காமல். <b>இயக்கு</b> விருப்பத்துடன், ஸ்லைடின் பக்கத்தை கடந்த நீண்ட வரி இருந்தால், செயலி எழுத்தின் அளவை குறைத்து, வரி முழுவதும் ஸ்லைடில் உள்ளதுவரை குறைக்கிறது.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=<b>தனிப்பயன்</b> பத்தி வடிவமைப்பை இயக்கவும்/நிறுத்தவும்.

#Enable/disable <b>Custom Background</b>.
m0038=தனிப்பயன் <b>பின்னணி திட்டம்</b> ஐ இயக்கவும்/நிறுத்தவும்.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>நேரில்</b> உள்ள குழு தற்போது பிரதிபலிக்கப்படும் என்பதை காட்டுகிறது.<br>(VLC மீடியா பிளேயர் மூலம் இயக்கப்படும் பின்னணி மற்றும் வீடியோ குழுவில் தோன்றாது.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=நீங்கள் 'மேடை' இல் உள்ளவர்களுக்கு தனிப்பட்ட திரையைப் பயன்படுத்தினால், நீங்கள் தொடர்பு குழுவில் உள்ள தகவல்களை மட்டும் அந்த திரையில் காட்டலாம்.<br>காட்சியின் அமைப்புகளில், நீங்கள் ஒரு திரையை <b>மேடை பார்வை</b> ஆக வரையறுக்கலாம் (பொதுமக்கள் முதன்மை திரையை தவிர), மற்றும் தொடர்பு குழுவில் உள்ள தகவல்கள் <b>மேடை பார்வை</b> ஆக வரையறுக்கப்பட்ட திரைகளில் மட்டுமே காட்டப்படும்.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=ஒலியை வாசிக்க வைக்கவும் மற்றும் பாடல் வாசிக்கும்போது நீங்கள் காட்ட விரும்பும் ஸ்லைடில் கிளிக் செய்யவும்.<br>நீங்கள் பாடலின் ஒரு பகுதியை நிறுத்தி, மீண்டும் தொடங்கலாம்.<br>நீங்கள் பட்டியலில் இருந்து ஒரு உருப்படியை வலது கிளிக்கவும் நீக்கலாம்.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=நீங்கள் கிளிக் செய்யும் முதல் ஸ்லைடுக்கு முன்பு காட்டப்படும் ஸ்லைடு, தொகுப்பில் வரையறுக்கப்பட்டதாகும்.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=பாடலின் குறிப்பிட்ட பகுதியை தொடங்குவதற்காக ஸ்லைடில் கிளிக்க காத்திருக்க வேண்டாம், ஸ்லைடில் சில மில்லியன்கள் முன்பே கிளிக் செய்ய முயற்சிக்கவும், ஸ்லைடுகளுக்கிடையிலான மாற்றத்தில் தாமதங்களைத் தவிர்க்கவும்.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=<b>தானியங்கி காட்சி</b> உடன், நீங்கள் ஒலியுடன் இணைக்கப்பட்ட ஒவ்வொரு ஸ்லைடின் கால அளவைக் திட்டமிடலாம் (ஒரு playback, எடுத்துக்காட்டாக).<br>உருவாக்கப்பட்ட பிறகு, நீங்கள் விரும்பும் எந்த தலைப்பையும் தேர்ந்தெடுத்து காட்சியைத் தொடங்கலாம்.<br>ஒலி மீடியா பிளேயர் மூலம் இயக்கப்படும் மற்றும் பாடல் வாசிக்கப்படும் போது ஸ்லைடுகள் தானாகவே காட்சியளிக்கப்படும்.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>தொடக்க ஸ்லைட்டை வரையறுக்கவும்</b> <i>தொடங்கவும்</i> மற்றும் தொடக்க ஸ்லைட்டின் <i>கால அளவு</i> (வினாடிகளில்) உடன்.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>ஸ்லைடுகளை ஒழுங்குபடுத்தவும்</b> புதிய ஸ்லைடுகளைச் சேர்க்க வலது கிளிக்கவும் மற்றும் ஸ்லைடுகளை இழுத்து ஒழுங்குபடுத்தவும்.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>ஒவ்வொரு ஸ்லைடின் கால அளவைக் குறிப்பிடவும்</b> (வினாடிகளில்) <i>கால அளவு</i> புலத்தில். நீங்கள் ஸ்லைடு தொடங்கும் நேரத்தை சரியாக மாற்றவும், நிமிடங்கள், வினாடிகள் மற்றும் மில்லியன்களைப் காட்டும் உரையில் கிளிக் செய்யலாம்.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> பாடலின் தொடக்க ஸ்லைடிலிருந்து பாடலின் இறுதிவரை வாசிக்கிறது.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> ஸ்லைடின் தொடர்புடைய பகுதியை மட்டும் வாசிக்கிறது.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=ஸ்லைடுகளின் வரிசையை உருவாக்குவதற்காக <i>பிடிப்பு முறை</i> ஐ பயன்படுத்தலாம்.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=<i>தானியங்கி காட்சி</i> ஐச் சேமிக்கும் போது, உருவாக்கப்படும் கோப்பு <b>[கோப்பின் பெயர்].ap</b> தேர்ந்தெடுக்கப்பட்ட MP3 ஒலியுடன் சேர்க்கப்படும். நீங்கள் <b>(*.ap)</b> கோப்புடன் ஒலியை நகலெடுக்க வேண்டும் என்று கவலைப்பட வேண்டாம்.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=நீங்கள் சில ஸ்லைட்களின் உரையை அவற்றின் காட்சியின் போது தொகுக்கலாம்.<br> - நீங்கள் தொகுக்க விரும்பும் ஸ்லைடில் வலது கிளிக்கவும் (முதன்மை ஜன்னலின் கீழே உள்ள ஸ்லைடுகளின் பட்டியல்);<br> - அல்லது தற்போது காட்சியளிக்கப்படும் ஸ்லைடைக் தொகுக்க <b>SHIFT + F12</b> ஐ அழுத்தவும்.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=சாட் என்பது Holyrics கணினி மற்றும் மொபைல் Holyrics செயலியின் இடையே தொடர்பு கொள்ளும் ஒரு வழியாகும்.<br>நெட்வொர்க்கில் இணைக்கப்பட்ட எந்த மொபைல் சாதனமும் செயலியின் மூலம் சாட் அணுகலாம் மற்றும் கணினிக்கு செய்திகளை அனுப்பலாம்.

#The selected presentation will run automatically.
m0054=தேர்ந்தெடுக்கப்பட்ட காட்சி தானாகவே இயக்கப்படும்.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=செய்தியை தேர்ந்தெடுக்க கிளிக் செய்யவும்.<br>ஒரு செய்தியை இழுத்து பட்டியலில் மறுபடியும் ஒழுங்குபடுத்தவும்.<br>செய்தியின் தொடக்கத்தில் குறிப்பிடப்பட்ட விசையைத் தட்டவும், தொடர்புடைய செய்தியைத் தேர்ந்தெடுக்கவும். <b>(முதல் படம்)</b><br>மேலும் விருப்பங்களுக்கு செய்தியில் வலது கிளிக்கவும். <b>(இரண்டாவது படம்)</b>

#You can change the background or Theme for each paragraph
m0056=நீங்கள் ஒவ்வொரு பத்தியின் பின்னணி அல்லது தலைப்பை மாற்றலாம்.

#by clicking the slide {0} icon
m0057=ஸ்லைடின் {0} ஐகானில் கிளிக் செய்து.

#dragging an item from themes list to the slide
m0058=தீம்களின் பட்டியலிலிருந்து ஒரு உருப்படியை ஸ்லைடுக்கு இழுத்து.

#or by right-clicking on the slide for more options
m0059=அல்லது ஸ்லைடில் வலது கிளிக்கவும் மேலும் விருப்பங்களுக்கு.

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>கவனிக்கவும்!</b> பின்னணி படத்தை அல்லது வீடியோவை அமைக்கும்போது, எழுத்தின் நிறம், ஒழுங்கு போன்ற அனைத்து அமைப்புகளும் இசைக்கான தேர்ந்தெடுக்கப்பட்ட தீமின் அடிப்படையில் இருக்கும். எனவே, இசையின் <b>முதன்மை தீமை</b> மாற்றும்போது கவனமாக இருங்கள், ஏனெனில் முந்தைய அமைக்கப்பட்ட படங்கள் மற்றும் வீடியோக்கள் புதிய தேர்ந்தெடுக்கப்பட்ட தீமுடன் பொருந்தாது.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=இது நீங்கள் இணைக்கப்பட்ட மற்ற திரைகள் இல்லாமல் நீட்டிக்கப்பட்ட முறையில் செயலியைப் பயன்படுத்த அனுமதிக்கும் ஒரு செயல்பாடு.<br>உங்கள் சொந்த திரையில் ஒரு சிறிய சாளரம் காட்சியளிக்கலாம், இது உண்மையான ஒளிப்பரப்பில் காட்சியளிக்கப்படும் என்பதைப் போலவே.

#Use examples
m0062=பயன்பாட்டு எடுத்துக்காட்டுகள்

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=நீங்கள் வீட்டில் செயலியைப் பயன்படுத்துகிறீர்கள், இணைக்கப்பட்ட துணை திரை இல்லை மற்றும் முழு திரை காட்சியில் அல்லாமல் காட்சிகளைத் தொடங்க விரும்புகிறீர்கள்.

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=நீங்கள் நீட்டிக்கப்பட்ட முறையில் செயலியைப் பயன்படுத்த கற்றுக்கொள்ள விரும்புகிறீர்கள், ஆனால் இணைக்கப்பட்ட துணை திரை இல்லை.

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=நீங்கள் உங்கள் சொந்த திரையில் முழு திரை காட்சியில் காட்சியளிக்காமல், ஸ்லைடுகளை Wi-Fi நெட்வொர்க் மூலம் ஒளிபரப்புவதற்காக மட்டுமே கணினியைப் பயன்படுத்துகிறீர்கள்.

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=<b>ஸ்லைடு விளக்கம்</b> செயல்பாடு, காட்சியின் அடிக்குறியில் ஸ்லைட்டை அடையாளம் காண உதவியாக செயல்படுகிறது.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=ஒரு பத்தி/ஸ்லைடின் விளக்கம் <b>தனிப்பயனாக்கப்பட்ட வடிவமைப்பு</b> செயல்பாட்டால் உரை திருத்த சாளரத்தில் அமைக்கப்படுகிறது.

#Can be used for
m0068=பயன்படுத்தலாம்

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=<b>செல்ல</b> செயல்பாட்டில் சுருக்கங்களை அமைக்கவும், உதாரணமாக: எழுத்து <b><i>X</i></b> செல்ல <b><i>X</i></b> காட்சிக்கு

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=ஒரு முதன்மை தீமை அமைக்கவும், உதாரணமாக: அனைத்து ஸ்லைடுகள் <b><i>X</i></b> <b><i>X</i></b> தீமையைப் பெறும்.

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=தனிப்பயனாக்கப்பட்ட வடிவமைப்பு, உதாரணமாக: அனைத்து ஸ்லைடுகள் <b><i>X</i></b> இல் இட்டாலிக் எழுத்து.

#<b>Go to</b> function shortcuts
m0072=<b>செல்ல</b> செயல்பாட்டின் அமைப்புகள்

#Song presentation
m0073=இசை காட்சி

#Other presentations
m0074=மற்ற காட்சிகள்

#First paragraph of the song
m0075=இசையின் முதல் பத்தி

#Second slide of presentation
m0076=காட்சியின் இரண்டாவது ஸ்லைடு

#Last paragraph of the song
m0077=இசையின் கடைசி பத்தி

#Penultimate presentation slide
m0078=காட்சியின் முன்னணி ஸ்லைடு

#First paragraph of the next song
m0079=அடுத்த இசையின் முதல் பத்தி

#Next slide
m0080=அடுத்த ஸ்லைடு

#First paragraph of the previous song
m0081=முந்தைய இசையின் முதல் பத்தி

#Previous slide
m0082=முந்தைய ஸ்லைடு

#Last displayed slide
m0083=காட்சியளிக்கப்பட்ட கடைசி ஸ்லைடு

#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=இது மாறுபட்ட மதிப்புகளைப் பயன்படுத்துவதற்கான குறியீடுகளைப் பயன்படுத்துவதற்கான செயல்பாடு, உதாரணமாக: தேதி மற்றும் நேரம்.<br>பயன்படுத்த, குறியீட்டை உரையின் உடன் உள்ளிடவும். இது பாடல்களில், எச்சரிக்கைகளில், தொடர்பு குழுவில் செயல்படுகிறது.

#of <b>all</b> songs<br>on the playlist.
m0085=<b>எல்லா</b> இசைகளின்<br>பாடல்களின் பட்டியலில்.

#of <b>played</b> songs<br>on the playlist.
m0086=<b>விளையாடப்பட்ட</b> இசைகளின்.

#of <b>not played</b> songs<br>on the playlist.
m0087=<b>விளையாடப்படாத</b> இசைகளின்.

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=கூட்டத்தில் பொறுப்பான உறுப்பினர்<br>கூட்டம்/நிகழ்ச்சி மற்றும்<br>தேர்ந்தெடுக்கப்பட்ட உறுப்பினர்களின் பட்டியல்.

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>தலைப்பு மற்றும் கலைஞர்</b> அடுத்த இசை<br> <b>விளையாடப்பட்டது</b> எனக் குறிக்கப்படவில்லை<br>பாடல்களின் பட்டியலில்.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>தலைப்பு</b> அடுத்த இசை<br> <b>விளையாடப்பட்டது</b> எனக் குறிக்கப்படவில்லை<br>பாடல்களின் பட்டியலில்.

#Stage Display (as configured)
m0091=திரும்பும் திரை (அமைப்பின் படி)

#You can include lines like <b>comment</b> in the song lyrics or quick presentation.<br>Comments will only appear on stage displays, as setted in <b>Display Settings</b>.
m0092=நீங்கள் பாடல் அல்லது விரைவான காட்சியின் உரையில் <b>கருத்து</b> போன்ற வரிகளைச் சேர்க்கலாம்.<br>கருத்துகள் திரும்பும் திரைகளில் மட்டுமே காட்சியளிக்கப்படும், <b>காட்சியின் அமைப்புகள்</b> இல் குறிப்பிடப்பட்டுள்ளவாறு.

#To define a line as a comment, start a line with "two slash" //
m0093=ஒரு வரியை கருத்தாக அமைக்க, வரியை "இரு பட்டைகள்" // கொண்டு தொடங்கவும்.

#The color and comment font settings can be changed in <b>Themes</b> edit window.
m0094=கருத்தின் நிறம் மற்றும் எழுத்தின் அமைப்புகள் <b>தீமைகள்</b> திருத்த சாளரத்தில் மாற்றலாம்.

#Running video across multiple screens can overload computer processing.<br>Take care and restraint when using this feature on low-performing computers.
m0095=பல திரைகளில் வீடியோ இயக்குவது கணினியின் செயலாக்கத்தை அதிகரிக்கலாம்.<br>குறைந்த செயல்திறனுள்ள கணினிகளில் இந்த செயல்பாட்டைப் பயன்படுத்தும்போது கவனமாகவும், மிதமானதாகவும் இருங்கள்.

#Error loading dictionary
m0096=அகராதியை ஏற்றுவதில் பிழை.

#The program will be closed to apply the changes.\nClick OK and open the program again.
m0097=மாற்றங்களைப் பயன்படுத்துவதற்காக செயலி முடிக்கப்படும்.\nOK ஐ கிளிக் செய்து செயலியை மீண்டும் திறக்கவும்.

#ffmpeg file not found.
m0098=ffmpeg கோப்பு காணப்படவில்லை.

#Unable to identify video duration.
m0099=வீடியோவின் கால அளவை அடையாளம் காண முடியவில்லை.

#Unable to identify video resolution.
m0100=வீடியோவின் தீர்வை அடையாளம் காண முடியவில்லை.

#Error starting process.
m0101=செயல்முறையை தொடங்குவதில் பிழை.

#Check the files and try again.
m0102=கோப்புகளை சரிபார்க்கவும் மற்றும் மீண்டும் முயற்சிக்கவும்.

#Process has been interrupted
m0103=செயல்முறை நிறுத்தப்பட்டது

#Converting video
m0104=வீடியோவை மாற்றுகிறது

#Converting video to gif
m0105=வீடியோவை gif ஆக மாற்றுகிறது

#Extracting image from the video
m0106=வீடியோவிலிருந்து படத்தை எடுக்கிறது

#Invalid duration
m0107=தவறான கால அளவு

#Extracting images from the video
m0108=வீடியோவிலிருந்து படங்களை எடுக்கிறது

#Resizing video
m0109=வீடியோவை மறுசீரமைக்கிறது

#(Access denied) Could not save the file in the chosen destination.
m0110=(அணுகல் மறுக்கப்பட்டது) தேர்ந்தெடுக்கப்பட்ட இடத்தில் கோப்பை எழுத முடியவில்லை.

#Starts presentation of the item that are in the current <b>media</b> tab of <b>playlist</b> at the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0111=தற்போதைய <b>மீடியா</b> தாவலின் <b>பிளேலிஸ்ட்</b> இல் உள்ள உருப்படியின் காட்சியைத் தொடங்குகிறது.<br>"intensidade" மதிப்பு பட்டியலில் உள்ள உருப்படியை (1, 2, 3...) வரையறுக்கிறது.

#Starts presentation of the song lyrics that are in the current <b>playlist</b> in the main window (right area).<br>The value "intensity" defines which item in the list (1, 2, 3...)
m0112=தற்போதைய <b>பிளேலிஸ்ட்</b> இல் உள்ள பாடலின் வரியை காட்சியளிக்க தொடங்குகிறது.<br>"intensidade" மதிப்பு பட்டியலில் உள்ள உருப்படியை (1, 2, 3...) வரையறுக்கிறது.

#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=செயலின் குறியீட்டை இயக்கும்போது <b>ஸ்லைடுக்கு செல்ல...</b> செயலி "intensidade" என்ற மதிப்பின் அடிப்படையில் ஸ்லைட்டை காட்டு.<br>அதாவது, "intensidade" மதிப்பு 3 என்றால், தற்போதைய காட்சி மூன்றாவது ஸ்லைட்டை காட்டு.<br>இது பாடலின் மூன்றாவது ஸ்லைடு, படங்களின் மூன்றாவது படம், மற்றும் இதர...<br>இந்த நடவடிக்கை ஒரு காட்சியை தொடங்காது, இது <b>முன்னதாக தொடங்கிய</b> காட்சியின் ஸ்லைட்டை மட்டுமே மாற்றுகிறது.

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=காட்சி ஒரு பாடலின் வரி என்றால், எண்ணிக்கை பாடலின் முதல் பத்தியில் இருந்து தொடங்குகிறது. <b>தலைப்பு மற்றும் கலைஞர்</b> உடன் ஸ்லைடு எண் பூஜ்யமாகும்.

#A 32bit version of Java was not found.
m0115=32பிட்ஸ் Java பதிப்பு கண்டுபிடிக்கப்படவில்லை.

#<b>VLC Media Player</b> files were not found, check Holyrics installation files.
m0116=<b>VLC Media Player</b> இன் கோப்புகள் கண்டுபிடிக்கப்படவில்லை, செயலியின் நிறுவல் கோப்புகளை சரிபார்க்கவும்.

#Could not initialize the <b>VLC Media Player</b>
m0117=<b>VLC Media Player</b> ஐ ஆரம்பிக்க முடியவில்லை

#To use the audio and video features of the program, install the <b>VLC Media Player</b> on your computer.
m0118=பொருளின் ஒலி மற்றும் வீடியோ வசதிகளைப் பயன்படுத்த, உங்கள் கணினியில் <b>VLC Media Player</b> ஐ நிறுவவும்.

#After install <b>VLC Media Player</b>, restart the program.
m0119=<b>VLC Media Player</b> ஐ நிறுவிய பிறகு, செயலியை மறுதொடக்கம் செய்யவும்.

#Some YouTube links may not work because they are copyright protected.<br>(songs clips usually do not work)
m0120=சில YouTube இணைப்புகள் காப்புரிமை பாதுகாப்பால் செயல்படாது.<br>(பாடல்களின் கிளிப்புகள் பொதுவாக செயல்படாது)

#All selected themes will have <b>only</b> the selected items below changed.<br>The other settings will be available for editing, but will be discarded.<br>For example: if the <b>size</b> option was selected but the <b>font color</b> option was NOT selected, you can change the font color in the edit, but the Themes <b>will not</b> have the font color changed, only the <b>size</b>.
m0121=தேர்ந்தெடுக்கப்பட்ட அனைத்து தீமைகளும் <b>மட்டுமே</b> கீழே உள்ள உருப்படிகளை மாற்றும்.<br>மற்ற அமைப்புகள் திருத்தத்திற்காக கிடைக்கும், ஆனால் அவை கைவிடப்படும்.<br>உதாரணமாக: <b>அளவு</b> விருப்பம் தேர்ந்தெடுக்கப்பட்டால் ஆனால் <b>எழுத்தின் நிறம்</b> தேர்ந்தெடுக்கப்படவில்லை என்றால், நீங்கள் திருத்தத்தில் எழுத்தின் நிறத்தை மாற்றலாம், ஆனால் தீமைகள் <b>எழுத்தின் நிறத்தை மாற்றாது</b>, வெறும் <b>அளவையே</b>.

#Unsupported action
m0122=ஆசை ஆதரிக்கப்படவில்லை

#Creating images
m0123=படங்களை உருவாக்குகிறது

#Creating video
m0124=வீடியோ உருவாக்குகிறது

#Preparing background
m0125=பின்புலத்தை தயார் செய்க

#The Program is already updated.
m0126=செயலி ஏற்கனவே புதுப்பிக்கப்பட்டுள்ளது.

#Update available
m0127=புதுப்பிப்பு கிடைக்கிறது

#Download the file <a href='http://download'><b>Holyrics-dep.zip</b></a> and extract the files in the <a href='http://openJarPath'>program folder</a> replacing the current files.
m0128=கோப்பை <a href='http://download'><b>Holyrics-dep.zip</b></a> பதிவிறக்கம் செய்து, தற்போதைய கோப்புகளை மாற்றி <a href='http://openJarPath'>செயலியின் கோப்புறையில்</a> வெளியிடவும்.

#Close the program before replace the file.
m0129=கோப்பை மாற்றுவதற்கு முன் செயலியை மூடவும்.

#Developed by
m0130=உருவாக்கப்பட்டது

#Use the '#' character to format the message variable or left blank to use the text in original form.
m0131=செய்தியின் மாறியை வடிவமைக்க '#' எழுத்துக்களைப் பயன்படுத்தவும் அல்லது முதன்மை உரையைப் பயன்படுத்த வெற்றிடமாக வைக்கவும்.

#It's possible add a values list for multiple choice, getting the values between #[...] and separating them with semicolons.
