#Incoming requests will be redirected to this JavaScript function first. You can implement your own custom actions/responses if needed. If the method returns <b>true</b>, the program will execute the request according to the standard implementation available in the documentation. Any return other than <b>true</b> will be used by the program as a request response.
m0429=பெறப்பட்ட கோரிக்கைகள் முதலில் இந்த JavaScript செயல்பாட்டிற்கு மறுசீரமைக்கப்படும். நீங்கள் தேவையானால் உங்கள் சொந்த செயல்பாடுகள்/பதில் கையாளல்களை செயல்படுத்தலாம். முறை <b>true</b> என்றால், செயலி இயல்பான செயல்பாட்டின் அடிப்படையில் கோரிக்கையை செயல்படுத்தும். <b>true</b> க்கு மாறுபட்ட எந்தவொரு திருப்பமும், செயலி அதை கோரிக்கையின் பதிலாக பயன்படுத்தும்.

#API to perform actions and requests in the Holyrics program over the local network or over the internet.\nAll HLY methods available in the JSLIB documentation can be used.\nAccess the documentation for more details.
