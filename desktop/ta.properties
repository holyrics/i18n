#To create the video with the Themes defined for each paragraph you need to select a <b>non-video Theme</b> in the option just above.<br>If you select a video Theme, the created video will use only that Theme.<br>In this creation method it is not possible to use one video per slide. If there are slides defined with videos, they will be treated as images.
m0219=கவனிக்கவும்: ஒவ்வொரு பத்திக்கும் நீங்கள் வரையறுக்கப்பட்ட தலைப்புகளை உருவாக்க வீடியோவை உருவாக்க, நீங்கள் <b>வீடியோ அல்லாத</b> தலைப்பை மேலே உள்ள விருப்பத்தில் தேர்ந்தெடுக்க வேண்டும்.<br>நீங்கள் வீடியோ தலைப்பை தேர்ந்தெடுத்தால், உருவாக்கப்படும் வீடியோ முழுவதும் அந்த தலைப்பைப் பயன்படுத்தும்.<br>இந்த உருவாக்க முறையில் ஒவ்வொரு பத்திக்கும் வீடியோவைப் பயன்படுத்த முடியாது. வீடியோக்களுடன் வரையறுக்கப்பட்ட பத்திகள் இருந்தால், அவை படங்களாகக் கருதப்படும்.

