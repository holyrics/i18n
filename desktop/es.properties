#When executing the action code <b>go to slide...</b> the program will display the slide based on the number passed by the value "intensity" of the code.<br>That is, if the "intensity" value is 3, the current presentation will display the third slide running.<br>It can be the third slide of a song lyric, the third image of a list of images, etc...<br>This action does not start a presentation, it only changes the slide of a <b>started presentation</b>.
m0113=Al ejecutar el código de acción <b>ir a la diapositiva...</b> el programa mostrará la diapositiva basada en el número pasado por el valor "intensidad" del código.<br>Es decir, si el valor de "intensidad" es 3, la presentación actual mostrará la tercera diapositiva en ejecución.<br>Puede ser la tercera diapositiva de una letra de música, la tercera imagen de una lista de imágenes, etc ...<br>Esta acción no inicia una presentación, sólo cambia la diapositiva de una presentación <b>recién iniciada</b>.

#If the presentation is a song lyric, the numbering starts counting from the first paragraph of the lyrics. The slide with the <b>title and artist</b> is the slide number zero.
m0114=Si la presentación es una letra de música, la numeración comienza a contar desde el primer párrafo de la letra de la canción. La diapositiva con el <b>título y el artista</b> es la diapositiva de número cero.

