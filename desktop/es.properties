#The schedule in <b>role</b> mode has a different organization from the old standard mode.<br>In this new type of organization you create (in the program settings) all the roles that exist in the group and then you define a member for a role.<br> <br>In the old mode you have one <b>member</b> per line and define whether it is scheduled or not, by checking a box.<br> <br>In the new mode (role) you have one <b>role</b> per line and define which <b>member</b> is assigned to this role.
m0213=La escala en modo <b>función</b> tiene una organización diferente al modo estándar antiguo.<br>En este nuevo tipo de organización, crea (en la configuración del programa) todas las funciones que existen en el ministerio y luego define un miembro para cada función.<br><br>En el modo antiguo, tiene un <b>miembro</b> en cada línea y define si está escalado o no, marcando una casilla.<br><br>En el nuevo modo (función), tiene una <b>función</b> en cada línea y define qué <b>miembro</b> está escalado para esta función.

