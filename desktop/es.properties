#Development mode
m0894=Modo de desarrollo

#In development mode, the JavaScript code is synchronized with a file in the program's subfolder, and any changes made here in the program will be saved to that file. Similarly, any changes made externally to the file will be reflected in the JavaScript code saved and executed here in the program.
m0895=En el modo de desarrollo, el código JavaScript se sincroniza con un archivo en la subcarpeta del programa y cualquier cambio realizado aquí en el programa se guardará en el archivo, así como cualquier cambio realizado externamente en el archivo se reflejará en el código JavaScript guardado y ejecutado aquí en el programa.

#This allows the JavaScript code to be edited by an external editor (the IDE of your choice) and the changes automatically reflected here in the program.
m0896=Esto permite que el código JavaScript sea editado por un editor externo (la IDE de su preferencia) y los cambios se reflejen automáticamente aquí en el programa.

#Warning: Be careful when using this mode, as it means that the JavaScript code that will be automatically executed in Holyrics is based on a readable external file that can be edited by any other process/program running on the computer.
m0897=Atención: tenga cuidado al utilizar este modo, ya que significa que el código JavaScript que se ejecutará en Holyrics de forma automática se basa en un archivo externo legible que puede ser editado por cualquier otro proceso/programa en ejecución en la computadora.

#The folder name can be changed, but it is mandatory to include the item ID somewhere in the name.
m0898=El nombre de la carpeta puede ser cambiado, solo es obligatorio que contenga el id del ítem en cualquier lugar del nombre.

#In Community development mode, a subfolder of the program is used to store additional JavaScript code that will be loaded along with the JSCommunity code, and any changes made externally to the file will be reflected in the "jsc" code loaded and executed here in the program.
m0899=En el modo de desarrollo de Community, se utiliza una subcarpeta del programa para almacenar el código JavaScript adicional que se cargará junto con el código JSCommunity y cualquier cambio realizado externamente en el archivo se reflejará en el código "jsc" cargado y ejecutado aquí en el programa.

#This allows you to create code that will be automatically used in the "jsc" compatible framework, without needing to refactor the code to submit it to GitHub with new implementations and changes.
m0900=Esto permite crear códigos que se utilizarán automáticamente en la estructura compatible con "jsc", sin necesidad de refactorizar el código para enviarlo a GitHub con nuevas implementaciones y cambios.

