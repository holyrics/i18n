#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Visión de escenario</b> es una configuración que cambia la visualización de las diapositivas a un monitor específico.<br>Si tienes una salida de vídeo para la proyección vista por el público y tienes otra salida de vídeo para quien está en el <b>escenario</b>, puedes configurar el monitor de <b>retorno</b> de forma diferente a la que se muestra al público.<br>La transmisión a la aplicación también es configurable.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Caja de selección:</b> Establece un cambio en el texto de la diapositiva. Ej.: Presentar la primera línea de la siguiente diapositiva al final de la diapositiva actual.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Mayúscula:</b> Presenta todo el texto en mayúscula.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Eliminar salto de líneas:</b> Presenta el texto de forma continua, generando un salto de línea automáticamente en el limite de la diapositiva y ocupando el máximo espacio lateral posible.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Tema Personalizado:</b> Cambia el tema de exhibición de la diapositiva.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>Habilitar para Biblia:</b> Habilita las configuraciones también para versículos de la Biblia (excepto la configuración de la caja de selección).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Obs.: Temas de vídeo no funcionan en pantallas de escenario, solamente en la pantalla del público.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Puedes añadir una edición personalizada para un párrafo específico de la letra. Por ejemplo, aumentar <b>proporcionalmente</b> el tamaño de la fuente del estribillo.<br>Y también poner un texto de identificación (coro, verso, etc...) que aparecerá solamente en el pie de página de la diapositiva.

#View example
m0009=Ver ejemplo

#This feature also works in the Quick Display window
m0010=Esta funcionalidad también funciona en la ventana de Presentación Rápida

#Available Settings
m0011=Configuraciones disponibles

#All text in uppercase
m0012=Todo el texto en mayúscula

#putting the character '%' after the number is useless
m0013=poner el carácter '%' después del número es innecesario

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=texto dentro de paréntesis = (coro), (verso), (repetir), (final), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=valor rgb, hexadecimal o nombre del color dentro de corchetes = [128,192,64] o [80c040] o [ff0] o [azul]...

#Valid names
m0016=Nombres válidos

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Para añadir un formato personalizado, añade una línea en el inicio del párrafo comenzando con dos "hashtags" ## y los códigos que desees luego en seguida (El orden de los códigos no importa).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=En el ejemplo, al presentar la letra para proyección, el segundo párrafo se presentará en negrita, con el tamaño de la fuente 15% más grande y el color azul. Los otros párrafos se presentarán normalmente con la configuración del Tema.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Nota: Si el tema utilizado ya está configurado en negrita, por ejemplo, este formato personalizado no tendrá ningún efecto.

#Some formatting examples
m0020=Algunos ejemplos de formatación

#Bold and italic
m0021=Negrita y cursiva

#25% bigger
m0022=25% más grande

#italic and 5% lower
m0023=Cursiva y 5% menos

#Uppercase and yellow
m0024=Mayúsculo y amarillo

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Es posible definir a qué líneas se aplicará el formato personalizado.<br> Añadir dos guiones <b>--</b> al inicio de la línea que deseas aplicar el formato personalizado.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=En el ejemplo, la línea <b>"Mas ainda é pouco, eu sei"</b> utilizará la formatación original del tema, y las demás líneas utilizarán la formatación personalizada (Negrita y amarillo).

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Puedes utilizar el código <code>##p</code> para utilizar un formato <b>estándar</b>.<br>Todos los párrafos definidos con <code>##p</code> utilizarán el formato definido en el campo debajo.

#Default Custom Formatting
m0028=Formato Personalizado Estándar

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Cada lista representa una carpeta interna del programa Holyrics: Audio, Vídeo e Imagen. Para añadir archivos: Haz clic en el ícono {0} de la respectiva pestaña para abrir la carpeta en Windows y pega los archivos en la carpeta. La lista en el programa se actualiza automáticamente con los archivos de la carpeta (excepto si alguna presentación está activada).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Nota:</b> EVITE cambiar el nombre de los archivos en la carpeta, ya que si crea un acceso directo a un archivo en una lista de reproducción, favoritos, etc. y luego cambiar el nombre de la carpeta, el acceso directo en el programa ya no funcionará, tendrá que crear un nuevo acceso directo.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=En cada una de las carpetas (Audio, Vídeo e Imagen), puede crear otras carpetas para ser una lista de archivos en el programa. Por ejemplo: Puedes crear una carpeta llamada <b>Presentación</b> dentro de la carpeta de <b>Imágenes</b> y agregar imágenes en ella. La carpeta será un elemento de la lista en el programa Holyrics y al hacer clic en ella todas las imágenes se abrirán para la presentación de diapositivas.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Puedes agregar un acceso directo a estas carpetas en su escritorio haciendo clic <a href='http://addShortcutDesktop'>AQUÍ</a>.

#Holyrics Library
m0033=Biblioteca Holyrics

#Displays the song lyric in uppercase.
m0034=Muestra la letra de la canción en mayúscula.

#Enable/disable the underline in the song title at first slide.
m0035=Activa/desactiva el subrayado en el título de la canción de la primera diapositiva.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=Con la opción <b>activada</b>, el programa va a hacer el ajuste de las líneas largas automáticamente, evitando disminuir el tamaño original de la fuente. Con la opción <b>desactivada</b>, si tiene alguna línea larga que supere el lateral de la diapositiva, el programa disminuirá el tamaño de la fuente hasta que toda la línea quede dentro de la diapositiva.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Activa/desactiva el <a href='http://customFormatting'>formato personalizado</a> de párrafo.

#Enable/disable <b>Custom Background</b>.
m0038=Activa/desactiva el <b>fondo de pantalla personalizado</b>.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=El panel <b>EN DIRECTO</b> muestra lo que se está presentando actualmente en la proyección principal.<br>(El fondo y el vídeo que ejecuta VLC Media Player no aparecen en el panel.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Si utiliza un monitor de retorno exclusivo para quien está en el 'escenario', puede utilizar el panel de comunicación para mostrar mensajes sólo en este monitor.<br>En la configuración de visualización, puede definir un monitor como <b>visión del escenario</b> (excepto el monitor principal del público), y los mensajes del panel de comunicación sólo se mostrarán en los monitores definidos como <b>visión del escenario</b>.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Coloque el audio para tocar y haga clic en la diapositiva que desea que aparezca mientras la canción está tocando.<br>Usted puede pausar y volver un tramo de la música para reanudar desde donde se detuvo.<br>También puede eliminar un elemento de la lista de captura haciendo clic con el botón derecho del ratón.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=La diapositiva que será presentada antes de la primera diapositiva que hagas clic es la que está definida en la ventana de edición.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=No espere iniciar el tramo de la canción para hacer clic en la diapositiva específica, busque hacer clic en la diapositiva algunos milésimas de segundo antes, evitando retrasos en la transición entre las diapositivas.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=Con <b>Presentación Automática</b> puede programar la duración de cada diapositiva integrada a un audio MP3 (un instrumental, por ejemplo).<br>Después de crear, puede elegir cualquier tema que desee e iniciar la presentación.<br>El audio se ejecutará por el Reproductor y las diapositivas se mostrarán automáticamente mientras se toca la canción.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Defina la diapositiva inicial</b> con la opción <i>Iniciar con</i> y la <i>duración</i> (en segundos) de la diapositiva inicial.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Organiza las diapositivas</b> haciendo clic con el botón derecho para añadir nuevas diapositivas y arrastra las diapositivas para ordenarlas.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Defina la duración de cada diapositiva</b> (en segundos) en el campo <i>Duración</i>. También puede cambiar el tiempo exacto en que la diapositiva se inicia haciendo clic en el texto que muestra los minutos, segundos y milisegundos.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> toca la música desde la diapositiva correspondiente hasta el final de la canción.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> toca sólo el tramo de la diapositiva correspondiente.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Puede utilizar el <i>Método de captura</i> para facilitar la creación del orden de las diapositivas y la duración de cada una.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Al guardar la <i>Presentación Automática</i>, el archivo generado <b>[nombre de archivo].ap</b> ya incluirá el audio MP3 seleccionado. Usted no tiene que preocuparse de copiar el audio junto con el archivo <b>(*.ap)</b>.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Puedes editar el texto de determinadas diapositivas mientras se están presentando:<br>  - Haciendo clic con el botón derecho en la diapositiva que deseas editar (lista de diapositivas en el pie de la ventana principal);<br>  - O presionando <b> MAYÚS + F2 </b> para editar la diapositiva que se muestra actualmente.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=El chat es un medio de comunicación entre Holyrics en el equipo y la aplicación Holyrics para móvil.<br>Cualquier celular conectado a la red podrá acceder al chat por la aplicación y enviar mensajes al equipo.

#The selected presentation will run automatically.
m0054=La presentación seleccionada se ejecutará automáticamente.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Haga clic en el mensaje para seleccionarlo.<br>Arrastre un mensaje para reordenarlo en la lista.<br>Escribe la tecla resaltada al principio del mensaje para seleccionar el mensaje correspondiente. <b>(primera imagen)</b><br>Haga clic con el botón derecho en el mensaje para más opciones. <b>(segunda imagen)</b>

#You can change the background or Theme for each paragraph
m0056=Puede cambiar el fondo o el TEMA de cada párrafo.

#by clicking the slide {0} icon
m0057=haciendo clic en el icono {0} de la diapositiva

#dragging an item from themes list to the slide
m0058=arrastrando un elemento de la lista de temas a la diapositiva

#or by right-clicking on the slide for more options
m0059=o haciendo clic con el botón derecho en la diapositiva para más opciones

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>¡Atención!</b> Al definir la imagen o el vídeo como fondo de pantalla, todas las configuraciones como color de fuente, alineación, etc. serán del Tema seleccionado para la canción. Entonces cuidado al cambiar el <b>Tema estándar</b> de la canción, ya que las imágenes y los vídeos configurados anteriormente no pueden coincidir con el nuevo tema seleccionado.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=es una función que le permite utilizar el programa como si estuviera en modo extendido aunque no tenga otros monitores conectados.<br>Puede mostrar una pequeña ventana en su propio monitor, simulando lo que se mostraría en la proyección real.

#Use examples
m0062=Ejemplos de uso

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Usted está utilizando el programa en casa, no tiene un monitor auxiliar conectado y te gustaría iniciar presentaciones pero no a pantalla completa

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Usted quiere aprender a utilizar el programa en modo extendido pero no tiene un monitor auxiliar

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Usted utiliza el equipo sólo para transmitir las diapositivas a través de la red wifi, haciendo inútil la visualización a pantalla completa en su propia pantalla

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=La funcionalidad <b>Descripción de la diapositiva</b> sirve como facilitador para identificar la diapositiva en el pie de presentación.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=La descripción de un párrafo/diapositiva se define en la ventana de edición de la letra, por la función <b>Formato Personalizado</b>.

#Can be used for
m0068=Puede ser utilizado para

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=Definir accesos directos en la función <b>ir para</b>, ej.: letra <b><i>X</i></b> ir a la diapositiva <b><i>X</i></b>

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=definir un Tema estándar, por ejemplo, todas las diapositivas <b><i>X</i></b> tendrán el Tema <b><i>X</i></b>

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=formato personalizado, ej.:  todas las diapositivas <b><i>X</i></b> con la fuente cursiva</b>

#<b>Go to</b> function shortcuts
m0072=Accesos directos del sistema de la función <b>ir para</b>

