#It is possible to create items to add to the favorites bar or playlist that execute HTTP requests or send MIDI codes to other devices.\nThis allows you to perform actions on other programs and devices such as OBS Studio, lighting program, PTZ cameras, etc.\nFor example, you can create an item that, when executed, changes a scene in your broadcast program, or an item that selects a preset from a PTZ camera on the network, etc.\nThese actions can be performed by clicking on the item or also performed automatically through the program's <b>Triggers</b> functionality.\nFor example, you can create a trigger so that whenever Holyrics presents the X image in the projection, it automatically changes to the Y scene in your broadcast program.\nOr whenever you present a Bible verse, it automatically switches to the Z scene in your broadcast program.\nThere are many automation possibilities that facilitate and save the work of the multimedia team.
m0372=Es posible crear elementos para agregar en la barra de favoritos o en la lista de reproducción que realizan solicitudes HTTP o envían códigos MIDI a otros dispositivos.\nEsto permite realizar acciones en otros programas y dispositivos, como OBS Studio, programa de iluminación, cámaras PTZ, etc.\nPor ejemplo, es posible crear un elemento que, cuando se ejecuta, cambia una escena en su programa de transmisión, o un elemento que selecciona un preset de una cámara PTZ en la red, etc.\nEstas acciones pueden ser ejecutadas haciendo clic en el elemento o también ejecutadas automáticamente a través de la funcionalidad <b>Gatillos</b> del programa.\nPor ejemplo, es posible crear un gatillo para que siempre que el Holyrics presente la imagen X en la proyección, cambie automáticamente a la escena Y en su programa de transmisión.\nO siempre que presente un versículo de la Biblia, cambie automáticamente a la escena Z en su programa de transmisión.\nHay muchas posibilidades de automatización que facilitan y ahorran trabajo al equipo de multimedia.

