#<b>Stage View</b> is a setting that changes the display of slides to a specific monitor.<br>If you have a video output for a public view projection, and you have another video output for someone who is on <b>stage</b>, you can set the <b>return</b> monitor differently than which is being shown to the public.<br>The transmission to the application is also configurable.
m0001=<b>Sahne Görünümü</b>, slaytların belirli bir monitörde görüntülenmesini değiştiren bir ayardır.<br>Eğer izleyicinin gördüğü projeksiyon için bir video çıkışınız varsa ve <b>sahne</b>'de olanlar için başka bir video çıkışınız varsa, <b>geri</b> monitörünü izleyiciye gösterilenlerden farklı bir şekilde yapılandırabilirsiniz.<br>Uygulamaya aktarım da yapılandırılabilir.

#<b>Checkbox:</b> Set a change in the slide text. E.g: Display the first line of the next slide at the end of the current slide.
m0002=<b>Seçim Kutusu:</b> Slayt metninde bir değişiklik tanımlar. Örneğin: Bir sonraki slaytın ilk satırını mevcut slaytın sonunda göstermek.

#<b>Uppercase:</b> Displays the entire text in upper case.
m0003=<b>Büyük Harf:</b> Tüm metni büyük harfle gösterir.

#<b>Remove line break:</b> Displays text continuously, breaking line automatically at the limit of the slide and taking up as much side space as possible.
m0004=<b>Satır sonunu kaldır:</b> Metni sürekli olarak gösterir, slaytın sınırında otomatik olarak satır sonu verir ve mümkün olan en fazla yan alanı kaplar.

#<b>Custom Theme:</b> Changes the slides display theme.
m0005=<b>Özel Tema:</b> Slaytın görüntüleme temasını değiştirir.

#<b> Enable for Bible:</b> Enables the settings for Bible verses too (except the checkbox setting).
m0006=<b>İncil için etkinleştir:</b> Ayetler için ayarları da etkinleştirir (seçim kutusu ayarı hariç).

#Note: Video themes do not work on stage displays, only on the default monitor.
m0007=Not: Video temaları geri monitörlerde çalışmaz, yalnızca izleyici monitöründe.

#You can add a custom edition to a specific paragraph of the lyric. For example, increase <b>proportionally</b> the choir font size.<br>And also put an identification text (chorus, verse, etc ...) that will appear only in the slide footer.
m0008=Belirli bir şarkı sözünün paragrafına özel bir düzenleme ekleyebilirsiniz. Örneğin, koro metninin <b>orantılı olarak</b> yazı tipini büyütmek.<br>Ayrıca, yalnızca slaytların alt kısmında görünecek bir tanımlama metni (koro, dize, vb...) ekleyebilirsiniz.

#View example
m0009=Örneği gör

#This feature also works in the Quick Display window
m0010=Bu seçenek Hızlı Sunum penceresinde de çalışır

#Available Settings
m0011=Mevcut ayarlar

#All text in uppercase
m0012=Tüm metin büyük harfle

#putting the character '%' after the number is useless
m0013=Sayının ardından '%' karakterini koymak gereksizdir

#text within parentheses = (chorus), (verse), (repeat), (final), ...
m0014=parantez içindeki metin = (koro), (dize), (tekrar), (son), ...

#rgb or hexadecimal value or color name inside brackets = [128,192,64] or [80c040] or [ff0] or [blue]...
m0015=rgb, onaltılık veya köşeli parantez içinde renk adı = [128,192,64] veya [80c040] veya [ff0] veya [mavi]...

#Valid names
m0016=Geçerli isimler

#To add a custom formatting, add a line at the beginning of the paragraph starting with two "hashtags" ## and the codes that you want next (the order of the codes does not matter).
m0017=Özel bir biçimlendirme eklemek için, paragrafın başına iki "hashtag" ## ile başlayan bir satır ekleyin ve ardından istediğiniz kodları ekleyin (kodların sırası önemli değildir).

#In the example, when displaying the lyric for projection, the second paragraph will appear in bold, with the font size 15% larger and in blue color. The other paragraphs will usually appear with Theme settings.
m0018=Örnekte, projeksiyon için şarkı sözlerini sunarken, ikinci paragraf kalın olarak, yazı boyutu %15 daha büyük ve mavi renkte sunulacaktır. Diğer paragraflar Tema ayarlarıyla normal olarak sunulacaktır.

#Note: If the theme used is already set to bold, for example, this custom formatting will not make any difference.
m0019=Not: Kullanılan tema zaten kalın olarak ayarlanmışsa, bu özel biçimlendirme fark yaratmayacaktır.

#Some formatting examples
m0020=Bazı formatlama örnekleri

#Bold and italic
m0021=Kalın ve italik

#25% bigger
m0022=%25 daha büyük

#italic and 5% lower
m0023=italik ve %5 daha küçük

#Uppercase and yellow
m0024=Büyük harf ve sarı

#You can define which lines will have custom formatting applied.<br>  Add two dashes <b>--</b> at the beginning of the line that you do not want to apply the custom formatting.
m0025=Hangi satırlara özel formatlamanın uygulanacağını belirleyebilirsiniz.<br> Özel formatlama uygulamak istemediğiniz satırın başına iki tire <b>--</b> ekleyin.

#In the example, the <b>"Mas ainda é pouco eu sei"</b> line will use the original formatting of the theme, and other lines will use custom formatting (bold and yellow).
m0026=Örnekte, <b>"Ama yine de az biliyorum"</b> satırı, temanın orijinal formatını kullanacak ve diğer satırlar özel formatlamayı (kalın ve sarı) kullanacaktır.

#You can use the <code>##p</code> code to use <b>standard</b> formatting.<br>All paragraphs defined with <code>##p</code> will use the formatting defined in the field below.
m0027=Standart bir <b>formatlama</b> kullanmak için <code>##p</code> kodunu kullanabilirsiniz.<br> <code>##p</code> ile tanımlanan tüm paragraflar, aşağıdaki alanda tanımlanan formatlamayı kullanacaktır.

#Default Custom Formatting
m0028=Standart Özel Formatlama

#Each list represents an internal Holyrics folder: Audio, Video, and Image. To add files: Click the {0} icon of the respective tab to open the folder in Windows and paste the files into the folder. The list in the program is automatically updated with the files in the folder (unless some presentation is active).
m0029=Her liste, Holyrics programının iç klasörlerini temsil eder: Ses, Video ve Resim. Dosya eklemek için: İlgili sekmedeki {0} simgesine tıklayın, Windows'ta klasörü açın ve dosyaları klasöre yapıştırın. Programdaki liste, klasördeki dosyalarla otomatik olarak güncellenir (aktif bir sunum varsa hariç).

#<b>Note:</b> AVOID renaming the files in the folder, because if you create a shortcut to a file in a playlist, favorites, etc. and then rename it in the folder, the shortcut in the program will no longer work, you will need to create a new shortcut.
m0030=<b>Not:</b> Klasördeki dosyaların adını değiştirmekten KAÇININ, çünkü bir çalma listesinde, favorilerde vb. bir dosya için kısayol oluşturursanız ve ardından klasörde adını değiştirirseniz, programdaki kısayol çalışmayacaktır, yeni bir kısayol oluşturmanız gerekecektir.

#In each folder (Audio, Video and Image), you can add new folders to be a list of files in the program. For example: You can create a folder named <b>Presentation</b> inside the folder <b>Images</b> and add images to it. The folder will be listed has a item in Holyrics interface and clicking on it will open all images for the slide show.
m0031=Her bir klasörde (Ses, Video ve Resim), programda dosya listesi oluşturmak için başka klasörler oluşturabilirsiniz. Örneğin: <b>Resimler</b> klasörü içinde <b>Sunum</b> adında bir klasör oluşturabilir ve içine resimler ekleyebilirsiniz. Klasör, Holyrics programındaki liste öğesi olacak ve üzerine tıkladığınızda tüm resimler slayt sunumu için açılacaktır.

#You can add a shortcut to these folders on your desktop by clicking <a href='http://addShortcutDesktop'>HERE</a>.
m0032=Bu klasörler için masaüstünüzde bir kısayol ekleyebilirsiniz, <a href='http://addShortcutDesktop'>BURAYA</a> tıklayarak.

#Holyrics Library
m0033=Holyrics Kütüphanesi

#Displays the song lyric in uppercase.
m0034=Şarkının sözlerini büyük harfle gösterir.

#Enable/disable the underline in the song title at first slide.
m0035=İlk slaytın şarkı başlığında altı çizili olup olmadığını aç/kapat.

#When <b>enabled</b>, the program will break long lines automatically, avoiding to decrease the original size of the font. When <b>disabled</b>, if you have any long lines that extend beyond the side of the slide, the program will decrease the font size until the entire line be inside the slide.
m0036=<b>aktif</b> seçenek ile program, uzun satırları otomatik olarak kıracak ve orijinal yazı tipi boyutunu küçültmekten kaçınacaktır. <b>devre dışı</b> seçenek ile, slaytın kenarını aşan uzun bir satır varsa, program, tüm satır slaytın içinde kalana kadar yazı tipi boyutunu küçültür.

#Enable/disable the paragraph <a href='http://customFormatting'>custom formatting</a>.
m0037=Paragrafın <a href='http://customFormatting'>özel formatlamasını</a> aç/kapat.

#Enable/disable <b>Custom Background</b>.
m0038=<b>özel arka plan</b>'ı aç/kapat.

#The <b>LIVE</b> panel shows what is currently being presented in default display.<br>(Background and video played by VLC Media Player do not appear on the panel.)
m0039=<b>CANLI</b> paneli, ana projeksiyonda şu anda sunulanı gösterir.<br>(Arka plan ve VLC Media Player tarafından oynatılan video panelde görünmez.)

#If you use a unique return monitor for those on the 'stage', you can use the communication panel to display messages only on this monitor.<br>In the display settings you can set a monitor as <b>stage view</b> (except the main audience monitor), and the messages in the communication panel will be displayed only on monitors set as <b>stage view</b>.
m0040=Eğer 'sahne'de olanlar için özel bir geri bildirim monitörü kullanıyorsanız, iletişim panelini yalnızca bu monitörde mesajlar sunmak için kullanabilirsiniz.<br>Görüntü ayarlarında bir monitörü <b>sahne görünümü</b> olarak tanımlayabilirsiniz (izleyici ana monitörü hariç) ve iletişim panelindeki mesajlar yalnızca <b>sahne görünümü</b> olarak tanımlanan monitörlerde gösterilecektir.

#Put the audio to play and click on the slide that you want to be displayed while the song is playing.<br>You can pause and rewind a section of the song to resume from where you stopped.<br>You can also delete an item from the captured list by right-clicking on it.
m0041=Sesi çalmaya başlayın ve müzik çalarken sunulmasını istediğiniz slayta tıklayın.<br>Müziğin bir bölümünü duraklatabilir ve geri alarak kaldığınız yerden başlayabilirsiniz.<br>Ayrıca, yakalanan bir öğeyi sağ tıklayarak listeden kaldırabilirsiniz.

#The slide that will be displayed before the first slide that you click is the one that is defined in the edit window.
m0042=Tıkladığınız ilk slayttan önce sunulacak slayt, düzenleme penceresinde tanımlanan slayttır.

#Do not expect to start the song section to click on the specific slide, try to click on the slide a few thousandths of a second before, avoiding delays in the transition between the slides.
m0043=Müziğin bölümünün başlamasını beklemeden belirli slayta tıklamayı deneyin, slayta tıklamak için birkaç milisaniye önceden tıklamaya çalışın, slaytlar arasındaki geçişte gecikmeleri önleyin.

#With the <b>Automatic Presentation</b> you can program the duration of each slide integrated into an MP3 audio (an Instrumental version, for example).<br>Once created, you can choose any theme that you want and start the presentation.<br>The audio will be played by the Media Player and the slides will be automatically displayed while the song is played.
m0044=<b>Otomatik Sunum</b> ile, her slaytın süresini bir MP3 ses dosyasıyla (örneğin bir oynatma) entegre edebilirsiniz.<br>Oluşturduktan sonra, istediğiniz herhangi bir temayı seçebilir ve sunuma başlayabilirsiniz.<br>Ses, Media Player tarafından çalınacak ve slaytlar müzik çalarken otomatik olarak gösterilecektir.

#<b>Set the initial slide</b> with the <i>Start with</i> option and the <i>duration</i> (in seconds) of the initial slide.
m0045=<b>Başlangıç slaydını belirleyin</b> <i>Başlamak için</i> seçeneği ile ve başlangıç slaydının <i>süresi</i> (saniye cinsinden) ile.

#<b>Setup the slides</b> right-clicking to add new slides and drag the slides to sort them.
m0046=<b>Slaytları düzenleyin</b> sağ tıklayarak yeni slaytlar ekleyin ve slaytları sürükleyerek sıralayın.

#<b>Set the duration of each slide</b> (in seconds) on the field <i>Duration</i>. You can also change the exact time that the slide starts by clicking on the text that displays the minutes, seconds, and milliseconds.
m0047=<b>Her slaytın süresini belirleyin</b> (saniye cinsinden) <i>Süre</i> alanında. Ayrıca, slaytın ne zaman başlayacağını tam olarak değiştirebilirsiniz, dakikaları, saniyeleri ve milisaniyeleri gösteren metne tıklayarak.

#<b>►</b> play the song from the corresponding slide to the end of the song.
m0048=<b>►</b> ilgili slayttan başlayarak şarkıyı sonuna kadar çalar.

#<b>|►|</b> only plays the section of the corresponding slide.
m0049=<b>|►|</b> yalnızca ilgili slaytın bölümünü çalar.

#You can use the <i>Capture Method</i> to make it easier to create the order of the slides and the duration of each.
m0050=Slaytların sırasını ve her birinin süresini kolaylaştırmak için <i>Yakalama Yöntemi</i> kullanabilirsiniz.

#When saving the <i>Automatic Presentation</i>, the generated <b>[file name].ap</b> file will already include the selected MP3 audio. You do not have to worry about copying the audio along with the <b>(*.ap)</b> file.
m0051=Otomatik Sunum'u kaydederken, oluşturulan dosya <b>[dosya adı].ap</b> seçilen MP3 ses dosyasını zaten içerecektir. Ses dosyasını <b>(*.ap)</b> ile birlikte kopyalamak konusunda endişelenmenize gerek yok.

#You can edit the text of certain slides while they are displayed.<br>  - Right-clicking on the slide that you want to edit (slide list in the footer of the main window);<br>  - or by pressing <b>SHIFT + F2</b> to edit the currently displayed slide.
m0052=Belirli slaytların metnini sunum sırasında düzenleyebilirsiniz.<br> - Düzenlemek istediğiniz slayta sağ tıklayarak (ana pencerenin altındaki slayt listesi);<br> - veya o anda gösterilen slaytı düzenlemek için <b>SHIFT + F12</b> tuşlarına basarak.

#Chat is a mean of communication between Holyrics Software and the Holyrics mobile app.<br>Any smartphone connected to the network can access the chat through the app and send messages to PC.
m0053=Sohbet, PC'deki Holyrics ile mobil Holyrics uygulaması arasında bir iletişim aracıdır.<br>Ağa bağlı herhangi bir cep telefonu, uygulama üzerinden sohbeti erişebilir ve PC'ye mesaj gönderebilir.

#The selected presentation will run automatically.
m0054=Seçilen sunum otomatik olarak çalıştırılacaktır.

#Click on the message to select.<br>Drag a message to reorder in the list.<br>Enter the highlighted key at the beginning of the message to select the corresponding message. <b>(first image)</b><br>Right-click on the message for more options. <b>(second image)</b>
m0055=Mesaja tıklayarak seçin.<br>Bir mesajı liste içinde yeniden sıralamak için sürükleyin.<br>Mesajın başında vurgulanan tuşa basarak ilgili mesajı seçin. <b>(ilk resim)</b><br>Mesaja sağ tıklayarak daha fazla seçenek için. <b>(ikinci resim)</b>

#You can change the background or Theme for each paragraph
m0056=Her paragrafın arka planını veya temasını değiştirebilirsiniz

#by clicking the slide {0} icon
m0057=slaytın {0} simgesine tıklayarak

#dragging an item from themes list to the slide
m0058=temalar listesinden bir öğeyi slayta sürükleyerek

#or by right-clicking on the slide for more options
m0059=veya slayta sağ tıklayarak daha fazla seçenek için

#<b>Warning!</b> When setting image or video as background, all settings such as font color, alignment, etc. will be kept from the selected song Theme. So be careful when changing the <b>Default Theme</b> of the song, because previously configured images and videos may not match the new theme that you selected.
m0060=<b>Dikkat!</b> Arka plan olarak resim veya video tanımlarken, yazı rengi, hizalama vb. gibi tüm ayarlar müzik için seçilen Tema'ya ait olacaktır. Bu nedenle, müziğin <b>Varsayılan Tema</b>'sını değiştirirken dikkatli olun, çünkü daha önce ayarlanan resimler ve videolar yeni seçilen tema ile uyumlu olmayabilir.

#it's a function that allows you to use the software as if you were in extended mode even though you haven't another monitor attached.<br>You can display a small window on your own monitor, simulating what would be displayed in the actual projection.
m0061=ek monitörler bağlı olmasa bile programı genişletilmiş modda kullanmanıza olanak tanıyan bir işlevdir.<br>Kendi monitörünüzde, gerçek projeksiyonda gösterilecek olanı simüle eden küçük bir pencere gösterebilir.

#Use examples
m0062=Kullanım örnekleri

#You are using the program at home, haven't a auxiliar monitor attached and would like to start presentations but not in full screen
m0063=Programı evde kullanıyorsunuz, ek bir monitör bağlı değil ve sunumları tam ekran olmadan başlatmak istiyorsunuz

#You want to learn how to use the program in extended mode but haven't a secondary display
m0064=Genişletilmiş modda programı kullanmayı öğrenmek istiyorsunuz ama ek bir monitörünüz yok

#You use the computer only to stream the slides through the network, making useless the display in fullscreen on your own screen
m0065=Bilgisayarı yalnızca slaytları wifi ağı üzerinden iletmek için kullanıyorsanız, kendi ekranınızda tam ekran görüntülemenin gereksiz olduğunu düşünüyorsunuz

#The <b>Slide Description</b> feature works as a facilitator for slide identification in the presentation footer.
m0066=<b>Slayt Açıklaması</b> işlevi, sunumun alt kısmında slaytı tanımlamak için kolaylık sağlar.

#The paragraph/slide description is defined in the lyric edit window, in the <b>Custom Formatting</b> function.
m0067=Bir paragraf/slaytın açıklaması, <b>Özel Biçimlendirme</b> işlevi ile yazı düzenleme penceresinde tanımlanır.

#Can be used for
m0068=Şu amaçlar için kullanılabilir

#set shortcuts at <b>go to</b> function, e.g: <b><i>X</i></b> letter go to slide <b><i>X</i></b>
m0069=<b>git</b> işlevinde kısayollar tanımlayın, örn.: <b><i>X</i></b> harfi <b><i>X</i></b> slaytına git

#set a default Theme, e.g: all <b><i>X</i></b> slides will get the <b><i>X</i></b> theme
m0070=varsayılan bir Tema tanımlamak, örn.: tüm slaytlar <b><i>X</i></b> <b><i>X</i></b> Tema'sına sahip olacaktır

#custom formatting, e.g: all <b><i>X</i></b> slides with italic font
m0071=özel biçimlendirme, örn.: tüm slaytlar <b><i>X</i></b> italik yazı tipi ile

#<b>Go to</b> function shortcuts
m0072=<b>git</b> işlevinin sistem kısayolları

