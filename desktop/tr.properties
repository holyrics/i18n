#it's a feature for using codes that will be replaced by variable values defined in the system, such as: date and time.<br>To use it, just enter the code along with the text. It works in lyrics, alerts, communication panel, ...
m0084=sistemde tanımlanan değişken değerlerle değiştirilecek kodları kullanmak için bir işlevdir, örneğin: tarih ve saat.<br>Kullanmak için, kodu metinle birlikte yazmanız yeterlidir. Şarkı sözlerinde, uyarılarda, iletişim panelinde vb. çalışır.

#of <b>all</b> songs<br>on the playlist.
m0085=<b>tüm</b> müziklerin<br> çalma listesinde.

#of <b>played</b> songs<br>on the playlist.
m0086=<b>çalınmış</b> müziklerden<br> çalma listesinde.

#of <b>not played</b> songs<br>on the playlist.
m0087=<b>çalınmamış</b> müziklerden<br> çalma listesinde.

#Responsible member<br>by service/event and list<br>of scheduled members.
m0088=Kült/etkinlik ve<br> atanmış üyelerin listesi için sorumlu üye.

#<b>Title and artist</b> of the next song<br>that is NOT marked as <b>played</b><br>on the playlist.
m0089=<b>Başlık ve sanatçı</b> bir sonraki müzik için<br> <b>çalınmış</b> olarak işaretlenmemiştir<br> çalma listesinde.

#<b>Title</b> of the next song that<br>is NOT marked as <b>played</b><br>on the playlist.
m0090=<b>Başlık</b> bir sonraki müzik için<br> <b>çalınmış</b> olarak işaretlenmemiştir<br> çalma listesinde.

#Stage Display (as configured)
