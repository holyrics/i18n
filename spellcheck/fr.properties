W_001=Exemple

#Copy
W_COPY=Copier

#Cut
W_CUT=Couper

#Dictionary
W_DICTIONARY=Dictionnaire

#Enable
W_ENABLE=Activer

#Ignore
W_IGNORE=Ignorer

#Paste
W_PASTE=Coller

#Redo
W_REDO=Refaire

#Undo
W_UNDO=Annuler