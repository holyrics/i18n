#You can add and/or remove words directly in the file
M_001=Možete dodati i/ili ukloniti reči direktno u fajlu

#Words must be separated by <b>line break</b>, that is, <b>one word per line<b/>
M_002=Reči treba da budu odvojene <b>novim redom</b>, odnosno, <b>jedna reč po liniji<b/>

#Open dictionary of words
M_003=Otvoriti rečnik reči

#Spell Check
M_004=Pravopisna Provera

#The <b>Spell Checker</b> checks for misspelled words and lowercase start words
M_005=<b>Pravopisna Provera</b> proverava netačne reči i reči sa početkom rečenice malim slovom

#It <b>does not</b> fix concordance, plural, gender, etc. only <b>spelling</b>
M_006=On <b>ne</b> ispravlja saglasnost, množinu, rod, itd. samo <b>pravopis</b>

#Be careful when adding words to the dictionary, since all new occurrences of this word will be considered correct elsewhere in the program
M_007=Pažnja pri dodavanju reči u rečnik, jer će sve nove pojave ove reči biti smatrane tačnim na bilo kom drugom mestu u programu

#When you add a word to the dictionary, only the original word will be added
M_008=Pri dodavanju reči u rečnik, samo originalni oblik će biti dodat

#The <i>variations</i> will continue to be considered incorrect until they are also added to the dictionary
M_009=<i>Varijacije</i> će i dalje biti smatrane netačnim dok se i one ne dodaju u rečnik

#The word <b>LimaGiran</b> has been added to the dictionary
M_010=Reč <b>LimaGiran</b> je dodata u rečnik

#Occurrences like <b>limagiran</b> will continue to be considered incorrect
M_011=Pojave kao <b>limagiran</b> će i dalje biti smatrane netačnim

#Add to dictionary
M_ADD_TO_DICTIONARY=Dodati u rečnik

