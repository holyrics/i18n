#You can add and/or remove words directly in the file
M_001=Anda dapat menambahkan dan/atau menghapus kata langsung di file

#Words must be separated by <b>line break</b>, that is, <b>one word per line<b/>
M_002=Kata-kata harus dipisahkan dengan <b>baris baru</b>, yaitu, <b>satu kata per baris<b/>

#Open dictionary of words
M_003=Buka kamus kata

#Spell Check
M_004=Pemeriksa Ejaan

#The <b>Spell Checker</b> checks for misspelled words and lowercase start words
M_005=<b>Pemeriksa Ejaan</b> memeriksa kata-kata yang salah dan kata-kata yang dimulai dengan huruf kecil di awal kalimat

#It <b>does not</b> fix concordance, plural, gender, etc. only <b>spelling</b>
M_006=Dia <b>tidak</b> memperbaiki kesesuaian, jamak, jenis kelamin, dll. hanya <b>ejaan</b>

#Be careful when adding words to the dictionary, since all new occurrences of this word will be considered correct elsewhere in the program
M_007=Perhatian saat menambahkan kata ke kamus, karena semua kemunculan baru dari kata ini akan dianggap benar di tempat lain dalam program

#When you add a word to the dictionary, only the original word will be added
M_008=Saat menambahkan kata ke kamus, hanya bentuk aslinya yang akan ditambahkan

#The <i>variations</i> will continue to be considered incorrect until they are also added to the dictionary
M_009=<i>Variasi</i> akan terus dianggap salah sampai mereka juga ditambahkan ke kamus

#The word <b>LimaGiran</b> has been added to the dictionary
M_010=Kata <b>LimaGiran</b> telah ditambahkan ke kamus

#Occurrences like <b>limagiran</b> will continue to be considered incorrect
M_011=Kemunculan seperti <b>limagiran</b> akan terus dianggap salah

#Add to dictionary
M_ADD_TO_DICTIONARY=Tambahkan ke kamus

#Allow any word to start with a capital letter
M_ALLOW_ANY_WORD_FIRST_UPPER=Izinkan kata apa pun dimulai dengan huruf kapital

#Check word with lowercase letter after line break
M_CHECK_WORD_WITH_LOWER_AFTER_LINE_BREAK=Periksa kata dengan huruf kecil setelah pemisahan baris

#Check word with lowercase letter after punctuation
M_CHECK_WORD_WITH_LOWER_AFTER_PUNCTUATION=Periksa kata dengan huruf kecil setelah tanda baca

#Disable Spell Check
M_DISABLE_SPELL_CHECK=Nonaktifkan Pemeriksa

#Enable Spell Check
M_ENABLE_SPELL_CHECK=Aktifkan Pemeriksa

#Ignore all
M_IGNORE_ALL=Abaikan semua

#No Suggestions
M_NO_SUGGESTIONS=Tanpa Saran

#Spell Check Settings
M_SPELL_CHECK_SETTINGS=Pengaturan Pemeriksa

