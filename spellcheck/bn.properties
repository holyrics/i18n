M_CHECK_WORD_WITH_LOWER_AFTER_LINE_BREAK=লাইন ব্রেকের পরে ছোট হাতের অক্ষরে শব্দ পরীক্ষা করুন

#Check word with lowercase letter after punctuation
M_CHECK_WORD_WITH_LOWER_AFTER_PUNCTUATION=পুনঃচিহ্নের পরে ছোট হাতের অক্ষরে শব্দ পরীক্ষা করুন

