#You can add and/or remove words directly in the file
M_001=Вы можете добавлять и/или удалять слова непосредственно в файле

#Words must be separated by <b>line break</b>, that is, <b>one word per line<b/>
M_002=Слова должны быть разделены <b>разрывом строки</b>, то есть <b>одно слово на строку<b/>

#Open dictionary of words
M_003=Открыть словарь

#Spell Check
M_004=Проверка орфографии

#The <b>Spell Checker</b> checks for misspelled words and lowercase start words
M_005=<b>Проверка орфографии</b> проверяет наличие слов с ошибками и начальных слов, написанных не с заглавной буквы

#It <b>does not</b> fix concordance, plural, gender, etc. only <b>spelling</b>
M_006=Это <b>не</b> исправляет согласование (concordance), число, род, и т. п., только <b>орфографию</b>

#Be careful when adding words to the dictionary, since all new occurrences of this word will be considered correct elsewhere in the program
M_007=Будьте осторожны при добавлении слов в словарь, так как все новые вхождения этого слова будут считаться правильными в другом месте программы

#When you add a word to the dictionary, only the original word will be added
M_008=Когда вы добавляете слово в словарь, будет добавлено только исходное слово

#The <i>variations</i> will continue to be considered incorrect until they are also added to the dictionary
M_009=<i>Варианты</i> будут по-прежнему считаться неправильными до тех пор, пока они также не будут добавлены в словарь

#The word <b>LimaGiran</b> has been added to the dictionary
M_010=Слово <b>LimaGiran</b> было добавлено в словарь

#Occurrences like <b>limagiran</b> will continue to be considered incorrect
M_011=Такие случаи, как <b>limagiran</b>, будут по-прежнему считаться неправильными

#Add to dictionary
M_ADD_TO_DICTIONARY=Добавить в словарь

#Allow any word to start with a capital letter
M_ALLOW_ANY_WORD_FIRST_UPPER=Позволить любому слову начинаться с заглавной буквы

#Check word with lowercase letter after line break
M_CHECK_WORD_WITH_LOWER_AFTER_LINE_BREAK=Проверить слово со строчной буквой после разрыва строки

#Check word with lowercase letter after punctuation
M_CHECK_WORD_WITH_LOWER_AFTER_PUNCTUATION=Проверить слово со строчной буквой после пунктуации

#Disable Spell Check
M_DISABLE_SPELL_CHECK=Отключить проверку орфографии

#Enable Spell Check
M_ENABLE_SPELL_CHECK=Включить проверку орфографии

#Ignore all
M_IGNORE_ALL=Игнорировать все

#No Suggestions
M_NO_SUGGESTIONS=Никаких Предложений

#Spell Check Settings
M_SPELL_CHECK_SETTINGS=Настройки Проверки орфографии

#Example
W_001=Пример

#Copy
W_COPY=Копировать

#Cut
W_CUT=Вырезать

#Dictionary
W_DICTIONARY=Словарь

#Enable
W_ENABLE=Включить

#Ignore
W_IGNORE=Пропустить

#Paste
W_PASTE=Вставить

#Redo
W_REDO=Повторить

#Undo
W_UNDO=Отменить