#You can add and/or remove words directly in the file
M_001=आप सीधे फ़ाइल में शब्द जोड़ या हटा सकते हैं

#Words must be separated by <b>line break</b>, that is, <b>one word per line<b/>
M_002=शब्दों को <b>लाइन ब्रेक</b> द्वारा अलग किया जाना चाहिए, अर्थात्, <b>प्रति पंक्ति एक शब्द</b>

#Open dictionary of words
M_003=शब्दों का शब्दकोश खोलें

#Spell Check
M_004=वर्तनी जांचक

#The <b>Spell Checker</b> checks for misspelled words and lowercase start words
M_005=<b>वर्तनी जांचक</b> गलत शब्दों और वाक्य के शुरू में छोटे अक्षर से शुरू होने वाले शब्दों की जांच करता है

#It <b>does not</b> fix concordance, plural, gender, etc. only <b>spelling</b>
M_006=यह <b>संयोग</b>, बहुवचन, लिंग आदि को ठीक नहीं करता है, केवल <b>वर्तनी</b> को ही ठीक करता है

#Be careful when adding words to the dictionary, since all new occurrences of this word will be considered correct elsewhere in the program
M_007=शब्दकोश में शब्द जोड़ते समय ध्यान दें, क्योंकि इस शब्द की सभी नई घटनाएँ कार्यक्रम के किसी अन्य स्थान पर सही मानी जाएंगी

#When you add a word to the dictionary, only the original word will be added
M_008=शब्दकोश में एक शब्द जोड़ते समय, केवल मूल रूप जोड़ा जाएगा

#The <i>variations</i> will continue to be considered incorrect until they are also added to the dictionary
M_009=<i>विविधताएँ</i> तब तक गलत मानी जाएंगी जब तक कि उन्हें भी शब्दकोश में नहीं जोड़ा जाता

#The word <b>LimaGiran</b> has been added to the dictionary
M_010=शब्द <b>LimaGiran</b> शब्दकोश में जोड़ा गया है

#Occurrences like <b>limagiran</b> will continue to be considered incorrect
M_011=जैसे <b>limagiran</b> की घटनाएँ गलत मानी जाएंगी

