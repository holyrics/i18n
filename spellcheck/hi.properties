M_ALLOW_ANY_WORD_FIRST_UPPER=किसी भी शब्द को बड़े अक्षर से शुरू करने की अनुमति दें

#Check word with lowercase letter after line break
M_CHECK_WORD_WITH_LOWER_AFTER_LINE_BREAK=लाइन ब्रेक के बाद छोटे अक्षर से शब्द की जांच करें

