#You can add and/or remove words directly in the file
M_001=Sözləri birbaşa faylda əlavə edə və ya silə bilərsiniz

#Words must be separated by <b>line break</b>, that is, <b>one word per line<b/>
M_002=Sözlər <b>sətir sonu</b> ilə ayrılmalıdır, yəni <b>bir söz bir sətirdə</b>

#Open dictionary of words
M_003=Söz lüğətini aç

#Spell Check
M_004=Yazı Düzəldici

#The <b>Spell Checker</b> checks for misspelled words and lowercase start words
M_005=<b>Yazı Düzəldici</b> səhv sözləri və cümlənin başlanğıcında kiçik hərflə başlayan sözləri yoxlayır

#It <b>does not</b> fix concordance, plural, gender, etc. only <b>spelling</b>
M_006=O <b>dəyişiklik</b>, çoxluq, cins və s. düzəltmir, yalnız <b>yazılış</b>ı düzəldir

#Be careful when adding words to the dictionary, since all new occurrences of this word will be considered correct elsewhere in the program
M_007=Lüğətə söz əlavə edərkən diqqətli olun, çünki bu sözün bütün yeni halları proqramın digər yerlərində düzgün hesab ediləcək

#When you add a word to the dictionary, only the original word will be added
M_008=Lüğətə bir söz əlavə edərkən yalnız orijinal forma əlavə ediləcək

#The <i>variations</i> will continue to be considered incorrect until they are also added to the dictionary
M_009=<i>Varyasiyalar</i> hələ də lüğətə əlavə olunana qədər səhv hesab ediləcək

#The word <b>LimaGiran</b> has been added to the dictionary
M_010=Söz <b>LimaGiran</b> lüğətə əlavə edildi

#Occurrences like <b>limagiran</b> will continue to be considered incorrect
M_011=<b>limagiran</b> kimi halları hələ də səhv hesab ediləcək

