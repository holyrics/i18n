M_CHECK_WORD_WITH_LOWER_AFTER_LINE_BREAK=Sətir sonundan sonra kiçik hərflə başlayan sözü yoxlayın

#Check word with lowercase letter after punctuation
M_CHECK_WORD_WITH_LOWER_AFTER_PUNCTUATION=Noktalama işarəsindən sonra kiçik hərflə başlayan sözü yoxlayın

