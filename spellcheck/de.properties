W_001=Beispiel

#Copy
W_COPY=Kopieren

#Cut
W_CUT=Ausschneiden

#Dictionary
W_DICTIONARY=Wörterbuch

#Enable
W_ENABLE=Aktivieren

#Ignore
W_IGNORE=Ignorieren

#Paste
W_PASTE=Einfügen

#Redo
W_REDO=Wiederholen

#Undo
W_UNDO=Rückgängig machen