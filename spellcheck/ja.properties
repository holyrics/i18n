W_001=例

#Copy
W_COPY=コピー

#Cut
W_CUT=切る

#Dictionary
W_DICTIONARY=辞書

#Enable
W_ENABLE=有効

#Ignore
W_IGNORE=無視

#Paste
W_PASTE=ペースト

#Redo
W_REDO=やり直す

#Undo
W_UNDO=und