#You can add and/or remove words directly in the file
M_001=파일에서 직접 단어를 추가하거나 제거할 수 있습니다.

#Words must be separated by <b>line break</b>, that is, <b>one word per line<b/>
M_002=단어는 <b>줄 바꿈</b>으로 구분되어야 하며, 즉 <b>한 줄에 하나의 단어</b>여야 합니다.

#Open dictionary of words
M_003=단어 사전 열기

#Spell Check
M_004=맞춤법 검사기

#The <b>Spell Checker</b> checks for misspelled words and lowercase start words
M_005=<b>맞춤법 검사기</b>는 잘못된 단어와 소문자로 시작하는 문장의 단어를 확인합니다.

#It <b>does not</b> fix concordance, plural, gender, etc. only <b>spelling</b>
M_006=그는 <b>문법</b>, 복수형, 성별 등을 수정하지 않고 오직 <b>철자</b>만 수정합니다.

#Be careful when adding words to the dictionary, since all new occurrences of this word will be considered correct elsewhere in the program
M_007=사전에 단어를 추가할 때, 이 단어의 모든 새로운 발생이 프로그램의 다른 모든 곳에서 올바른 것으로 간주됩니다.

#When you add a word to the dictionary, only the original word will be added
M_008=사전에 단어를 추가할 때, 원래 형태만 추가됩니다.

#The <i>variations</i> will continue to be considered incorrect until they are also added to the dictionary
M_009=<i>변형</i>은 사전에 추가될 때까지 여전히 잘못된 것으로 간주됩니다.

#The word <b>LimaGiran</b> has been added to the dictionary
M_010=단어 <b>LimaGiran</b>이 사전에 추가되었습니다.

#Occurrences like <b>limagiran</b> will continue to be considered incorrect
M_011=<b>limagiran</b>과 같은 발생은 여전히 잘못된 것으로 간주됩니다.

#Add to dictionary
M_ADD_TO_DICTIONARY=사전에 추가

#Allow any word to start with a capital letter
M_ALLOW_ANY_WORD_FIRST_UPPER=모든 단어가 대문자로 시작할 수 있도록 허용

#Check word with lowercase letter after line break
M_CHECK_WORD_WITH_LOWER_AFTER_LINE_BREAK=줄 바꿈 후 소문자로 시작하는 단어 확인

#Check word with lowercase letter after punctuation
M_CHECK_WORD_WITH_LOWER_AFTER_PUNCTUATION=구두점 후 소문자로 시작하는 단어 확인

#Disable Spell Check
M_DISABLE_SPELL_CHECK=맞춤법 검사기 비활성화

#Enable Spell Check
M_ENABLE_SPELL_CHECK=맞춤법 검사기 활성화

#Ignore all
M_IGNORE_ALL=모두 무시

#No Suggestions
M_NO_SUGGESTIONS=제안 없음

#Spell Check Settings
M_SPELL_CHECK_SETTINGS=맞춤법 검사기 설정

#Example
W_001=예시

#Copy
W_COPY=복사

#Cut
W_CUT=잘라내기

#Dictionary
W_DICTIONARY=사전

#Enable
W_ENABLE=활성화

#Ignore
W_IGNORE=무시

#Paste
W_PASTE=붙여넣기

#Redo
W_REDO=다시 만들기

#Undo
W_UNDO=실행 취소